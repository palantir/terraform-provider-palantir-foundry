            - anthropicModelModelId
            type: object
            properties:
              anthropicModelModelId:
                $ref: "#/components/schemas/LanguageModels.LanguageModelApiName"
    LanguageModels.AnthropicMessagesRequest:
      required:
      - maxTokens
      type: object
      properties:
        maxTokens:
          type: integer
          description: The maximum number of tokens to generate before stopping.
        messages:
          type: array
          description: |
            Input messages to the model. This can include a single user-role message or multiple messages with
            alternating user and assistant roles.
          items:
            $ref: "#/components/schemas/LanguageModels.AnthropicMessage"
        stopSequences:
          type: array
          description: Custom text sequences that will cause the model to stop generating.
          items:
            type: string
        system:
          type: array
          description: "A system prompt is a way of providing context and instructions\
            \ to Claude, such as specifying a \nparticular goal or role. As of now,\
            \ sending multiple system prompts is not supported.\n"
          items:
            $ref: "#/components/schemas/LanguageModels.AnthropicSystemMessage"
        temperature:
          type: number
          description: "Amount of randomness injected into the response. Ranges from\
            \ 0.0 to 1.0. Note that even with \ntemperature of 0.0, the results will\
            \ not be fully deterministic. Defaults to 1.0\n"
          format: double
        thinking:
          $ref: "#/components/schemas/LanguageModels.AnthropicThinkingConfig"
        toolChoice:
          $ref: "#/components/schemas/LanguageModels.AnthropicToolChoice"
        tools:
          type: array
          description: Definitions of tools that the model may use.
          items:
            $ref: "#/components/schemas/LanguageModels.AnthropicTool"
        topK:
          type: integer
          description: Only sample from the top K options for each subsequent token.
        topP:
          type: number
          description: "Use nucleus sampling. You should either alter temperature\
            \ or top_p, but not both"
          format: double
      example:
        messages:
        - role: USER

      required:
      - audience
      - issuerUrl
      - subject
      - type
      type: object
      properties:
        audience:
          type: string
          description: The configured audience that identifies the external system.
          example: sts.amazonaws.com
        issuerUrl:
          type: string
          description: The URL that identifies Foundry as an OIDC identity provider.
          example: https://pltroidcpublicexample.blob.store.com/foundry
        subject:
          $ref: "#/components/schemas/Connectivity.ConnectionRid"
        type:
          type: string
      description: "[OpenID Connect (OIDC)](/docs/foundry/data-connection/oidc/) is\
        \ an open authentication protocol that allows \nyou to authenticate to external\
        \ system resources without the use of static credentials.\n"
      example:
        audience: sts.amazonaws.com
        issuerUrl: https://pltroidcpublicexample.blob.store.com/foundry
        subject: ri.magritte..source.c078b71b-92f9-41b6-b0df-3760f411120b
    Connectivity.BasicCredentials:
      required:
      - password
      - type
      - username
      type: object
      properties:
        password:
          $ref: "#/components/schemas/Connectivity.EncryptedProperty"
        type:
          type: string
        username:
          type: string
      example:
        password:
          type: asPlaintextValue
          value: myPlaintextSecret
    Connectivity.BearerToken:
      required:
      - bearerToken
      - type
      type: object
      properties:
        bearerToken:
          $ref: "#/components/schemas/Connectivity.EncryptedProperty"
        type:
          type: string
      description: The bearer token used to authenticate to the external system.
      example:
        bearerToken:
          type: asPlaintextValue
          value: myPlaintextSecret
    Connectivity.BigQueryVirtualTableConfig:
      required:
      - dataset
      - project
      - table
      - type
      type: object
      properties:
        dataset:
          type: string
          description: The BigQuery dataset name.
        project:
          type: string
          description: The BigQuery project name.
        table:
          type: string
          description: The BigQuery table name.
        type:
          type: string
      description: "Pointer to the table in BigQuery. Uses the BigQuery table identifier\
        \ of project, dataset and table."
    Connectivity.CloudIdentity:
      required:
      - cloudIdentityRid
      - type
      type: object
      properties:
        cloudIdentityRid:
          $ref: "#/components/schemas/Connectivity.CloudIdentityRid"
        type:
          type: string
      description: "[Cloud identities](/docs/foundry/administration/configure-cloud-identities/)\
        \ allow you to authenticate to \ncloud provider resources without the use\
        \ of static credentials.\n"
      example:
        cloudIdentityRid: ri.resource-policy-manager.global.cloud-identity.9dfdc25e-c506-4757-96d5-d22be70d596d
    Connectivity.CloudIdentityRid:
      type: string
      description: |
        The Resource Identifier (RID) of a Cloud Identity.
      example: ri.resource-policy-manager.global.cloud-identity.9dfdc25e-c506-4757-96d5-d22be70d596d
    Connectivity.Connection:
      required:
      - configuration
      - displayName
      - exportSettings
      - parentFolderRid
      - rid
      - worker
      type: object
      properties:
        configuration:
          $ref: "#/components/schemas/Connectivity.ConnectionConfiguration"
        displayName:
          $ref: "#/components/schemas/Connectivity.ConnectionDisplayName"
        exportSettings:
          $ref: "#/components/schemas/Connectivity.ConnectionExportSettings"
        parentFolderRid:
          $ref: "#/components/schemas/Filesystem.FolderRid"
        rid:
          $ref: "#/components/schemas/Connectivity.ConnectionRid"
        worker:
          $ref: "#/components/schemas/Connectivity.ConnectionWorker"
      example:
        configuration:
          driverClass: org.postgresql.Driver
          type: jdbc
          url: jdbc:postgresql://localhost:5432/test
        displayName: Connection to my external system
        exportSettings:
          exportEnabledWithoutMarkingsValidation: false
          exportsEnabled: true
        parentFolderRid: ri.compass.main.folder.c410f510-2937-420e-8ea3-8c9bcb3c1791
        rid: ri.magritte..source.c078b71b-92f9-41b6-b0df-3760f411120b
    Connectivity.ConnectionConfiguration:
      example:
        driverClass: org.postgresql.Driver
        type: jdbc
        url: jdbc:postgresql://localhost:5432/test
      discriminator:
        propertyName: type
        mapping:
          databricks: "#/components/schemas/Connectivity.DatabricksConnectionConfiguration"
          jdbc: "#/components/schemas/Connectivity.JdbcConnectionConfiguration"
          rest: "#/components/schemas/Connectivity.RestConnectionConfiguration"
          s3: "#/components/schemas/Connectivity.S3ConnectionConfiguration"
          snowflake: "#/components/schemas/Connectivity.SnowflakeConnectionConfiguration"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.S3ConnectionConfiguration"
      - $ref: "#/components/schemas/Connectivity.RestConnectionConfiguration"
      - $ref: "#/components/schemas/Connectivity.SnowflakeConnectionConfiguration"
      - $ref: "#/components/schemas/Connectivity.DatabricksConnectionConfiguration"
      - $ref: "#/components/schemas/Connectivity.JdbcConnectionConfiguration"
    Connectivity.ConnectionDetailsNotDetermined:
      description: |
        Details of the connection (such as which types of import it supports) could not be determined.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INTERNAL
          parameters:
            required:
            - connectionRid
            - connectionType
            type: object
            properties:
              connectionRid:
                $ref: "#/components/schemas/Connectivity.ConnectionRid"
              connectionType:
                type: string
    Connectivity.ConnectionDisplayName:
      type: string
      description: The display name of the Connection. The display name must not be
        blank.
    Connectivity.ConnectionExportSettings:
      required:
      - exportEnabledWithoutMarkingsValidation
      - exportsEnabled
      type: object
      properties:
        exportEnabledWithoutMarkingsValidation:
          type: boolean
          description: "In certain interactive workflows the Connection can be used\
            \ in, it is not currently possible to validate the \nsecurity markings\
            \ of the data being exported. \nBy enabling exports without markings validation,\
            \ you acknowledge that you are responsible for ensuring \nthat the data\
            \ being exported is compliant with your organization's policies.\n"
          example: false
        exportsEnabled:
          type: boolean
          description: |
            Allow exporting datasets from Foundry to this Connection.
          example: true
      description: |
        The [export settings of a Connection](/docs/foundry/data-connection/export-overview/#enable-exports-for-source).
      example:
        exportEnabledWithoutMarkingsValidation: false
        exportsEnabled: true
    Connectivity.ConnectionNotFound:
      description: The given Connection could not be found.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - NOT_FOUND
          parameters:
            required:
            - connectionRid
            type: object
            properties:
              connectionRid:
                $ref: "#/components/schemas/Connectivity.ConnectionRid"
    Connectivity.ConnectionRid:
      type: string
      description: |
        The Resource Identifier (RID) of a Connection (also known as a source).
      example: ri.magritte..source.c078b71b-92f9-41b6-b0df-3760f411120b
    Connectivity.ConnectionTypeNotSupported:
      description: |
        The specified connection is not yet supported in the Platform API.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            required:
            - connectionType
            type: object
            properties:
              connectionType:
                type: string
    Connectivity.ConnectionWorker:
      description: |
        [The worker of a Connection](/docs/foundry/data-connection/core-concepts/#workers), which defines where
        compute for capabilities are run.
      discriminator:
        propertyName: type
        mapping:
          foundryWorker: "#/components/schemas/Connectivity.FoundryWorker"
          unknownWorker: "#/components/schemas/Connectivity.UnknownWorker"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.UnknownWorker"
      - $ref: "#/components/schemas/Connectivity.FoundryWorker"
    Connectivity.CreateConnectionPermissionDenied:
      description: Could not create the Connection.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - PERMISSION_DENIED
          parameters:
            type: object
    Connectivity.CreateConnectionRequest:
      required:
      - configuration
      - displayName
      - parentFolderRid
      - worker
      type: object
      properties:
        configuration:
          $ref: "#/components/schemas/Connectivity.CreateConnectionRequestConnectionConfiguration"
        displayName:
          $ref: "#/components/schemas/Connectivity.ConnectionDisplayName"
        parentFolderRid:
          $ref: "#/components/schemas/Filesystem.FolderRid"
        worker:
          $ref: "#/components/schemas/Connectivity.CreateConnectionRequestConnectionWorker"
      example:
        configuration:
          driverClass: org.postgresql.Driver
          type: jdbc
          url: jdbc:postgresql://localhost:5432/test
        displayName: Connection to my external system
        parentFolderRid: ri.compass.main.folder.c410f510-2937-420e-8ea3-8c9bcb3c1791
    Connectivity.CreateConnectionRequestAsPlaintextValue:
      required:
      - type
      - value
      type: object
      properties:
        type:
          type: string
        value:
          $ref: "#/components/schemas/Connectivity.PlaintextValue"
      example:
        value: MySecretPassword
    Connectivity.CreateConnectionRequestAsSecretName:
      required:
      - type
      - value
      type: object
      properties:
        type:
          type: string
        value:
          $ref: "#/components/schemas/Connectivity.SecretName"
      example:
        value: Password
    Connectivity.CreateConnectionRequestAwsAccessKey:
      required:
      - accessKeyId
      - secretAccessKey
      - type
      type: object
      properties:
        accessKeyId:
          type: string
          example: AKIAIOSFODNN7EXAMPLE
        secretAccessKey:
          $ref: "#/components/schemas/Connectivity.CreateConnectionRequestEncryptedProperty"
        type:
          type: string
      example:
        accessKeyId: AKIAIOSFODNN7EXAMPLE
        secretAccessKey:
          type: asPlaintextValue
          value: myPlaintextSecret
    Connectivity.CreateConnectionRequestAwsOidcAuthentication:
      required:
      - audience
      - type
      type: object
      properties:
        audience:
          type: string
          description: The configured audience that identifies the external system.
          example: sts.amazonaws.com
        type:
          type: string
      example:
        audience: sts.amazonaws.com
    Connectivity.CreateConnectionRequestBasicCredentials:
      required:
      - password
      - type
      - username
      type: object
      properties:
        password:
          $ref: "#/components/schemas/Connectivity.CreateConnectionRequestEncryptedProperty"
        type:
          type: string
        username:
          type: string
      example:
        password:
          type: asPlaintextValue
          value: myPlaintextSecret
    Connectivity.CreateConnectionRequestCloudIdentity:
      required:
      - cloudIdentityRid
      - type
      type: object
      properties:
        cloudIdentityRid:
          $ref: "#/components/schemas/Connectivity.CloudIdentityRid"
        type:
          type: string
      example:
        cloudIdentityRid: ri.resource-policy-manager.global.cloud-identity.9dfdc25e-c506-4757-96d5-d22be70d596d
    Connectivity.CreateConnectionRequestConnectionConfiguration:
      example:
        driverClass: org.postgresql.Driver
        type: jdbc
        url: jdbc:postgresql://localhost:5432/test
      discriminator:
        propertyName: type
        mapping:
          databricks: "#/components/schemas/Connectivity.CreateConnectionRequestDatabricksConnectionConfiguration"
          jdbc: "#/components/schemas/Connectivity.CreateConnectionRequestJdbcConnectionConfiguration"
          rest: "#/components/schemas/Connectivity.CreateConnectionRequestRestConnectionConfiguration"
          s3: "#/components/schemas/Connectivity.CreateConnectionRequestS3ConnectionConfiguration"
          snowflake: "#/components/schemas/Connectivity.CreateConnectionRequestSnowflakeConnectionConfiguration"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestS3ConnectionConfiguration"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestRestConnectionConfiguration"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestSnowflakeConnectionConfiguration"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestDatabricksConnectionConfiguration"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestJdbcConnectionConfiguration"
    Connectivity.CreateConnectionRequestConnectionWorker:
      description: |
        [The worker of a Connection](/docs/foundry/data-connection/core-concepts/#workers), which defines where
        compute for capabilities are run.
      discriminator:
        propertyName: type
        mapping:
          foundryWorker: "#/components/schemas/Connectivity.CreateConnectionRequestFoundryWorker"
          unknownWorker: "#/components/schemas/Connectivity.CreateConnectionRequestUnknownWorker"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestUnknownWorker"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestFoundryWorker"
    Connectivity.CreateConnectionRequestDatabricksAuthenticationMode:
      description: The method of authentication for connecting to an external Databricks
        system.
      discriminator:
        propertyName: type
        mapping:
          basic: "#/components/schemas/Connectivity.CreateConnectionRequestBasicCredentials"
          oauthM2M: "#/components/schemas/Connectivity.CreateConnectionRequestOauthMachineToMachineAuth"
          personalAccessToken: "#/components/schemas/Connectivity.CreateConnectionRequestPersonalAccessToken"
          workflowIdentityFederation: "#/components/schemas/Connectivity.CreateConnectionRequestWorkflowIdentityFederation"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestWorkflowIdentityFederation"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestOauthMachineToMachineAuth"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestPersonalAccessToken"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestBasicCredentials"
    Connectivity.CreateConnectionRequestDatabricksConnectionConfiguration:
      required:
      - authentication
      - hostName
      - httpPath
      - jdbcProperties
      - type
      type: object
      properties:
        authentication:
          $ref: "#/components/schemas/Connectivity.CreateConnectionRequestDatabricksAuthenticationMode"
        hostName:
          type: string
          description: The hostname of the Databricks workspace.
          example: west-us-2.azuredatabricks.net
        httpPath:
          type: string
          description: The Databricks compute resource’s HTTP Path value.
          example: /sql/1.0/warehouses/1234
        jdbcProperties:
          $ref: "#/components/schemas/Connectivity.JdbcProperties"
        type:
          type: string
      example:
        hostName: west-us-2.azuredatabricks.net
        httpPath: /sql/1.0/warehouses/1234
        jdbcProperties:
          propertyName1: propertyValue1
          propertyName2: propertyValue2
    Connectivity.CreateConnectionRequestDuration:
      required:
      - unit
      - value
      type: object
      properties:
        unit:
          $ref: "#/components/schemas/Core.TimeUnit"
        value:
          type: integer
          description: The duration value.
          example: 30
      example:
        unit: SECONDS
        value: 30
    Connectivity.CreateConnectionRequestEncryptedProperty:
      description: |
        When reading an encrypted property, the secret name representing the encrypted value will be returned.
        When writing to an encrypted property:
        - If a plaintext value is passed as an input, the plaintext value will be encrypted and saved to the property.
        - If a secret name is passed as an input, the secret name must match the existing secret name of the property
          and the property will retain its previously encrypted value.
      example:
        type: asPlaintextValue
        value: myPlaintextSecret
      discriminator:
        propertyName: type
        mapping:
          asPlaintextValue: "#/components/schemas/Connectivity.CreateConnectionRequestAsPlaintextValue"
          asSecretName: "#/components/schemas/Connectivity.CreateConnectionRequestAsSecretName"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestAsSecretName"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestAsPlaintextValue"
    Connectivity.CreateConnectionRequestFoundryWorker:
      required:
      - type
      type: object
      properties:
        networkEgressPolicyRids:
          type: array
          items:
            $ref: "#/components/schemas/Connectivity.NetworkEgressPolicyRid"
        type:
          type: string
      example:
        networkEgressPolicyRids:
        - ri.resource-policy-manager.global.network-egress-policy.30c759c9-8c06-45c2-ae83-7bded168a198
    Connectivity.CreateConnectionRequestJdbcConnectionConfiguration:
      required:
      - driverClass
      - jdbcProperties
      - type
      - url
      type: object
      properties:
        credentials:
          $ref: "#/components/schemas/Connectivity.BasicCredentials"
        driverClass:
          type: string
          description: The fully-qualified driver class name that is used to connect
            to the database.
          example: org.postgresql.Driver
        jdbcProperties:
          $ref: "#/components/schemas/Connectivity.JdbcProperties"
        type:
          type: string
        url:
          type: string
          description: The URL that the JDBC driver uses to connect to a database.
          example: jdbc:postgresql://localhost:5432/test
      example:
        credentials:
          password:
            type: asPlaintextValue
            value: myPlaintextSecret
        driverClass: org.postgresql.Driver
        jdbcProperties:
          propertyName1: propertyValue1
          propertyName2: propertyValue2
        url: jdbc:postgresql://localhost:5432/test
    Connectivity.CreateConnectionRequestOauthMachineToMachineAuth:
      required:
      - clientID
      - clientSecret
      - type
      type: object
      properties:
        clientID:
          type: string
          description: The client ID for the service principal.
        clientSecret:
          $ref: "#/components/schemas/Connectivity.CreateConnectionRequestEncryptedProperty"
        type:
          type: string
      example:
        clientSecret:
          type: asPlaintextValue
          value: myPlaintextSecret
    Connectivity.CreateConnectionRequestPersonalAccessToken:
      required:
      - personalAccessToken
      - type
      type: object
      properties:
        personalAccessToken:
          $ref: "#/components/schemas/Connectivity.CreateConnectionRequestEncryptedProperty"
        type:
          type: string
      example:
        personalAccessToken:
          type: asPlaintextValue
          value: myPlaintextSecret
    Connectivity.CreateConnectionRequestRestConnectionAdditionalSecrets:
      description: |
        When creating or updating additional secrets, use SecretsWithPlaintextValues.
        When fetching the RestConnectionConfiguration, SecretsNames will be provided.
      discriminator:
        propertyName: type
        mapping:
          asSecretsNames: "#/components/schemas/Connectivity.CreateConnectionRequestSecretsNames"
          asSecretsWithPlaintextValues: "#/components/schemas/Connectivity.CreateConnectionRequestSecretsWithPlaintextValues"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestSecretsWithPlaintextValues"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestSecretsNames"
    Connectivity.CreateConnectionRequestRestConnectionConfiguration:
      required:
      - type
      type: object
      properties:
        additionalSecrets:
          $ref: "#/components/schemas/Connectivity.RestConnectionAdditionalSecrets"
        domains:
          type: array
          description: |
            The domains that the connection is allowed to access.
            At least one domain must be specified.
          items:
            $ref: "#/components/schemas/Connectivity.Domain"
        oauth2ClientRid:
          type: string
          description: |
            The RID of the [Outbound application](/docs/foundry/administration/configure-outbound-applications) that is used to authenticate to the external system via OAuth2.
            Currently, a connection may use only one outbound application for OAuth 2.0 authentication.
            Selecting a different outbound application will update the configuration for all domains with OAuth 2.0 as the selected authorization.
        type:
          type: string
      example:
        domains:
        - host: my-rest-api.com
          port: 443
          scheme: HTTP
    Connectivity.CreateConnectionRequestS3AuthenticationMode:
      discriminator:
        propertyName: type
        mapping:
          awsAccessKey: "#/components/schemas/Connectivity.CreateConnectionRequestAwsAccessKey"
          cloudIdentity: "#/components/schemas/Connectivity.CreateConnectionRequestCloudIdentity"
          oidc: "#/components/schemas/Connectivity.CreateConnectionRequestAwsOidcAuthentication"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestAwsAccessKey"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestCloudIdentity"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestAwsOidcAuthentication"
    Connectivity.CreateConnectionRequestS3ConnectionConfiguration:
      required:
      - bucketUrl
      - type
      type: object
      properties:
        authenticationMode:
          $ref: "#/components/schemas/Connectivity.S3AuthenticationMode"
        bucketUrl:
          type: string
          description: The URL of the S3 bucket. The URL should contain a trailing
            slash.
          example: s3://my-test-bucket/
        clientKmsConfiguration:
          $ref: "#/components/schemas/Connectivity.S3KmsConfiguration"
        connectionTimeoutMillis:
          type: string
          description: |
            The amount of time (in milliseconds) to wait when initially establishing a connection before giving up and timing out.
            If not specified, defaults to 10000 as defined by the [AWS SDK default](https://docs.aws.amazon.com/AWSJavaSDK/latest/javadoc/com/amazonaws/ClientConfiguration.html#DEFAULT_CONNECTION_TIMEOUT).
          format: long
        enableRequesterPays:
          type: boolean
          description: |
            Defaults to false, unless set and overwritten.
            If true, includes the [requester pays header](https://docs.aws.amazon.com/AmazonS3/latest/userguide/RequesterPaysBuckets.html)
            in requests, allowing reads from requester pays buckets.
        matchSubfolderExactly:
          type: boolean
          description: |
            If true, only files in the subfolder specified in the bucket URL will be synced.
            If false, all files in the bucket will be synced.
            If not specified, defaults to false.
        maxConnections:
          type: integer
          description: |
            The maximum number of HTTP connections to the S3 service per sync.
            If not specified, defaults to 50 as defined by the [AWS SDK default](https://docs.aws.amazon.com/AWSJavaSDK/latest/javadoc/com/amazonaws/ClientConfiguration.html#DEFAULT_MAX_CONNECTIONS).
        maxErrorRetry:
          type: integer
          description: |
            The maximum number of retry attempts for failed requests to the S3 service.
            If not specified, defaults to 3 as defined by the [AWS SDK default](https://docs.aws.amazon.com/sdk-for-java/latest/developer-guide/retry-strategy.html#retry-strategies).
        proxyConfiguration:
          $ref: "#/components/schemas/Connectivity.S3ProxyConfiguration"
        region:
          $ref: "#/components/schemas/Connectivity.Region"
        s3Endpoint:
          type: string
          description: |
            The endpoint of the S3 service. This is used to connect to a custom S3 service that is not AWS S3.
            If not specified, defaults to the [AWS S3 endpoint](https://docs.aws.amazon.com/general/latest/gr/s3.html).
            Warning: Specifying a region and a custom endpoint containing a region can lead to unexpected behavior.
          example: https://my-custom-s3-endpoint.com
        s3EndpointSigningRegion:
          $ref: "#/components/schemas/Connectivity.Region"
        socketTimeoutMillis:
          type: string
          description: |
            The amount of time (in milliseconds) to wait for data to be transferred over an established, open connection.
            If not specified, defaults to 50000 as defined by the [AWS SDK default](https://docs.aws.amazon.com/AWSJavaSDK/latest/javadoc/com/amazonaws/ClientConfiguration.html#DEFAULT_SOCKET_TIMEOUT).
          format: long
        stsRoleConfiguration:
          $ref: "#/components/schemas/Connectivity.StsRoleConfiguration"
        type:
          type: string
      example:
        bucketUrl: s3://my-test-bucket/
        clientKmsConfiguration:
          kmsKey: arn:aws:kms:us-west-1:123456789012:key/1234abcd-12ab-34cd-56ef-1234567890ab
          kmsRegion: us-west-1
        proxyConfiguration:
          credentials:
            password:
              type: asPlaintextValue
              value: myPlaintextSecret
          protocol: HTTP
        region: us-west-1
        s3Endpoint: https://my-custom-s3-endpoint.com
        s3EndpointSigningRegion: us-west-1
        stsRoleConfiguration:
          roleArn: arn:aws:iam::123456789012:role/my-role
          roleSessionDuration:
            unit: SECONDS
            value: 30
          stsEndpoint: https://sts.us-west-1.amazonaws.com
    Connectivity.CreateConnectionRequestS3KmsConfiguration:
      required:
      - kmsKey
      type: object
      properties:
        kmsKey:
          type: string
          description: |
            The client-side KMS key to use for encryption and decryption of data in the S3 bucket.
            If not specified, the default KMS key for the bucket is used.
          example: arn:aws:kms:us-west-1:123456789012:key/1234abcd-12ab-34cd-56ef-1234567890ab
        kmsRegion:
          $ref: "#/components/schemas/Connectivity.Region"
      example:
        kmsKey: arn:aws:kms:us-west-1:123456789012:key/1234abcd-12ab-34cd-56ef-1234567890ab
        kmsRegion: us-west-1
    Connectivity.CreateConnectionRequestS3ProxyConfiguration:
      required:
      - host
      - port
      type: object
      properties:
        credentials:
          $ref: "#/components/schemas/Connectivity.BasicCredentials"
        host:
          type: string
          description: "Domain name, IPv4, or IPv6 address. \n`protocol` and `port`\
            \ must be specified separately.\n"
        nonProxyHosts:
          type: array
          description: "A list of hosts that can bypass the proxy, such as those used\
            \ for STS Role. You can also use \"*\" wildcards."
          items:
            type: string
        port:
          type: integer
        protocol:
          $ref: "#/components/schemas/Connectivity.Protocol"
      example:
        credentials:
          password:
            type: asPlaintextValue
            value: myPlaintextSecret
        protocol: HTTP
    Connectivity.CreateConnectionRequestSecretsNames:
      required:
      - type
      type: object
      properties:
        type:
          type: string

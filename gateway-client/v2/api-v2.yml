        \ a specific Branch** specify the Branch's name as `branchName`. A new transaction\
        \ will \nbe created and committed on this branch. By default the TransactionType\
        \ will be `UPDATE`, to override this\ndefault specify `transactionType` in\
        \ addition to `branchName`. \nSee [createBranch](/docs/foundry/api/datasets-resources/branches/create-branch/)\
        \ to create a custom branch.\nTo **upload a file on a manually opened transaction**\
        \ specify the Transaction's resource identifier as\n`transactionRid`. This\
        \ is useful for uploading multiple files in a single transaction. \nSee [createTransaction](/docs/foundry/api/datasets-resources/transactions/create-transaction/)\
        \ to open a transaction.\n"
      operationId: datasetsUploadFile
      parameters:
      - name: datasetRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Datasets.DatasetRid"
      - name: filePath
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.FilePath"
      - name: branchName
        in: query
        description: |

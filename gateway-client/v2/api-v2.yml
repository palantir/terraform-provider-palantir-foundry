          description: "The domain name, IPv4, or IPv6 address."
          example: my-rest-api.com
        port:
          type: integer
          description: The port number of the domain that the connection is allowed
            to access.
          example: 443
        scheme:
          $ref: "#/components/schemas/Connectivity.UriScheme"
      description: The domain that the connection is allowed to access.
      example:
        host: my-rest-api.com
        port: 443
        scheme: HTTP
    Connectivity.DomainMustUseHttpsWithAuthentication:
      description: |
        The domain must use HTTPS if authentication is required.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            type: object
    Connectivity.DriverContentMustBeUploadedAsJar:
      description: |
        The driver content must be provided as a jar.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            required:
            - driverName
            type: object
            properties:
              driverName:
                type: string
    Connectivity.DriverJarAlreadyExists:
      description: |
        Duplicate jar with different versions already exists on connection.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - CONFLICT
          parameters:
            required:
            - connectionRid
            - driverName
            type: object
            properties:
              connectionRid:
                $ref: "#/components/schemas/Connectivity.ConnectionRid"
              driverName:
                type: string
    Connectivity.EncryptedProperty:
      description: |
        When reading an encrypted property, the secret name representing the encrypted value will be returned.
        When writing to an encrypted property:
        - If a plaintext value is passed as an input, the plaintext value will be encrypted and saved to the property.
        - If a secret name is passed as an input, the secret name must match the existing secret name of the property
          and the property will retain its previously encrypted value.
      example:
        type: asPlaintextValue
        value: myPlaintextSecret
      discriminator:
        propertyName: type
        mapping:
          asPlaintextValue: "#/components/schemas/Connectivity.AsPlaintextValue"
          asSecretName: "#/components/schemas/Connectivity.AsSecretName"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.AsSecretName"
      - $ref: "#/components/schemas/Connectivity.AsPlaintextValue"
    Connectivity.EncryptedPropertyMustBeSpecifiedAsPlaintextValue:
      description: |
        The encrypted property must be specified as a plaintext value.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            required:
            - propertyName
            type: object
            properties:
              propertyName:
                type: string
    Connectivity.ExecuteFileImportPermissionDenied:
      description: Could not execute the FileImport.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - PERMISSION_DENIED
          parameters:
            required:
            - connectionRid
            - fileImportRid
            type: object
            properties:
              connectionRid:
                $ref: "#/components/schemas/Connectivity.ConnectionRid"
              fileImportRid:
                $ref: "#/components/schemas/Connectivity.FileImportRid"
    Connectivity.ExecuteTableImportPermissionDenied:
      description: Could not execute the TableImport.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - PERMISSION_DENIED
          parameters:
            required:
            - connectionRid
            - tableImportRid
            type: object
            properties:
              connectionRid:
                $ref: "#/components/schemas/Connectivity.ConnectionRid"
              tableImportRid:
                $ref: "#/components/schemas/Connectivity.TableImportRid"
    Connectivity.FileAnyPathMatchesFilter:
      required:
      - regex
      - type
      type: object
      properties:
        regex:
          type: string
          description: |
            The regular expression for the relative path to match against.
          example: my-subfolder
        type:
          type: string
      description: |
        If any file has a relative path matching the regular expression, sync all files in the subfolder that are not otherwise filtered.
      example:
        regex: my-subfolder
    Connectivity.FileAtLeastCountFilter:
      required:
      - minFilesCount
      - type
      type: object
      properties:
        minFilesCount:
          type: integer
          description: |
            The minimum number of files remaining expected.
            The value specified must be greater than 0.
          example: 5
        type:
          type: string
      description: Import all filtered files only if there are at least the specified
        number of files remaining.
      example:
        minFilesCount: 5
    Connectivity.FileAtLeastCountFilterInvalidMinCount:
      description: |
        The provided `minFilesCount` property in the FileAtLeastCountFilter must be strictly greater than 0.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            required:
            - minFilesCount
            type: object
            properties:
              minFilesCount:
                type: integer
    Connectivity.FileChangedSinceLastUploadFilter:
      required:
      - type
      type: object
      properties:
        fileProperties:
          type: array
          description: "The criteria on which to determine whether a file has been\
            \ changed or not since the last import. \nIf any of the specified criteria\
            \ have changed, the file is consider changed. The criteria include:\n\n\
            LAST_MODIFIED: The file's last modified timestamp has changed since the\
            \ last import.\nSIZE: The file's size has changed since the last import.\n\
            \nIf no criteria are specified, only newly added files will be imported.\n"
          items:
            $ref: "#/components/schemas/Connectivity.FileProperty"
        type:
          type: string
      description: |
        Only import files that have changed or been added since the last import run. Whether or not a file is considered to be changed is determined by the specified file properties.
        This will exclude files uploaded in any previous imports, regardless of the file import mode used. A SNAPSHOT file import mode does not reset the filter.
      example:
        fileProperties:
        - LAST_MODIFIED
    Connectivity.FileFormat:
      type: string
      description: |
        The format of files in the upstream source.
      example: PARQUET
      enum:
      - AVRO
      - CSV
      - PARQUET
    Connectivity.FileImport:
      required:
      - connectionRid
      - datasetRid
      - displayName
      - importMode
      - rid
      type: object
      properties:
        branchName:
          $ref: "#/components/schemas/Datasets.BranchName"
        connectionRid:
          $ref: "#/components/schemas/Connectivity.ConnectionRid"
        datasetRid:
          $ref: "#/components/schemas/Datasets.DatasetRid"
        displayName:
          $ref: "#/components/schemas/Connectivity.FileImportDisplayName"
        fileImportFilters:
          type: array
          description: "Use filters to limit which files should be imported. Filters\
            \ are applied in the order they are defined. A different ordering of filters\
            \ may lead to a more optimized import. [Learn more about optimizing file\
            \ imports.](/docs/foundry/data-connection/file-based-syncs/#optimize-file-based-syncs)"
          items:
            $ref: "#/components/schemas/Connectivity.FileImportFilter"
        importMode:
          $ref: "#/components/schemas/Connectivity.FileImportMode"
        rid:
          $ref: "#/components/schemas/Connectivity.FileImportRid"
        subfolder:
          type: string
          description: "A subfolder in the external system that will be imported.\
            \ If not specified, defaults to the root folder of the external system."
          example: subfolder1/subfolder2
      example:
        branchName: master
        connectionRid: ri.magritte..source.c078b71b-92f9-41b6-b0df-3760f411120b
        datasetRid: ri.foundry.main.dataset.c26f11c8-cdb3-4f44-9f5d-9816ea1c82da
        displayName: My file import
        fileImportFilters:
        - regex: my-subfolder
          type: pathMatchesFilter
        importMode: SNAPSHOT
        rid: ri.magritte..extract.27bb4f2b-63b8-44b8-a579-4e2bd65ba158
        subfolder: subfolder1/subfolder2
    Connectivity.FileImportCustomFilter:
      required:
      - config
      - type
      type: object
      properties:
        config:
          example:
            my-custom-property: my value
            type: my-custom-file-filter
        type:
          type: string
      description: |
        A custom file import filter. Custom file import filters can be fetched but cannot currently be used
        when creating or updating file imports.
      example:
        config:
          my-custom-property: my value
          type: my-custom-file-filter
    Connectivity.FileImportCustomFilterCannotBeUsedToCreateOrUpdateFileImports:
      description: |
        Custom file import filters can be fetched but cannot currently be used
        when creating or updating file imports.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            required:
            - config
            type: object
            properties:
              config: {}
    Connectivity.FileImportDisplayName:
      type: string
    Connectivity.FileImportFilter:
      description: |
        [Filters](/docs/foundry/data-connection/file-based-syncs/#filters) allow you to filter source files
        before they are imported into Foundry.
      example:
        regex: my-subfolder
        type: pathMatchesFilter
      discriminator:
        propertyName: type
        mapping:
          anyPathMatchesFilter: "#/components/schemas/Connectivity.FileAnyPathMatchesFilter"
          atLeastCountFilter: "#/components/schemas/Connectivity.FileAtLeastCountFilter"
          changedSinceLastUploadFilter: "#/components/schemas/Connectivity.FileChangedSinceLastUploadFilter"
          customFilter: "#/components/schemas/Connectivity.FileImportCustomFilter"
          fileSizeFilter: "#/components/schemas/Connectivity.FileSizeFilter"
          filesCountLimitFilter: "#/components/schemas/Connectivity.FilesCountLimitFilter"
          lastModifiedAfterFilter: "#/components/schemas/Connectivity.FileLastModifiedAfterFilter"
          pathMatchesFilter: "#/components/schemas/Connectivity.FilePathMatchesFilter"
          pathNotMatchesFilter: "#/components/schemas/Connectivity.FilePathNotMatchesFilter"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.FilePathNotMatchesFilter"
      - $ref: "#/components/schemas/Connectivity.FileAnyPathMatchesFilter"
      - $ref: "#/components/schemas/Connectivity.FilesCountLimitFilter"
      - $ref: "#/components/schemas/Connectivity.FileChangedSinceLastUploadFilter"
      - $ref: "#/components/schemas/Connectivity.FileImportCustomFilter"
      - $ref: "#/components/schemas/Connectivity.FileLastModifiedAfterFilter"
      - $ref: "#/components/schemas/Connectivity.FilePathMatchesFilter"
      - $ref: "#/components/schemas/Connectivity.FileAtLeastCountFilter"
      - $ref: "#/components/schemas/Connectivity.FileSizeFilter"
    Connectivity.FileImportMode:
      type: string
      description: "Import mode governs how raw files are read from an external system,\
        \ and written into a Foundry dataset. \n\nSNAPSHOT: Defines a new dataset\
        \ state consisting only of files from a particular import execution.\nAPPEND:\
        \ Purely additive and yields data from previous import executions in addition\
        \ to newly added files.\nUPDATE: Replaces existing files from previous import\
        \ executions based on file names.\n"
      example: SNAPSHOT
      enum:
      - SNAPSHOT
      - APPEND
      - UPDATE
    Connectivity.FileImportNotFound:
      description: The given FileImport could not be found.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - NOT_FOUND
          parameters:
            required:
            - connectionRid
            - fileImportRid
            type: object
            properties:
              connectionRid:
                $ref: "#/components/schemas/Connectivity.ConnectionRid"
              fileImportRid:
                $ref: "#/components/schemas/Connectivity.FileImportRid"
    Connectivity.FileImportNotSupportedForConnection:
      description: |
        The specified connection does not support file imports.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            required:
            - connectionRid
            type: object
            properties:
              connectionRid:
                $ref: "#/components/schemas/Connectivity.ConnectionRid"
    Connectivity.FileImportRid:
      type: string
      description: |
        The Resource Identifier (RID) of a FileImport (also known as a batch sync).
      example: ri.magritte..extract.27bb4f2b-63b8-44b8-a579-4e2bd65ba158
    Connectivity.FileLastModifiedAfterFilter:
      required:
      - type
      type: object
      properties:
        afterTimestamp:
          type: string
          description: |
            Timestamp threshold, specified in ISO-8601 format.
            If not specified, defaults to the timestamp the filter is added to the file import.
          format: date-time
          example: 2020-01-01T00:00:00Z
        type:
          type: string
      description: |
        Only import files that have been modified after a specified timestamp
      example:
        afterTimestamp: 2020-01-01T00:00:00Z
    Connectivity.FilePathMatchesFilter:
      required:
      - regex
      - type
      type: object
      properties:
        regex:
          type: string
          description: |
            Must be written to match the paths relative to the root of the source, even if a subfolder is specified.
          example: my-subfolder
        type:
          type: string
      description: |
        Only import files whose path (relative to the root of the source) matches the regular expression.

        **Example**
        Suppose we are importing files from `relative/subfolder`.
        `relative/subfolder` contains:
        - `relative/subfolder/include-file.txt`
        - `relative/subfolder/exclude-file.txt`
        - `relative/subfolder/other-file.txt`

        With the `relative/subfolder/include-.*.txt` regex, only `relative/subfolder/include-file.txt` will be imported.
      example:
        regex: my-subfolder
    Connectivity.FilePathNotMatchesFilter:
      required:
      - regex
      - type
      type: object
      properties:
        regex:
          type: string
          description: |
            Must be written to match the paths relative to the root of the source, even if a subfolder is specified.
          example: my-subfolder
        type:
          type: string
      description: |
        Only import files whose path (relative to the root of the source) does not match the regular expression.

        **Example**
        Suppose we are importing files from `relative/subfolder`.
        `relative/subfolder` contains:
        - `relative/subfolder/include-file.txt`
        - `relative/subfolder/exclude-file.txt`
        - `relative/subfolder/other-file.txt`

        With the `relative/subfolder/exclude-.*.txt` regex, both `relative/subfolder/include-file.txt` and `relative/subfolder/other-file.txt` will be imported,
        and `relative/subfolder/exclude-file.txt` will be excluded from the import.
      example:
        regex: my-subfolder
    Connectivity.FileProperty:
      type: string
      example: LAST_MODIFIED
      enum:
      - LAST_MODIFIED
      - SIZE
    Connectivity.FileSizeFilter:
      required:
      - type
      type: object
      properties:
        gt:
          $ref: "#/components/schemas/Core.SizeBytes"
        lt:
          $ref: "#/components/schemas/Core.SizeBytes"
        type:
          type: string
      description: |
        Only import files whose size is between the specified minimum and maximum values.
        At least one of `gt` or `lt` should be present.
        If both are present, the value specified for `gt` must be strictly less than `lt - 1`.
    Connectivity.FileSizeFilterGreaterThanCannotBeNegative:
      description: |
        The `gt` property in the FileSizeFilter cannot be a negative number.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            required:
            - gt
            type: object
            properties:
              gt:
                $ref: "#/components/schemas/Core.SizeBytes"
    Connectivity.FileSizeFilterInvalidGreaterThanAndLessThanRange:
      description: |
        The provided `gt` and `lt` properties in the FileSizeFilter are invalid. No files will ever
        satisfy the provided range. The value specified for `gt` must be strictly less than `lt - 1`.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            required:
            - gt
            - lt
            type: object
            properties:
              gt:
                $ref: "#/components/schemas/Core.SizeBytes"
              lt:
                $ref: "#/components/schemas/Core.SizeBytes"
    Connectivity.FileSizeFilterLessThanMustBeOneByteOrLarger:
      description: |
        The `lt` property in the FileSizeFilter must be at least 1 byte.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            required:
            - lt
            type: object
            properties:
              lt:
                $ref: "#/components/schemas/Core.SizeBytes"
    Connectivity.FileSizeFilterMissingGreaterThanAndLessThan:
      description: |
        Both the `gt` and `lt` properties are missing from the FileSizeFilter. At least one of these
        properties must be present
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            type: object
    Connectivity.FilesCountLimitFilter:
      required:
      - filesCount
      - type
      type: object
      properties:
        filesCount:
          type: integer
          description: The number of files to import in the transaction. The value
            specified must be positive.
          example: 5
        type:
          type: string
      description: |
        Only retain `filesCount` number of files in each transaction.
        The choice of files to retain is made without any guarantee of order.
        This option can increase the reliability of incremental syncs.
      example:
        filesCount: 5
    Connectivity.FilesCountLimitFilterInvalidLimit:
      description: |
        The `filesCount` property in the FilesCountLimitFilter must be strictly greater than 0.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            required:
            - filesCount
            type: object
            properties:
              filesCount:
                type: integer
    Connectivity.FilesVirtualTableConfig:
      required:
      - format
      - path
      - type
      type: object
      properties:
        format:
          $ref: "#/components/schemas/Connectivity.FileFormat"
        path:
          type: string
          description: "Storage path for the data in the underlying file system, i.e.\
            \ paths like `/foo/bar`. The scheme is not \nincluded. May be either a\
            \ folder or file. A non-partitioned table will have a single location.\
            \ A \npartitioned table can have multiple locations, one for each partition.\n"
        type:
          type: string
      description: "Pointer to the table in cloud object storage (e.g., Azure Data\
        \ Lake Storage, Google Cloud Storage, S3)."
      example:
        format: PARQUET
    Connectivity.FolderRid:
      type: string
      description: The unique resource identifier (RID) of a Folder.
      example: ri.compass.main.folder.c410f510-2937-420e-8ea3-8c9bcb3c1791
    Connectivity.FoundryWorker:
      required:
      - type
      type: object
      properties:
        networkEgressPolicyRids:
          type: array
          items:
            $ref: "#/components/schemas/Connectivity.NetworkEgressPolicyRid"
        type:
          type: string
      description: "The [Foundry worker](/docs/foundry/data-connection/core-concepts/#foundry-worker)\
        \ is used to run capabilities \nin Foundry.\nThis is the preferred method\
        \ for connections, as these connections benefit from Foundry's containerized\
        \ \nand scalable job execution, improved stability and do not incur the maintenance\
        \ overhead associated with agents.\n"
      example:
        networkEgressPolicyRids:
        - ri.resource-policy-manager.global.network-egress-policy.30c759c9-8c06-45c2-ae83-7bded168a198
    Connectivity.GetConfigurationPermissionDenied:
      description: Could not getConfiguration the Connection.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - PERMISSION_DENIED
          parameters:
            required:
            - connectionRid
            type: object
            properties:
              connectionRid:
                $ref: "#/components/schemas/Connectivity.ConnectionRid"
    Connectivity.GlueVirtualTableConfig:
      required:
      - database
      - table
      - type
      type: object
      properties:
        database:
          type: string
          description: The database name.
        table:
          type: string
          description: The table name.
        type:
          type: string
      description: Pointer to the table in AWS Glue.
    Connectivity.HeaderApiKey:
      required:
      - headerName
      - type
      type: object
      properties:
        headerName:
          type: string
          description: The name of the header that the API key is passed in.
          example: X-API-KEY
        type:
          type: string
      example:
        headerName: X-API-KEY
    Connectivity.HostNameCannotHaveProtocolOrPort:
      description: |
        The hostname should not include a protocol (e.g., https://) or port number (e.g., :443).
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            required:
            - hostName
            type: object
            properties:
              hostName:
                type: string
    Connectivity.IcebergVirtualTableConfig:
      required:
      - tableIdentifier
      - type
      type: object
      properties:
        tableIdentifier:
          type: string
          description: The identifier of the Iceberg table.
        type:
          type: string
        warehousePath:
          type: string
          description: |
            The path to the folder in the file system containing the Iceberg table. Can be omitted when the
            connection is configured with a catalog that does not rely on warehouse path.
      description: Pointer to the Iceberg table.
    Connectivity.IntegerColumnInitialIncrementalState:
      required:
      - columnName
      - currentValue
      - type
      type: object
      properties:
        columnName:
          type: string
          example: myIdColumn
        currentValue:
          type: integer
          description: |
            The initial incremental state value for the integer column to reference in the query.
          example: 1
        type:
          type: string
      description: |
        The state for an incremental table import using a numeric integer datatype.
      example:
        columnName: myIdColumn
        currentValue: 1
    Connectivity.InvalidConnectionReason:
      type: string
      description: |
        Reasons why a connection configuration is invalid.
      example: INVALID_CREDENTIALS
      enum:
      - CONNECTION_NOT_FOUND
      - INVALID_CREDENTIALS
      - NETWORK_POLICY_VIOLATION
      - CONNECTION_UNAVAILABLE
      - CANNOT_DESERIALIZE
      - CANNOT_SUBSTITUTE_SECRETS
      - CANNOT_USE_USER_HOME_FOLDER
      - INVALID_SOURCE_RUNTIME
      - INVALID_SOURCE_TYPE
      - MISSING_CREDENTIALS
      - MISSING_PROXY_SETTINGS
      - NOT_CLOUD_RUNTIME
      - NO_AGENTS_ASSIGNED
      - SERVICE_UNAVAILABLE
      - TOO_MANY_REQUESTS
      - AZURE_CONTAINER_DOES_NOT_EXIST
      - AZURE_MANAGED_IDENTITY_AUTH_NOT_SUPPORTED
      - AZURE_REFRESH_TOKEN_AUTH_NOT_SUPPORTED
      - AZURE_SHARED_ACCESS_SIGNATURE_AUTH_NOT_SUPPORTED
      - AZURE_SHARED_KEY_AUTH_NOT_SUPPORTED
      - AZURE_TENANT_NOT_FOUND
      - INVALID_ABFS_ROOT_DIRECTORY
      - INVALID_CLIENT_ENDPOINT
      - DATABRICKS_AUTH_UNSUPPORTED
      - DATABRICKS_BASIC_AUTH_NOT_SUPPORTED
      - DATABRICKS_INVALID_CLIENT_CREDENTIALS
      - DATABRICKS_INVALID_HOST
      - DATABRICKS_INVALID_HTTP_PATH
      - DATABRICKS_INVALID_OIDC_CREDENTIALS
      - DATABRICKS_INVALID_TOKEN_URL
      - GCP_INSTANCE_AUTH_NOT_SUPPORTED
      - GCP_INVALID_OIDC_CREDENTIALS
      - INVALID_GCS_CONFIG
      - INVALID_GCS_URL
      - GCS_INVALID_PREFIX_PATH
      - MISSING_GLUE_CATALOG
      - INVALID_HIVE_URL
      - INVALID_KERBEROS_URL
      - MISSING_HIVE_CONFIGURATION

      type: object
      properties:
        seriesId:
          $ref: "#/components/schemas/Ontologies.SeriesId"
        syncRid:
          $ref: "#/components/schemas/Ontologies.TimeseriesSyncRid"
      description: The representation of a time series property backed by multiple
        time series syncs.
    Ontologies.Query:
      type: string

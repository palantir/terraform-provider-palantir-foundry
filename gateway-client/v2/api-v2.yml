    Ontologies.PropertyValue:
      description: "Represents the value of a property in the following format.\n\n\
        | Type                                                                   \
        \                                                   | JSON encoding      \
        \                                         | Example                      \
        \                                                                      |\n\
        |---------------------------------------------------------------------------------------------------------------------------|-------------------------------------------------------------|----------------------------------------------------------------------------------------------------|\n\

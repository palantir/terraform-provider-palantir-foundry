  /v2/ontologies/{ontology}/interfaces/{interfaceType}/{objectType}/{primaryKey}/links/{interfaceLinkType}:
    get:
      tags:
      - OntologiesApiService
      description: |
        Lists the linked objects for a specific object and the given interface link type.

        Note that this endpoint does not guarantee consistency. Changes to the data could result in missing or
        repeated objects in the response pages.

        For Object Storage V1 backed objects, this endpoint returns a maximum of 10,000 objects. After 10,000 objects have been returned and if more objects
        are available, attempting to load another page will result in an `ObjectsExceededLimit` error being returned. There is no limit on Object Storage V2 backed objects.

        Each page may be smaller or larger than the requested page size. However, it
        is guaranteed that if there are more results available, at least one result will be present
        in the response.

        Note that null value properties will not be returned.
      operationId: ontologiesListInterfaceLinkedObjects
      parameters:
      - name: ontology
        in: path
        description: |
          The API name of the ontology. To find the API name, use the **List ontologies** endpoint or
          check the **Ontology Manager**.
        required: true
        schema:
          $ref: "#/components/schemas/Ontologies.OntologyIdentifier"
        example: palantir
      - name: interfaceType
        in: path
        description: |
          The API name of the interface type. To find the API name, use the **List interface types** endpoint or
          check the **Ontology Manager** application.
        required: true
        schema:
          $ref: "#/components/schemas/Ontologies.InterfaceTypeApiName"
        example: Employee
      - name: interfaceLinkType
        in: path
        description: "The API name of the outgoing interface link.\nTo find the API\
          \ name for your interface link type, check the **Ontology Manager** page\
          \ for the \nparent interface.\n"
        required: true
        schema:
          $ref: "#/components/schemas/Ontologies.InterfaceLinkTypeApiName"
        example: worksAt
      - name: objectType
        in: path
        description: |
          The API name of the object type. To find the API name, use the **List object types** endpoint or
          check the **Ontology Manager**.
        required: true
        schema:
          $ref: "#/components/schemas/Ontologies.ObjectTypeApiName"
        example: employee
      - name: primaryKey
        in: path
        description: "The primary key of the object from which to **start** the interface\
          \ link traversal. To look up the expected \nprimary key for your object\
          \ type, use the `Get object type` endpoint or the **Ontology Manager**.\n"
        required: true
        schema:
          $ref: "#/components/schemas/Ontologies.PropertyValueEscapedString"
      - name: pageSize
        in: query
        description: |
          The desired size of the page to be returned. Defaults to 1,000.
          See [page sizes](/docs/foundry/api/general/overview/paging/#page-sizes) for details.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PageSize"
      - name: pageToken
        in: query
        required: false
        schema:
          $ref: "#/components/schemas/Core.PageToken"
      - name: select
        in: query
        description: |
          The properties of the object type that should be included in the response. Omit this parameter to get all
          the properties.
        required: false
        schema:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.SelectedPropertyApiName"
      - name: orderBy
        in: query
        required: false
        schema:
          $ref: "#/components/schemas/Ontologies.OrderBy"
      - name: excludeRid
        in: query
        description: "A flag to exclude the retrieval of the `__rid` property. \n\
          Setting this to true may improve performance of this endpoint for object\
          \ types in OSV2.\n"
        required: false
        schema:
          type: boolean
      - name: snapshot
        in: query
        description: |
          A flag to use snapshot consistency when paging.
          Setting this to true will give you a consistent view from before you start paging through the results, ensuring you do not get duplicate or missing items.
          Setting this to false will let new results enter as you page, but you may encounter duplicate or missing items.
          This defaults to false if not specified, which means you will always get the latest results.
        required: false
        schema:
          type: boolean
      - name: branch
        in: query
        description: |
          The Foundry branch to get the outgoing link types for an object type from. If not specified, the default branch will be used.
          Branches are an experimental feature and not all workflows are supported.
        required: false
        schema:
          $ref: "#/components/schemas/Core.FoundryBranch"
      - name: preview
        in: query
        description: |
          A boolean flag that, when set to true, enables the use of beta features in preview mode.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      responses:
        "200":
          description: Success response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ontologies.ListInterfaceLinkedObjectsResponse"
              example:
                data:
                - $interfaceTypeApiName: Person
                  $objectTypeApiName: Employee
                  $primaryKey: 50030
                  $rid: ri.phonograph2-objects.main.object.88a6fccb-f333-46d6-a07e-7725c5f18b61
                  firstName: John
                  id: 50030
                  lastName: Doe
                - $interfaceTypeApiName: Person
                  $objectTypeApiName: Employee
                  $primaryKey: 20090
                  $rid: ri.phonograph2-objects.main.object.dcd887d1-c757-4d7a-8619-71e6ec2c25ab
                  firstName: John
                  id: 20090
                  lastName: Haymore
                nextPageToken: v1.QnVpbGQgdGhlIEZ1dHVyZTogaHR0cHM6Ly93d3cucGFsYW50aXIuY29tL2NhcmVlcnMvP2xldmVyLXNvdXJjZSU1YiU1ZD1BUElEb2NzI29wZW4tcG9zaXRpb25z
      security:
      - BearerAuth: []
      x-releaseStage: PRIVATE_BETA

      - errorCode
      - parameters
      properties:
        errorCode:
          type: string
          enum:
          - INVALID_ARGUMENT
        errorInstanceId:
          type: string
          format: uuid
        errorName:
          type: string
        parameters:
          required:
          - propertyName
          type: object
          properties:
            propertyName:
              type: string
      description: |
        The encrypted property must be specified as a plaintext value.

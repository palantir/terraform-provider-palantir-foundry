      required:
      - baseType
      - required
      type: object
      properties:
        baseType:
          $ref: "#/components/schemas/Ontologies.ValueType"
        dataType:
          $ref: "#/components/schemas/Ontologies.OntologyDataType"
        description:
          type: string
        required:
          type: boolean
      description: Details about a parameter of an action or query.
    Ontologies.ParameterEvaluatedConstraint:
      description: "A constraint that an action parameter value must satisfy in order\
        \ to be considered valid.\nConstraints can be configured on action parameters\
        \ in the **Ontology Manager**. \nApplicable constraints are determined dynamically\
        \ based on parameter inputs. \nParameter values are evaluated against the\
        \ final set of constraints.\n\nThe type of the constraint.\n| Type       \
        \           | Description                                                \
        \                                                                        \
        \                                                                        \
        \                     |\n|-----------------------|---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|\n\
        | `arraySize`           | The parameter expects an array of values and the\
        \ size of the array must fall within the defined range.                  \
        \                                                                        \
        \                                |\n| `groupMember`         | The parameter\
        \ value must be the user id of a member belonging to at least one of the groups\
        \ defined by the constraint.                                             \
        \                                                             |\n| `objectPropertyValue`\
        \ | The parameter value must be a property value of an object found within\
        \ an object set.                                                         \
        \                                                                        \
        \          |\n| `objectQueryResult`   | The parameter value must be the primary\
        \ key of an object found within an object set.                           \
        \                                                                        \
        \                                         |\n| `oneOf`               | The\
        \ parameter has a manually predefined set of options.                    \
        \                                                                        \
        \                                                                        \
        \     |\n| `range`               | The parameter value must be within the\
        \ defined range.                                                         \
        \                                                                        \
        \                                          |\n| `stringLength`        | The\
        \ parameter value must have a length within the defined range.           \
        \                                                                        \
        \                                                                        \
        \     |\n| `stringRegexMatch`    | The parameter value must match a predefined\
        \ regular expression.                                                    \
        \                                                                        \
        \                                     |\n| `unevaluable`         | The parameter\
        \ cannot be evaluated because it depends on another parameter or object set\
        \ that can't be evaluated. This can happen when a parameter's allowed values\
        \ are defined by another parameter that is missing or invalid. |\n"
      discriminator:
        propertyName: type
        mapping:
          array: "#/components/schemas/Ontologies.ArrayEvaluatedConstraint"
          arraySize: "#/components/schemas/Ontologies.ArraySizeConstraint"
          groupMember: "#/components/schemas/Ontologies.GroupMemberConstraint"
          objectPropertyValue: "#/components/schemas/Ontologies.ObjectPropertyValueConstraint"
          objectQueryResult: "#/components/schemas/Ontologies.ObjectQueryResultConstraint"
          oneOf: "#/components/schemas/Ontologies.OneOfConstraint"
          range: "#/components/schemas/Ontologies.RangeConstraint"
          stringLength: "#/components/schemas/Ontologies.StringLengthConstraint"
          stringRegexMatch: "#/components/schemas/Ontologies.StringRegexMatchConstraint"
          struct: "#/components/schemas/Ontologies.StructEvaluatedConstraint"
          unevaluable: "#/components/schemas/Ontologies.UnevaluableConstraint"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.StructEvaluatedConstraint"
      - $ref: "#/components/schemas/Ontologies.OneOfConstraint"
      - $ref: "#/components/schemas/Ontologies.ArrayEvaluatedConstraint"
      - $ref: "#/components/schemas/Ontologies.GroupMemberConstraint"
      - $ref: "#/components/schemas/Ontologies.ObjectPropertyValueConstraint"
      - $ref: "#/components/schemas/Ontologies.RangeConstraint"
      - $ref: "#/components/schemas/Ontologies.ArraySizeConstraint"
      - $ref: "#/components/schemas/Ontologies.ObjectQueryResultConstraint"
      - $ref: "#/components/schemas/Ontologies.StringLengthConstraint"
      - $ref: "#/components/schemas/Ontologies.StringRegexMatchConstraint"
      - $ref: "#/components/schemas/Ontologies.UnevaluableConstraint"

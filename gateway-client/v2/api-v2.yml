      description: Delete the Release with the specified version.
      operationId: widgetsDeleteRelease
      parameters:
      - name: widgetSetRid
        in: path
        description: A Resource Identifier (RID) identifying a widget set.
        required: true
        schema:
          $ref: "#/components/schemas/Widgets.WidgetSetRid"
        example: ri.widgetregistry..widget-set.21dt2c42-b7df-4b23-880b-1436a3dred2e
      - name: releaseVersion
        in: path
        description: The semantic version of the widget set.
        required: true
        schema:
          $ref: "#/components/schemas/Widgets.ReleaseVersion"
        example: 1.2.0
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Widgets.DeleteReleasePermissionDenied"
      security:
      - BearerAuth: []
      x-releaseStage: PRIVATE_BETA

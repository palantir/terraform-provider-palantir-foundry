            example:
              secrets:
                Password: MySecretPassword
        required: true
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connectivity.SecretNamesDoNotExist"

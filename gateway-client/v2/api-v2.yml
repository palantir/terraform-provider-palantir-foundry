          type: string
          description: "An object set with objects that implement the interface with\
            \ the given interface API name. The objects in \nthe object set will only\
            \ have properties that implement properties of the given interface, unless\
            \ you set the includeAllBaseObjectProperties flag.\n"
        type:
          type: string

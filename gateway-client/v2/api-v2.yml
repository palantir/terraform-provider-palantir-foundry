      - $ref: "#/components/schemas/Connectivity.ReplaceTableImportRequestJdbcTableImportConfig"
      - $ref: "#/components/schemas/Connectivity.ReplaceTableImportRequestMicrosoftSqlServerTableImportConfig"
      - $ref: "#/components/schemas/Connectivity.ReplaceTableImportRequestPostgreSqlTableImportConfig"
      - $ref: "#/components/schemas/Connectivity.ReplaceTableImportRequestMicrosoftAccessTableImportConfig"
      - $ref: "#/components/schemas/Connectivity.ReplaceTableImportRequestSnowflakeTableImportConfig"
      - $ref: "#/components/schemas/Connectivity.ReplaceTableImportRequestOracleTableImportConfig"
    Connectivity.ReplaceTableImportRequestTableImportInitialIncrementalState:
      description: "The incremental configuration for a table import enables append-style\
        \ transactions from the same table without duplication of data.\nYou must\
        \ provide a monotonically increasing column such as a timestamp or id and\
        \ an initial value for this column. \nAn incremental table import will import\
        \ rows where the value is greater than the largest already imported.\n\nYou\
        \ can use the '?' character to reference the incremental state value when\
        \ constructing your query. \nNormally this would be used in a WHERE clause\
        \ or similar filter applied in order to only sync data with an incremental\
        \ column value \nlarger than the previously observed maximum value stored\
        \ in the incremental state.\n"
      discriminator:
        propertyName: type
        mapping:
          dateColumnInitialIncrementalState: "#/components/schemas/Connectivity.ReplaceTableImportRequestDateColumnInitialIncrementalState"
          decimalColumnInitialIncrementalState: "#/components/schemas/Connectivity.ReplaceTableImportRequestDecimalColumnInitialIncrementalState"
          integerColumnInitialIncrementalState: "#/components/schemas/Connectivity.ReplaceTableImportRequestIntegerColumnInitialIncrementalState"
          longColumnInitialIncrementalState: "#/components/schemas/Connectivity.ReplaceTableImportRequestLongColumnInitialIncrementalState"
          stringColumnInitialIncrementalState: "#/components/schemas/Connectivity.ReplaceTableImportRequestStringColumnInitialIncrementalState"
          timestampColumnInitialIncrementalState: "#/components/schemas/Connectivity.ReplaceTableImportRequestTimestampColumnInitialIncrementalState"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.ReplaceTableImportRequestStringColumnInitialIncrementalState"
      - $ref: "#/components/schemas/Connectivity.ReplaceTableImportRequestDateColumnInitialIncrementalState"
      - $ref: "#/components/schemas/Connectivity.ReplaceTableImportRequestIntegerColumnInitialIncrementalState"
      - $ref: "#/components/schemas/Connectivity.ReplaceTableImportRequestTimestampColumnInitialIncrementalState"
      - $ref: "#/components/schemas/Connectivity.ReplaceTableImportRequestLongColumnInitialIncrementalState"
      - $ref: "#/components/schemas/Connectivity.ReplaceTableImportRequestDecimalColumnInitialIncrementalState"
    Connectivity.ReplaceTableImportRequestTimestampColumnInitialIncrementalState:
      required:
      - columnName
      - currentValue
      - type
      type: object
      properties:
        columnName:
          type: string
          example: myTimeColumn
        currentValue:
          type: string
          description: |
            The initial incremental state value for the timestamp column in UTC to reference in the query.
          format: date-time
          example: 2020-09-30T14:30:00Z
        type:
          type: string
      example:
        columnName: myTimeColumn
        currentValue: 2020-09-30T14:30:00Z
    Connectivity.RestAuthenticationMode:
      description: The method of authentication for connecting to an external REST
        system.
      discriminator:
        propertyName: type
        mapping:
          apiKey: "#/components/schemas/Connectivity.ApiKeyAuthentication"
          basic: "#/components/schemas/Connectivity.BasicCredentials"
          bearerToken: "#/components/schemas/Connectivity.BearerToken"
          oauth2: "#/components/schemas/Connectivity.RestConnectionOAuth2"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.BearerToken"
      - $ref: "#/components/schemas/Connectivity.ApiKeyAuthentication"
      - $ref: "#/components/schemas/Connectivity.BasicCredentials"
      - $ref: "#/components/schemas/Connectivity.RestConnectionOAuth2"
    Connectivity.RestConnectionAdditionalSecrets:
      description: |
        When creating or updating additional secrets, use SecretsWithPlaintextValues.
        When fetching the RestConnectionConfiguration, SecretsNames will be provided.
      discriminator:
        propertyName: type
        mapping:
          asSecretsNames: "#/components/schemas/Connectivity.SecretsNames"
          asSecretsWithPlaintextValues: "#/components/schemas/Connectivity.SecretsWithPlaintextValues"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.SecretsWithPlaintextValues"
      - $ref: "#/components/schemas/Connectivity.SecretsNames"
    Connectivity.RestConnectionConfiguration:
      required:
      - type
      type: object
      properties:
        additionalSecrets:
          $ref: "#/components/schemas/Connectivity.RestConnectionAdditionalSecrets"
        domains:
          type: array
          description: |
            The domains that the connection is allowed to access.
            At least one domain must be specified.
          items:
            $ref: "#/components/schemas/Connectivity.Domain"
        oauth2ClientRid:
          type: string
          description: |
            The RID of the [Outbound application](/docs/foundry/administration/configure-outbound-applications) that is used to authenticate to the external system via OAuth2.
            Currently, a connection may use only one outbound application for OAuth 2.0 authentication.
            Selecting a different outbound application will update the configuration for all domains with OAuth 2.0 as the selected authorization.
        type:
          type: string
      description: "The configuration needed to connect to a [REST external system](/docs/foundry/available-connectors/rest-apis)."
      example:
        domains:
        - host: my-rest-api.com
          port: 443
          scheme: HTTP
    Connectivity.RestConnectionOAuth2:
      required:
      - type
      type: object
      properties:
        type:
          type: string
      description: |
        In order to use OAuth2 you must have an Outbound application configured in the [Foundry Control Panel Organization settings](/docs/foundry/administration/configure-outbound-applications#create-an-outbound-application).
        The RID of the Outbound application must be configured in the RestConnectionConfiguration in the `oauth2ClientRid` field.
    Connectivity.RestRequestApiKeyLocation:
      description: The location of the API key in the request.
      discriminator:
        propertyName: type
        mapping:
          header: "#/components/schemas/Connectivity.HeaderApiKey"
          queryParameter: "#/components/schemas/Connectivity.QueryParameterApiKey"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.HeaderApiKey"
      - $ref: "#/components/schemas/Connectivity.QueryParameterApiKey"
    Connectivity.S3AuthenticationMode:
      discriminator:
        propertyName: type
        mapping:
          awsAccessKey: "#/components/schemas/Connectivity.AwsAccessKey"
          cloudIdentity: "#/components/schemas/Connectivity.CloudIdentity"
          oidc: "#/components/schemas/Connectivity.AwsOidcAuthentication"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.AwsAccessKey"
      - $ref: "#/components/schemas/Connectivity.CloudIdentity"
      - $ref: "#/components/schemas/Connectivity.AwsOidcAuthentication"
    Connectivity.S3ConnectionConfiguration:
      required:
      - bucketUrl
      - type
      type: object
      properties:
        authenticationMode:
          $ref: "#/components/schemas/Connectivity.S3AuthenticationMode"
        bucketUrl:
          type: string
          description: The URL of the S3 bucket. The URL should contain a trailing
            slash.
          example: s3://my-test-bucket/
        clientKmsConfiguration:
          $ref: "#/components/schemas/Connectivity.S3KmsConfiguration"
        connectionTimeoutMillis:
          type: string
          description: |
            The amount of time (in milliseconds) to wait when initially establishing a connection before giving up and timing out.
            If not specified, defaults to 10000 as defined by the [AWS SDK default](https://docs.aws.amazon.com/AWSJavaSDK/latest/javadoc/com/amazonaws/ClientConfiguration.html#DEFAULT_CONNECTION_TIMEOUT).
          format: long
        enableRequesterPays:
          type: boolean
          description: |
            Defaults to false, unless set and overwritten.
            If true, includes the [requester pays header](https://docs.aws.amazon.com/AmazonS3/latest/userguide/RequesterPaysBuckets.html)
            in requests, allowing reads from requester pays buckets.
        matchSubfolderExactly:
          type: boolean
          description: |
            If true, only files in the subfolder specified in the bucket URL will be synced.
            If false, all files in the bucket will be synced.
            If not specified, defaults to false.
        maxConnections:
          type: integer
          description: |
            The maximum number of HTTP connections to the S3 service per sync.
            If not specified, defaults to 50 as defined by the [AWS SDK default](https://docs.aws.amazon.com/AWSJavaSDK/latest/javadoc/com/amazonaws/ClientConfiguration.html#DEFAULT_MAX_CONNECTIONS).
        maxErrorRetry:
          type: integer
          description: |
            The maximum number of retry attempts for failed requests to the S3 service.
            If not specified, defaults to 3 as defined by the [AWS SDK default](https://docs.aws.amazon.com/sdk-for-java/latest/developer-guide/retry-strategy.html#retry-strategies).
        proxyConfiguration:
          $ref: "#/components/schemas/Connectivity.S3ProxyConfiguration"
        region:
          $ref: "#/components/schemas/Connectivity.Region"
        s3Endpoint:
          type: string
          description: |
            The endpoint of the S3 service. This is used to connect to a custom S3 service that is not AWS S3.
            If not specified, defaults to the [AWS S3 endpoint](https://docs.aws.amazon.com/general/latest/gr/s3.html).
            Warning: Specifying a region and a custom endpoint containing a region can lead to unexpected behavior.
          example: https://my-custom-s3-endpoint.com
        s3EndpointSigningRegion:
          $ref: "#/components/schemas/Connectivity.Region"
        socketTimeoutMillis:
          type: string
          description: |
            The amount of time (in milliseconds) to wait for data to be transferred over an established, open connection.
            If not specified, defaults to 50000 as defined by the [AWS SDK default](https://docs.aws.amazon.com/AWSJavaSDK/latest/javadoc/com/amazonaws/ClientConfiguration.html#DEFAULT_SOCKET_TIMEOUT).
          format: long
        stsRoleConfiguration:
          $ref: "#/components/schemas/Connectivity.StsRoleConfiguration"
        type:
          type: string
      description: |
        The configuration needed to connect to an [AWS S3 external system (or any other S3-like external systems that
        implement the s3a protocol)](/docs/foundry/available-connectors/amazon-s3/#amazon-s3).
      example:
        bucketUrl: s3://my-test-bucket/
        clientKmsConfiguration:
          kmsKey: arn:aws:kms:us-west-1:123456789012:key/1234abcd-12ab-34cd-56ef-1234567890ab
          kmsRegion: us-west-1
        proxyConfiguration:
          credentials:
            password:
              type: asPlaintextValue
              value: myPlaintextSecret
          protocol: HTTP
        region: us-west-1
        s3Endpoint: https://my-custom-s3-endpoint.com
        s3EndpointSigningRegion: us-west-1
        stsRoleConfiguration:
          roleArn: arn:aws:iam::123456789012:role/my-role
          roleSessionDuration:
            unit: SECONDS
            value: 30
          stsEndpoint: https://sts.us-west-1.amazonaws.com
    Connectivity.S3KmsConfiguration:
      required:
      - kmsKey
      type: object
      properties:
        kmsKey:
          type: string
          description: |
            The client-side KMS key to use for encryption and decryption of data in the S3 bucket.
            If not specified, the default KMS key for the bucket is used.
          example: arn:aws:kms:us-west-1:123456789012:key/1234abcd-12ab-34cd-56ef-1234567890ab
        kmsRegion:
          $ref: "#/components/schemas/Connectivity.Region"
      example:
        kmsKey: arn:aws:kms:us-west-1:123456789012:key/1234abcd-12ab-34cd-56ef-1234567890ab
        kmsRegion: us-west-1
    Connectivity.S3ProxyConfiguration:
      required:
      - host
      - port
      type: object
      properties:
        credentials:
          $ref: "#/components/schemas/Connectivity.BasicCredentials"
        host:
          type: string
          description: "Domain name, IPv4, or IPv6 address. \n`protocol` and `port`\
            \ must be specified separately.\n"
        nonProxyHosts:
          type: array
          description: "A list of hosts that can bypass the proxy, such as those used\
            \ for STS Role. You can also use \"*\" wildcards."
          items:
            type: string
        port:
          type: integer
        protocol:
          $ref: "#/components/schemas/Connectivity.Protocol"
      example:
        credentials:
          password:
            type: asPlaintextValue
            value: myPlaintextSecret
        protocol: HTTP
    Connectivity.SecretName:
      type: string
      example: Password
    Connectivity.SecretNamesDoNotExist:
      required:
      - errorName
      - errorCode
      - parameters
      properties:
        errorCode:
          type: string
          enum:
          - INVALID_ARGUMENT
        errorInstanceId:
          type: string
          format: uuid
        errorName:
          type: string
        parameters:
          required:
          - connectionRid
          type: object
          properties:
            connectionRid:
              $ref: "#/components/schemas/Connectivity.ConnectionRid"
            secretNames:
              type: array
              items:
                $ref: "#/components/schemas/Connectivity.SecretName"
      description: |
        The secret names provided do not exist on the connection.
    Connectivity.SecretsNames:
      required:
      - type
      type: object
      properties:
        secretNames:
          type: array
          description: The names of the additional secrets that can be referenced
            in code and webhook configurations.
          items:
            $ref: "#/components/schemas/Connectivity.SecretName"
        type:
          type: string
      description: |
        A list of secret names that can be referenced in code and webhook configurations.
        This will be provided to the client when fetching the RestConnectionConfiguration.
      example:
        secretNames:
        - Password
    Connectivity.SecretsWithPlaintextValues:
      required:
      - type
      type: object
      properties:
        secrets:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Connectivity.PlaintextValue"
          description: The additional secrets that can be referenced in code and webhook
            configurations.
        type:
          type: string
      description: |
        A map representing secret name to plaintext secret value pairs.
        This should be used when creating or updating additional secrets for a REST connection.
      example:
        secrets:
          Password: MySecretPassword
    Connectivity.SnowflakeAuthenticationMode:
      discriminator:
        propertyName: type
        mapping:
          basic: "#/components/schemas/Connectivity.BasicCredentials"
          externalOauth: "#/components/schemas/Connectivity.SnowflakeExternalOauth"
          keyPair: "#/components/schemas/Connectivity.SnowflakeKeyPairAuthentication"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.SnowflakeExternalOauth"
      - $ref: "#/components/schemas/Connectivity.SnowflakeKeyPairAuthentication"
      - $ref: "#/components/schemas/Connectivity.BasicCredentials"
    Connectivity.SnowflakeConnectionConfiguration:
      required:
      - accountIdentifier
      - authenticationMode
      - jdbcProperties
      - type
      type: object
      properties:
        accountIdentifier:
          type: string
          description: "An [account identifier](https://docs.snowflake.com/en/user-guide/admin-account-identifier)\
            \ uniquely \nidentifies a Snowflake account within your organization,\
            \ as well as throughout the global network of \nSnowflake-supported cloud\
            \ platforms and cloud regions.\n\nThe URL for an account uses the following\
            \ format: <account_identifier>.snowflakecomputing.com.\nAn example URL\
            \ is https://acme-test_aws_us_east_2.snowflakecomputing.com.\n"
          example: acme-test_aws_us_east_2
        authenticationMode:
          $ref: "#/components/schemas/Connectivity.SnowflakeAuthenticationMode"
        database:
          type: string
          description: |
            Specifies the default database to use once connected. If unspecified, defaults to the empty string.
            The specified database should be an existing database for which the specified default role has privileges.

            See https://docs.snowflake.com/developer-guide/jdbc/jdbc-parameters#db
          example: mydatabase
        jdbcProperties:
          $ref: "#/components/schemas/Connectivity.JdbcProperties"
        role:
          type: string
          description: "Specifies the default access control role to use in the Snowflake\
            \ session initiated by the driver. \nIf unspecified, no role will be used\
            \ when the session is initiated by the driver.\n\nThe specified role should\
            \ be an existing role that has already been assigned to the specified\
            \ user for \nthe driver. If the specified role has not already been assigned\
            \ to the user, the role is not used when \nthe session is initiated by\
            \ the driver.\n\nSee https://docs.snowflake.com/developer-guide/jdbc/jdbc-parameters#role\n"
          example: myrole
        schema:
          type: string
          description: "Specifies the default schema to use for the specified database\
            \ once connected. If unspecified, \ndefaults to the empty string.\nThe\
            \ specified schema should be an existing schema for which the specified\
            \ default role has privileges.\n\nSee https://docs.snowflake.com/developer-guide/jdbc/jdbc-parameters#schema\n"
          example: myschema
        type:
          type: string
        warehouse:
          type: string
          description: "Specifies the virtual warehouse to use once connected. If\
            \ unspecified, defaults to the empty string. \nThe specified warehouse\
            \ should be an existing warehouse for which the specified default role\
            \ has privileges.\n\nSee https://docs.snowflake.com/developer-guide/jdbc/jdbc-parameters#warehouse\n"
          example: mywarehouse
      description: |
        The configuration needed to connect to a Snowflake database.
      example:
        accountIdentifier: acme-test_aws_us_east_2
        database: mydatabase
        jdbcProperties:
          propertyName1: propertyValue1
          propertyName2: propertyValue2
        role: myrole
        schema: myschema
        warehouse: mywarehouse
    Connectivity.SnowflakeExternalOauth:
      required:
      - audience
      - issuerUrl
      - subject
      - type
      type: object
      properties:
        audience:
          type: string
          description: Identifies the recipients that the access token is intended
            for as a string URI.
          example: https://example.east-us-1.azure.snowflakecomputing.com
        issuerUrl:
          type: string
          description: Identifies the principal that issued the access token as a
            string URI.
          example: https://pltroidcpublicexample.blob.store.com/foundry
        subject:
          $ref: "#/components/schemas/Connectivity.ConnectionRid"
        type:
          type: string
      description: |
        Use an External OAuth security integration to connect and authenticate to Snowflake.

        See https://docs.snowflake.com/en/user-guide/oauth-ext-custom
      example:
        audience: https://example.east-us-1.azure.snowflakecomputing.com
        issuerUrl: https://pltroidcpublicexample.blob.store.com/foundry
        subject: ri.magritte..source.c078b71b-92f9-41b6-b0df-3760f411120b
    Connectivity.SnowflakeKeyPairAuthentication:
      required:
      - privateKey
      - type
      - user
      type: object
      properties:
        privateKey:
          $ref: "#/components/schemas/Connectivity.EncryptedProperty"
        type:
          type: string
        user:
          type: string
      description: |
        Use a key-pair to connect and authenticate to Snowflake.

        See https://docs.snowflake.com/en/user-guide/key-pair-auth
      example:
        privateKey:
          type: asPlaintextValue
          value: myPlaintextSecret
    Connectivity.SnowflakeTableImportConfig:
      required:
      - query
      - type
      type: object
      properties:
        initialIncrementalState:
          $ref: "#/components/schemas/Connectivity.TableImportInitialIncrementalState"
        query:
          $ref: "#/components/schemas/Connectivity.TableImportQuery"
        type:
          type: string
      description: |
        The table import configuration for a [Snowflake connection](/docs/foundry/available-connectors/snowflake).
      example:
        query: SELECT * FROM table
    Connectivity.StringColumnInitialIncrementalState:
      required:
      - columnName
      - currentValue
      - type
      type: object
      properties:
        columnName:
          type: string
          example: myStringColumn
        currentValue:
          type: string
          description: |
            The initial incremental state value for the string column to reference in the query.
        type:
          type: string
      description: |
        The state for an incremental table import using a column with a string data type.
      example:
        columnName: myStringColumn
    Connectivity.StsRoleConfiguration:
      required:
      - roleArn
      - roleSessionName
      type: object
      properties:
        externalId:
          type: string
          description: |
            A unique identifier that is used by third parties when assuming roles in their customers' accounts.
            For more information, see the official [AWS documentation](https://docs.aws.amazon.com/IAM/latest/UserGuide/id_roles_create_for-user_externalid.html).
        roleArn:
          type: string
          description: |
            The Amazon Resource Name (ARN) of the role to assume.
            For more information, see the official [AWS documentation](https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_elements_principal.html#principal-arn-format).
          example: arn:aws:iam::123456789012:role/my-role
        roleSessionDuration:
          $ref: "#/components/schemas/Core.Duration"
        roleSessionName:
          type: string
          description: |
            An identifier for the assumed role session.
            The value can be any string that you assume will be unique within the AWS account.
            For more information, see the official [AWS documentation](https://docs.aws.amazon.com/STS/latest/APIReference/API_AssumeRole.html#API_AssumeRole_RequestParameters).
        stsEndpoint:
          type: string
          description: |
            By default, the AWS Security Token Service (AWS STS) is available as a global service, and all AWS STS requests go to a single endpoint at https://sts.amazonaws.com.
            AWS recommends using Regional AWS STS endpoints instead of the global endpoint to reduce latency, build in redundancy, and increase session token validity.
          example: https://sts.us-west-1.amazonaws.com
      example:
        roleArn: arn:aws:iam::123456789012:role/my-role
        roleSessionDuration:
          unit: SECONDS
          value: 30
        stsEndpoint: https://sts.us-west-1.amazonaws.com
    Connectivity.TableImport:
      required:
      - allowSchemaChanges
      - config
      - connectionRid
      - datasetRid
      - displayName
      - importMode
      - rid
      type: object
      properties:
        allowSchemaChanges:
          $ref: "#/components/schemas/Connectivity.TableImportAllowSchemaChanges"
        branchName:
          $ref: "#/components/schemas/Datasets.BranchName"
        config:
          $ref: "#/components/schemas/Connectivity.TableImportConfig"
        connectionRid:
          $ref: "#/components/schemas/Connectivity.ConnectionRid"
        datasetRid:
          $ref: "#/components/schemas/Datasets.DatasetRid"
        displayName:
          $ref: "#/components/schemas/Connectivity.TableImportDisplayName"
        importMode:
          $ref: "#/components/schemas/Connectivity.TableImportMode"
        rid:
          $ref: "#/components/schemas/Connectivity.TableImportRid"
      example:
        allowSchemaChanges: true
        branchName: master
        config:
          query: SELECT * FROM table
          type: jdbcImportConfig
        connectionRid: ri.magritte..source.c078b71b-92f9-41b6-b0df-3760f411120b
        datasetRid: ri.foundry.main.dataset.c26f11c8-cdb3-4f44-9f5d-9816ea1c82da
        displayName: My table import
        importMode: SNAPSHOT
        rid: ri.magritte..extract.27bb4f2b-63b8-44b8-a579-4e2bd65ba158
    Connectivity.TableImportAllowSchemaChanges:
      type: boolean
      description: Allow the TableImport to succeed if the schema of imported rows
        does not match the existing dataset's schema. Defaults to false for new table
        imports.
    Connectivity.TableImportConfig:
      description: |
        The import configuration for a specific [connector type](/docs/foundry/data-integration/source-type-overview).
      example:
        query: SELECT * FROM table
        type: jdbcImportConfig
      discriminator:
        propertyName: type
        mapping:
          databricksImportConfig: "#/components/schemas/Connectivity.DatabricksTableImportConfig"
          jdbcImportConfig: "#/components/schemas/Connectivity.JdbcTableImportConfig"
          microsoftAccessImportConfig: "#/components/schemas/Connectivity.MicrosoftAccessTableImportConfig"
          microsoftSqlServerImportConfig: "#/components/schemas/Connectivity.MicrosoftSqlServerTableImportConfig"
          oracleImportConfig: "#/components/schemas/Connectivity.OracleTableImportConfig"
          postgreSqlImportConfig: "#/components/schemas/Connectivity.PostgreSqlTableImportConfig"
          snowflakeImportConfig: "#/components/schemas/Connectivity.SnowflakeTableImportConfig"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.DatabricksTableImportConfig"
      - $ref: "#/components/schemas/Connectivity.JdbcTableImportConfig"
      - $ref: "#/components/schemas/Connectivity.MicrosoftSqlServerTableImportConfig"
      - $ref: "#/components/schemas/Connectivity.PostgreSqlTableImportConfig"
      - $ref: "#/components/schemas/Connectivity.MicrosoftAccessTableImportConfig"
      - $ref: "#/components/schemas/Connectivity.SnowflakeTableImportConfig"
      - $ref: "#/components/schemas/Connectivity.OracleTableImportConfig"
    Connectivity.TableImportDisplayName:
      type: string
    Connectivity.TableImportInitialIncrementalState:
      description: "The incremental configuration for a table import enables append-style\
        \ transactions from the same table without duplication of data.\nYou must\
        \ provide a monotonically increasing column such as a timestamp or id and\
        \ an initial value for this column. \nAn incremental table import will import\
        \ rows where the value is greater than the largest already imported.\n\nYou\
        \ can use the '?' character to reference the incremental state value when\
        \ constructing your query. \nNormally this would be used in a WHERE clause\
        \ or similar filter applied in order to only sync data with an incremental\
        \ column value \nlarger than the previously observed maximum value stored\
        \ in the incremental state.\n"
      discriminator:
        propertyName: type
        mapping:
          dateColumnInitialIncrementalState: "#/components/schemas/Connectivity.DateColumnInitialIncrementalState"
          decimalColumnInitialIncrementalState: "#/components/schemas/Connectivity.DecimalColumnInitialIncrementalState"
          integerColumnInitialIncrementalState: "#/components/schemas/Connectivity.IntegerColumnInitialIncrementalState"
          longColumnInitialIncrementalState: "#/components/schemas/Connectivity.LongColumnInitialIncrementalState"
          stringColumnInitialIncrementalState: "#/components/schemas/Connectivity.StringColumnInitialIncrementalState"
          timestampColumnInitialIncrementalState: "#/components/schemas/Connectivity.TimestampColumnInitialIncrementalState"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.StringColumnInitialIncrementalState"
      - $ref: "#/components/schemas/Connectivity.DateColumnInitialIncrementalState"
      - $ref: "#/components/schemas/Connectivity.IntegerColumnInitialIncrementalState"
      - $ref: "#/components/schemas/Connectivity.TimestampColumnInitialIncrementalState"
      - $ref: "#/components/schemas/Connectivity.LongColumnInitialIncrementalState"

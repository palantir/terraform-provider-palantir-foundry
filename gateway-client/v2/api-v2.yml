  /v2/connectivity/connections:
    post:
      tags:
      - ConnectivityApiService
      description: |
        Creates a new Connection with a [direct connection](/docs/foundry/data-connection/core-concepts/#direct-connection) runtime.

        Any secrets specified in the request body are transmitted over the network encrypted using TLS. Once the
        secrets reach Foundry's servers, they will be temporarily decrypted and remain in plaintext in memory to
        be processed as needed. They will stay in plaintext in memory until the garbage collection process cleans
        up the memory. The secrets are always stored encrypted on our servers.
        By using this endpoint, you acknowledge and accept any potential risks associated with the temporary
        in-memory handling of secrets. If you do not want your secrets to be temporarily decrypted, you should
        use the Foundry UI instead.
      operationId: connectivityCreateConnection
      parameters:
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Connectivity.CreateConnectionRequest"
            example:
              configuration:
                driverClass: org.postgresql.Driver
                type: jdbc
                url: jdbc:postgresql://localhost:5432/test
              displayName: Connection to my external system
              parentFolderRid: ri.compass.main.folder.c410f510-2937-420e-8ea3-8c9bcb3c1791
        required: true
      responses:
        "200":
          description: The created Connection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connectivity.Connection"
              example:
                configuration:
                  driverClass: org.postgresql.Driver
                  type: jdbc
                  url: jdbc:postgresql://localhost:5432/test
                displayName: Connection to my external system
                exportSettings:
                  exportEnabledWithoutMarkingsValidation: false
                  exportsEnabled: true
                parentFolderRid: ri.compass.main.folder.c410f510-2937-420e-8ea3-8c9bcb3c1791
                rid: ri.magritte..source.c078b71b-92f9-41b6-b0df-3760f411120b
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/Connectivity.ConnectionTypeNotSupported"
                - $ref: "#/components/schemas/Connectivity.PropertyCannotBeBlank"
                - $ref: "#/components/schemas/Connectivity.UnknownWorkerCannotBeUsedForCreatingOrUpdatingConnections"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connectivity.CreateConnectionPermissionDenied"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/Connectivity.ParentFolderNotFoundForConnection"
                - $ref: "#/components/schemas/Filesystem.FolderNotFound"
                - $ref: "#/components/schemas/Connectivity.ConnectionNotFound"
      security:
      - BearerAuth: []
      x-releaseStage: PUBLIC_BETA

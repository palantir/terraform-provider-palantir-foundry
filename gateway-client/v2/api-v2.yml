        mapping:
          databricks: "#/components/schemas/Connectivity.CreateConnectionRequestDatabricksConnectionConfiguration"
          jdbc: "#/components/schemas/Connectivity.CreateConnectionRequestJdbcConnectionConfiguration"
          rest: "#/components/schemas/Connectivity.CreateConnectionRequestRestConnectionConfiguration"
          s3: "#/components/schemas/Connectivity.CreateConnectionRequestS3ConnectionConfiguration"
          snowflake: "#/components/schemas/Connectivity.CreateConnectionRequestSnowflakeConnectionConfiguration"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestS3ConnectionConfiguration"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestRestConnectionConfiguration"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestSnowflakeConnectionConfiguration"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestDatabricksConnectionConfiguration"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestJdbcConnectionConfiguration"
    Connectivity.CreateConnectionRequestDatabricksAuthenticationMode:
      description: The method of authentication for connecting to an external Databricks
        system.
      discriminator:
        propertyName: type
        mapping:
          basic: "#/components/schemas/Connectivity.CreateConnectionRequestBasicCredentials"
          oauthM2M: "#/components/schemas/Connectivity.CreateConnectionRequestOauthMachineToMachineAuth"
          personalAccessToken: "#/components/schemas/Connectivity.CreateConnectionRequestPersonalAccessToken"
          workflowIdentityFederation: "#/components/schemas/Connectivity.CreateConnectionRequestWorkflowIdentityFederation"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestWorkflowIdentityFederation"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestOauthMachineToMachineAuth"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestPersonalAccessToken"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestBasicCredentials"
    Connectivity.CreateConnectionRequestDatabricksConnectionConfiguration:
      required:
      - authentication
      - hostName
      - httpPath
      - jdbcProperties
      - type
      type: object
      properties:
        authentication:
          $ref: "#/components/schemas/Connectivity.CreateConnectionRequestDatabricksAuthenticationMode"
        hostName:
          type: string
          description: The hostname of the Databricks workspace.
          example: west-us-2.azuredatabricks.net
        httpPath:
          type: string
          description: The Databricks compute resource’s HTTP Path value.
          example: /sql/1.0/warehouses/1234
        jdbcProperties:
          $ref: "#/components/schemas/Connectivity.JdbcProperties"
        type:
          type: string
      example:
        hostName: west-us-2.azuredatabricks.net
        httpPath: /sql/1.0/warehouses/1234
        jdbcProperties:
          propertyName1: propertyValue1
          propertyName2: propertyValue2
    Connectivity.CreateConnectionRequestDuration:
      required:
      - unit
      - value
      type: object
      properties:
        unit:
          $ref: "#/components/schemas/Core.TimeUnit"
        value:
          type: integer
          description: The duration value.
          example: 30
      example:
        unit: SECONDS
        value: 30
    Connectivity.CreateConnectionRequestEncryptedProperty:
      description: |
        When reading an encrypted property, the secret name representing the encrypted value will be returned.
        When writing to an encrypted property:
        - If a plaintext value is passed as an input, the plaintext value will be encrypted and saved to the property.
        - If a secret name is passed as an input, the secret name must match the existing secret name of the property
          and the property will retain its previously encrypted value.
      example:
        type: asPlaintextValue
        value: myPlaintextSecret
      discriminator:
        propertyName: type
        mapping:
          asPlaintextValue: "#/components/schemas/Connectivity.CreateConnectionRequestAsPlaintextValue"
          asSecretName: "#/components/schemas/Connectivity.CreateConnectionRequestAsSecretName"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestAsSecretName"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestAsPlaintextValue"
    Connectivity.CreateConnectionRequestJdbcConnectionConfiguration:
      required:
      - driverClass
      - jdbcProperties
      - type
      - url
      type: object
      properties:
        credentials:
          $ref: "#/components/schemas/Connectivity.BasicCredentials"
        driverClass:
          type: string
          description: The fully-qualified driver class name that is used to connect
            to the database.
          example: org.postgresql.Driver
        jdbcProperties:
          $ref: "#/components/schemas/Connectivity.JdbcProperties"
        type:
          type: string
        url:
          type: string
          description: The URL that the JDBC driver uses to connect to a database.
          example: jdbc:postgresql://localhost:5432/test
      example:
        credentials:
          password:
            type: asPlaintextValue
            value: myPlaintextSecret
        driverClass: org.postgresql.Driver
        jdbcProperties:
          propertyName1: propertyValue1
          propertyName2: propertyValue2
        url: jdbc:postgresql://localhost:5432/test
    Connectivity.CreateConnectionRequestOauthMachineToMachineAuth:
      required:
      - clientID
      - clientSecret
      - type
      type: object
      properties:
        clientID:
          type: string
          description: The client ID for the service principal.
        clientSecret:
          $ref: "#/components/schemas/Connectivity.CreateConnectionRequestEncryptedProperty"
        type:
          type: string
      example:
        clientSecret:
          type: asPlaintextValue
          value: myPlaintextSecret
    Connectivity.CreateConnectionRequestPersonalAccessToken:
      required:
      - personalAccessToken
      - type
      type: object
      properties:
        personalAccessToken:
          $ref: "#/components/schemas/Connectivity.CreateConnectionRequestEncryptedProperty"
        type:
          type: string
      example:
        personalAccessToken:
          type: asPlaintextValue
          value: myPlaintextSecret
    Connectivity.CreateConnectionRequestRestConnectionAdditionalSecrets:
      description: |
        When creating or updating additional secrets, use SecretsWithPlaintextValues.
        When fetching the RestConnectionConfiguration, SecretsNames will be provided.
      discriminator:
        propertyName: type
        mapping:
          asSecretsNames: "#/components/schemas/Connectivity.CreateConnectionRequestSecretsNames"
          asSecretsWithPlaintextValues: "#/components/schemas/Connectivity.CreateConnectionRequestSecretsWithPlaintextValues"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestSecretsWithPlaintextValues"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestSecretsNames"
    Connectivity.CreateConnectionRequestRestConnectionConfiguration:
      required:
      - type
      type: object
      properties:
        additionalSecrets:
          $ref: "#/components/schemas/Connectivity.RestConnectionAdditionalSecrets"
        domains:
          type: array
          description: |
            The domains that the connection is allowed to access.
            At least one domain must be specified.
          items:
            $ref: "#/components/schemas/Connectivity.Domain"
        oauth2ClientRid:
          type: string
          description: |
            The RID of the [Outbound application](/docs/foundry/administration/configure-outbound-applications) that is used to authenticate to the external system via OAuth2.
            Currently, a connection may use only one outbound application for OAuth 2.0 authentication.
            Selecting a different outbound application will update the configuration for all domains with OAuth 2.0 as the selected authorization.
        type:
          type: string
      example:
        domains:
        - host: my-rest-api.com
          port: 443
          scheme: HTTP
    Connectivity.CreateConnectionRequestS3AuthenticationMode:
      discriminator:
        propertyName: type
        mapping:
          awsAccessKey: "#/components/schemas/Connectivity.CreateConnectionRequestAwsAccessKey"
          cloudIdentity: "#/components/schemas/Connectivity.CreateConnectionRequestCloudIdentity"
          oidc: "#/components/schemas/Connectivity.CreateConnectionRequestAwsOidcAuthentication"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestAwsAccessKey"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestCloudIdentity"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestAwsOidcAuthentication"
    Connectivity.CreateConnectionRequestS3ConnectionConfiguration:
      required:
      - bucketUrl
      - type
      type: object
      properties:
        authenticationMode:
          $ref: "#/components/schemas/Connectivity.S3AuthenticationMode"
        bucketUrl:
          type: string
          description: The URL of the S3 bucket. The URL should contain a trailing
            slash.
          example: s3://my-test-bucket/
        clientKmsConfiguration:
          $ref: "#/components/schemas/Connectivity.S3KmsConfiguration"
        connectionTimeoutMillis:
          type: string
          description: |
            The amount of time (in milliseconds) to wait when initially establishing a connection before giving up and timing out.
            If not specified, defaults to 10000 as defined by the [AWS SDK default](https://docs.aws.amazon.com/AWSJavaSDK/latest/javadoc/com/amazonaws/ClientConfiguration.html#DEFAULT_CONNECTION_TIMEOUT).
          format: long
        enableRequesterPays:
          type: boolean
          description: |
            Defaults to false, unless set and overwritten.
            If true, includes the [requester pays header](https://docs.aws.amazon.com/AmazonS3/latest/userguide/RequesterPaysBuckets.html)
            in requests, allowing reads from requester pays buckets.
        matchSubfolderExactly:
          type: boolean
          description: |
            If true, only files in the subfolder specified in the bucket URL will be synced.
            If false, all files in the bucket will be synced.
            If not specified, defaults to false.
        maxConnections:
          type: integer
          description: |
            The maximum number of HTTP connections to the S3 service per sync.
            If not specified, defaults to 50 as defined by the [AWS SDK default](https://docs.aws.amazon.com/AWSJavaSDK/latest/javadoc/com/amazonaws/ClientConfiguration.html#DEFAULT_MAX_CONNECTIONS).
        maxErrorRetry:
          type: integer
          description: |
            The maximum number of retry attempts for failed requests to the S3 service.
            If not specified, defaults to 3 as defined by the [AWS SDK default](https://docs.aws.amazon.com/sdk-for-java/latest/developer-guide/retry-strategy.html#retry-strategies).
        proxyConfiguration:
          $ref: "#/components/schemas/Connectivity.S3ProxyConfiguration"
        region:
          $ref: "#/components/schemas/Connectivity.Region"
        s3Endpoint:
          type: string
          description: |
            The endpoint of the S3 service. This is used to connect to a custom S3 service that is not AWS S3.
            If not specified, defaults to the [AWS S3 endpoint](https://docs.aws.amazon.com/general/latest/gr/s3.html).
            Warning: Specifying a region and a custom endpoint containing a region can lead to unexpected behavior.
          example: https://my-custom-s3-endpoint.com
        s3EndpointSigningRegion:
          $ref: "#/components/schemas/Connectivity.Region"
        socketTimeoutMillis:
          type: string
          description: |
            The amount of time (in milliseconds) to wait for data to be transferred over an established, open connection.
            If not specified, defaults to 50000 as defined by the [AWS SDK default](https://docs.aws.amazon.com/AWSJavaSDK/latest/javadoc/com/amazonaws/ClientConfiguration.html#DEFAULT_SOCKET_TIMEOUT).
          format: long
        stsRoleConfiguration:
          $ref: "#/components/schemas/Connectivity.StsRoleConfiguration"
        type:
          type: string
      example:
        bucketUrl: s3://my-test-bucket/
        clientKmsConfiguration:
          kmsKey: arn:aws:kms:us-west-1:123456789012:key/1234abcd-12ab-34cd-56ef-1234567890ab
          kmsRegion: us-west-1
        proxyConfiguration:
          credentials:
            password:
              type: asPlaintextValue
              value: myPlaintextSecret
          protocol: HTTP
        region: us-west-1
        s3Endpoint: https://my-custom-s3-endpoint.com
        s3EndpointSigningRegion: us-west-1
        stsRoleConfiguration:
          roleArn: arn:aws:iam::123456789012:role/my-role
          roleSessionDuration:
            unit: SECONDS
            value: 30
          stsEndpoint: https://sts.us-west-1.amazonaws.com
    Connectivity.CreateConnectionRequestS3KmsConfiguration:
      required:
      - kmsKey
      type: object
      properties:
        kmsKey:
          type: string
          description: |
            The client-side KMS key to use for encryption and decryption of data in the S3 bucket.
            If not specified, the default KMS key for the bucket is used.
          example: arn:aws:kms:us-west-1:123456789012:key/1234abcd-12ab-34cd-56ef-1234567890ab
        kmsRegion:
          $ref: "#/components/schemas/Connectivity.Region"
      example:
        kmsKey: arn:aws:kms:us-west-1:123456789012:key/1234abcd-12ab-34cd-56ef-1234567890ab
        kmsRegion: us-west-1
    Connectivity.CreateConnectionRequestS3ProxyConfiguration:
      required:
      - host
      - port
      type: object
      properties:
        credentials:
          $ref: "#/components/schemas/Connectivity.BasicCredentials"
        host:
          type: string
          description: "Domain name, IPv4, or IPv6 address. \n`protocol` and `port`\
            \ must be specified separately.\n"
        nonProxyHosts:
          type: array
          description: "A list of hosts that can bypass the proxy, such as those used\
            \ for STS Role. You can also use \"*\" wildcards."
          items:
            type: string
        port:
          type: integer
        protocol:
          $ref: "#/components/schemas/Connectivity.Protocol"
      example:
        credentials:
          password:
            type: asPlaintextValue
            value: myPlaintextSecret
        protocol: HTTP
    Connectivity.CreateConnectionRequestSecretsNames:
      required:
      - type
      type: object
      properties:
        type:
          type: string
    Connectivity.CreateConnectionRequestSecretsWithPlaintextValues:
      required:
      - type
      type: object
      properties:
        secrets:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Connectivity.PlaintextValue"
          description: The additional secrets that can be referenced in code and webhook
            configurations.
        type:
          type: string
      example:
        secrets:
          Password: MySecretPassword
    Connectivity.CreateConnectionRequestSnowflakeAuthenticationMode:
      discriminator:
        propertyName: type
        mapping:
          basic: "#/components/schemas/Connectivity.CreateConnectionRequestBasicCredentials"
          externalOauth: "#/components/schemas/Connectivity.CreateConnectionRequestSnowflakeExternalOauth"
          keyPair: "#/components/schemas/Connectivity.CreateConnectionRequestSnowflakeKeyPairAuthentication"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestSnowflakeExternalOauth"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestSnowflakeKeyPairAuthentication"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestBasicCredentials"
    Connectivity.CreateConnectionRequestSnowflakeConnectionConfiguration:
      required:
      - accountIdentifier
      - authenticationMode
      - jdbcProperties
      - type
      type: object
      properties:
        accountIdentifier:
          type: string
          description: "An [account identifier](https://docs.snowflake.com/en/user-guide/admin-account-identifier)\
            \ uniquely \nidentifies a Snowflake account within your organization,\
            \ as well as throughout the global network of \nSnowflake-supported cloud\
            \ platforms and cloud regions.\n\nThe URL for an account uses the following\
            \ format: <account_identifier>.snowflakecomputing.com.\nAn example URL\
            \ is https://acme-test_aws_us_east_2.snowflakecomputing.com.\n"
          example: acme-test_aws_us_east_2
        authenticationMode:
          $ref: "#/components/schemas/Connectivity.CreateConnectionRequestSnowflakeAuthenticationMode"
        database:
          type: string
          description: |
            Specifies the default database to use once connected. If unspecified, defaults to the empty string.
            The specified database should be an existing database for which the specified default role has privileges.

            See https://docs.snowflake.com/developer-guide/jdbc/jdbc-parameters#db
          example: mydatabase
        jdbcProperties:
          $ref: "#/components/schemas/Connectivity.JdbcProperties"
        role:
          type: string
          description: "Specifies the default access control role to use in the Snowflake\
            \ session initiated by the driver. \nIf unspecified, no role will be used\
            \ when the session is initiated by the driver.\n\nThe specified role should\
            \ be an existing role that has already been assigned to the specified\
            \ user for \nthe driver. If the specified role has not already been assigned\
            \ to the user, the role is not used when \nthe session is initiated by\
            \ the driver.\n\nSee https://docs.snowflake.com/developer-guide/jdbc/jdbc-parameters#role\n"
          example: myrole
        schema:
          type: string
          description: "Specifies the default schema to use for the specified database\
            \ once connected. If unspecified, \ndefaults to the empty string.\nThe\
            \ specified schema should be an existing schema for which the specified\
            \ default role has privileges.\n\nSee https://docs.snowflake.com/developer-guide/jdbc/jdbc-parameters#schema\n"
          example: myschema
        type:
          type: string
        warehouse:
          type: string
          description: "Specifies the virtual warehouse to use once connected. If\
            \ unspecified, defaults to the empty string. \nThe specified warehouse\
            \ should be an existing warehouse for which the specified default role\
            \ has privileges.\n\nSee https://docs.snowflake.com/developer-guide/jdbc/jdbc-parameters#warehouse\n"
          example: mywarehouse
      example:
        accountIdentifier: acme-test_aws_us_east_2
        database: mydatabase
        jdbcProperties:
          propertyName1: propertyValue1
          propertyName2: propertyValue2
        role: myrole
        schema: myschema
        warehouse: mywarehouse
    Connectivity.CreateConnectionRequestSnowflakeExternalOauth:
      required:
      - type
      type: object
      properties:
        type:
          type: string
    Connectivity.CreateConnectionRequestSnowflakeKeyPairAuthentication:
      required:
      - privateKey
      - type
      - user
      type: object
      properties:
        privateKey:
          $ref: "#/components/schemas/Connectivity.CreateConnectionRequestEncryptedProperty"
        type:
          type: string
        user:
          type: string
      example:
        privateKey:
          type: asPlaintextValue
          value: myPlaintextSecret
    Connectivity.CreateConnectionRequestStsRoleConfiguration:
      required:
      - roleArn
      - roleSessionName
      type: object
      properties:
        externalId:
          type: string
          description: |
            A unique identifier that is used by third parties when assuming roles in their customers' accounts.
            For more information, see the official [AWS documentation](https://docs.aws.amazon.com/IAM/latest/UserGuide/id_roles_create_for-user_externalid.html).
        roleArn:
          type: string
          description: |
            The Amazon Resource Name (ARN) of the role to assume.
            For more information, see the official [AWS documentation](https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_elements_principal.html#principal-arn-format).
          example: arn:aws:iam::123456789012:role/my-role
        roleSessionDuration:
          $ref: "#/components/schemas/Core.Duration"
        roleSessionName:
          type: string
          description: |
            An identifier for the assumed role session.
            The value can be any string that you assume will be unique within the AWS account.
            For more information, see the official [AWS documentation](https://docs.aws.amazon.com/STS/latest/APIReference/API_AssumeRole.html#API_AssumeRole_RequestParameters).
        stsEndpoint:
          type: string
          description: |
            By default, the AWS Security Token Service (AWS STS) is available as a global service, and all AWS STS requests go to a single endpoint at https://sts.amazonaws.com.
            AWS recommends using Regional AWS STS endpoints instead of the global endpoint to reduce latency, build in redundancy, and increase session token validity.
          example: https://sts.us-west-1.amazonaws.com
      example:
        roleArn: arn:aws:iam::123456789012:role/my-role
        roleSessionDuration:
          unit: SECONDS
          value: 30
        stsEndpoint: https://sts.us-west-1.amazonaws.com
    Connectivity.CreateConnectionRequestWorkflowIdentityFederation:
      required:
      - audience
      - type
      type: object
      properties:
        audience:
          type: string
          description: "Identifies the recipients that the access token is intended\
            \ for as a string URI. \nThis should be the primary host name where the\
            \ Connection lives.\n"
          example: https://example.palantirfoundry.com
        servicePrincipalApplicationId:
          type: string
          description: "The ID of the Databricks [service principal](https://docs.databricks.com/aws/en/admin/users-groups/service-principals).\
            \ \nIf provided, a federated JWT token is exchanged using a\nservice principal\
            \ federation policy. If not provided, a federated JWT token is exchanged\
            \ using an account\nfederation policy.\n"
        type:
          type: string
      example:
        audience: https://example.palantirfoundry.com
    Connectivity.CreateFileImportPermissionDenied:
      required:
      - errorName
      - errorCode
      - parameters
      properties:
        errorCode:
          type: string
          enum:
          - PERMISSION_DENIED
        errorInstanceId:
          type: string
          format: uuid
        errorName:
          type: string
        parameters:
          required:
          - connectionRid
          type: object
          properties:
            connectionRid:
              $ref: "#/components/schemas/Connectivity.ConnectionRid"
      description: Could not create the FileImport.
    Connectivity.CreateFileImportRequest:
      required:
      - datasetRid
      - displayName
      - importMode
      type: object
      properties:
        branchName:
          $ref: "#/components/schemas/Datasets.BranchName"
        datasetRid:
          $ref: "#/components/schemas/Datasets.DatasetRid"
        displayName:
          $ref: "#/components/schemas/Connectivity.FileImportDisplayName"
        fileImportFilters:
          type: array
          description: "Use filters to limit which files should be imported. Filters\
            \ are applied in the order they are defined. A different ordering of filters\
            \ may lead to a more optimized import. [Learn more about optimizing file\
            \ imports.](/docs/foundry/data-connection/file-based-syncs/#optimize-file-based-syncs)"
          items:
            $ref: "#/components/schemas/Connectivity.FileImportFilter"
        importMode:
          $ref: "#/components/schemas/Connectivity.FileImportMode"
        subfolder:
          type: string
          description: "A subfolder in the external system that will be imported.\
            \ If not specified, defaults to the root folder of the external system."
          example: subfolder1/subfolder2
      example:
        branchName: master
        datasetRid: ri.foundry.main.dataset.c26f11c8-cdb3-4f44-9f5d-9816ea1c82da
        displayName: My file import
        fileImportFilters:
        - regex: my-subfolder
          type: pathMatchesFilter
        importMode: SNAPSHOT
        subfolder: subfolder1/subfolder2
    Connectivity.CreateTableImportPermissionDenied:
      required:
      - errorName
      - errorCode
      - parameters
      properties:
        errorCode:
          type: string
          enum:
          - PERMISSION_DENIED
        errorInstanceId:
          type: string
          format: uuid
        errorName:
          type: string
        parameters:
          required:
          - connectionRid
          type: object
          properties:
            connectionRid:
              $ref: "#/components/schemas/Connectivity.ConnectionRid"
      description: Could not create the TableImport.
    Connectivity.CreateTableImportRequest:
      required:
      - config
      - datasetRid
      - displayName
      - importMode
      type: object
      properties:
        allowSchemaChanges:
          $ref: "#/components/schemas/Connectivity.TableImportAllowSchemaChanges"
        branchName:
          $ref: "#/components/schemas/Datasets.BranchName"
        config:
          $ref: "#/components/schemas/Connectivity.CreateTableImportRequestTableImportConfig"
        datasetRid:
          $ref: "#/components/schemas/Datasets.DatasetRid"
        displayName:
          $ref: "#/components/schemas/Connectivity.TableImportDisplayName"
        importMode:
          $ref: "#/components/schemas/Connectivity.TableImportMode"
      example:
        allowSchemaChanges: true
        branchName: master
        config:
          query: SELECT * FROM table
          type: jdbcImportConfig
        datasetRid: ri.foundry.main.dataset.c26f11c8-cdb3-4f44-9f5d-9816ea1c82da
        displayName: My table import
        importMode: SNAPSHOT
    Connectivity.CreateTableImportRequestDatabricksTableImportConfig:
      required:
      - query
      - type
      type: object
      properties:
        initialIncrementalState:
          $ref: "#/components/schemas/Connectivity.TableImportInitialIncrementalState"
        query:
          $ref: "#/components/schemas/Connectivity.TableImportQuery"
        type:
          type: string
      example:
        query: SELECT * FROM table
    Connectivity.CreateTableImportRequestDateColumnInitialIncrementalState:
      required:
      - columnName
      - currentValue
      - type
      type: object
      properties:
        columnName:
          type: string
          example: myDateColumn
        currentValue:
          type: string
          description: |
            The initial incremental state value for the date column to reference in the query.
          format: date
          example: 2024-12-31
        type:
          type: string
      example:
        columnName: myDateColumn
        currentValue: 2024-12-31
    Connectivity.CreateTableImportRequestDecimalColumnInitialIncrementalState:
      required:
      - columnName
      - currentValue
      - type
      type: object
      properties:
        columnName:
          type: string
          example: myPriceColumn
        currentValue:
          type: string
          description: |
            The initial incremental state value for the decimal column to reference in the query.
          format: decimal
          example: 3.25
        type:
          type: string
      example:
        columnName: myPriceColumn
        currentValue: 3.25
    Connectivity.CreateTableImportRequestIntegerColumnInitialIncrementalState:
      required:
      - columnName
      - currentValue
      - type
      type: object
      properties:
        columnName:
          type: string
          example: myIdColumn
        currentValue:
          type: integer
          description: |
            The initial incremental state value for the integer column to reference in the query.
          example: 1
        type:
          type: string
      example:
        columnName: myIdColumn
        currentValue: 1
    Connectivity.CreateTableImportRequestJdbcTableImportConfig:
      required:
      - query
      - type
      type: object
      properties:
        initialIncrementalState:
          $ref: "#/components/schemas/Connectivity.TableImportInitialIncrementalState"
        query:
          $ref: "#/components/schemas/Connectivity.TableImportQuery"
        type:
          type: string
      example:
        query: SELECT * FROM table
    Connectivity.CreateTableImportRequestLongColumnInitialIncrementalState:
      required:
      - columnName
      - currentValue
      - type
      type: object
      properties:
        columnName:
          type: string
          example: myIdColumn
        currentValue:
          type: string
          description: |
            The initial incremental state value for the long column to reference in the query.
          format: long
          example: 1000
        type:

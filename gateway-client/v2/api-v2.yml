    Connectivity.TableImportMode:
      type: string
      description: "Import mode governs how data is read from an external system,\
        \ and written into a Foundry dataset. \n\nSNAPSHOT: Defines a new dataset\
        \ state consisting only of data from a particular import execution.\nAPPEND:\
        \ Purely additive and yields data from previous import executions in addition\
        \ to newly added data.\n"
      example: SNAPSHOT
      enum:
      - SNAPSHOT
      - APPEND
    Connectivity.TableImportNotFound:
      required:
      - errorName
      - errorCode
      - parameters

            - messageId
            - sessionRid
            type: object
            properties:
              agentRid:
                $ref: "#/components/schemas/AipAgents.AgentRid"
              messageId:
                $ref: "#/components/schemas/AipAgents.MessageId"
              sessionRid:
                $ref: "#/components/schemas/AipAgents.SessionRid"

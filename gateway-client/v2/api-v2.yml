            \ by the markings to access the Document. Only data at or below this classification\n\
            can be added to the Document.\n"
          items:
            $ref: "#/components/schemas/Pack.MarkingPrincipal"
        markings:
          type: array
          description: "Mandatory Markings controlling access to the Document. Users\
            \ must have access to all Mandatory Markings to \nbe able to access the\
            \ Document. Only unmarked data and data with any of these markings can\
            \ be added to the \nDocument.\n"
          items:
            $ref: "#/components/schemas/Pack.MarkingId"

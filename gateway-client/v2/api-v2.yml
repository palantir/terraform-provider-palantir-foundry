        \                                                                        \
        \      | string                                                      | `\"\
        CIPHER::ri.bellaso.main.cipher-channel.e414ab9e-b606-499a-a0e1-844fa296ba7e::unzjs3VifsTxuIpf1fH1CJ7OaPBr2bzMMdozPaZJtCii8vVG60yXIEmzoOJaEl9mfFFe::CIPHER\"\
        `                                                                        \
        \                                                                        \
        \                                        |        \n| Date               \
        \                                                                        \
        \                               | ISO 8601 extended local date string    \
        \                     | `\"2021-05-01\"`                                 \
        \                                                    |\n| Decimal        \
        \                                                                        \
        \                                   | string                             \
        \                         | `\"2.718281828\"`                            \
        \                                                        |\n| Double     \
        \                                                                        \
        \                                       | number                         \
        \                             | `3.14159265`                             \
        \                                                          |\n| Float    \
        \                                                                        \
        \                                         | number                       \
        \                               | `3.14159265`                           \
        \                                                            |\n| GeoPoint\
        \                                                                        \
        \                                          | geojson                     \
        \                                | `{\"type\":\"Point\",\"coordinates\":[102.0,0.5]}`\
        \                                                       |\n| GeoShape    \
        \                                                                        \
        \                                      | geojson                         \
        \                            | `{\"type\":\"LineString\",\"coordinates\":[[102.0,0.0],[103.0,1.0],[104.0,0.0],[105.0,1.0]]}`\
        \            |\n| Integer                                                \
        \                                                                   | number\
        \                                                      | `238940`        \
        \                                                                        \
        \           |\n| Long                                                    \
        \                                                                  | string\
        \                                                      | `\"58319870951433\"\
        `                                                                        \
        \         |\n| [MediaReference](/docs/foundry/api/v2/ontologies-v2-resources/media-reference-properties/media-reference-property-basics/)|\
        \ JSON encoded `MediaReference` object                        | `{\"mimeType\"\
        :\"application/pdf\",\"reference\":{\"type\":\"mediaSetViewItem\",\"mediaSetViewItem\"\
        :{\"mediaSetRid\":\"ri.mio.main.media-set.4153d42f-ca4b-4e42-8ca5-8e6aa7edb642\"\
        ,\"mediaSetViewRid\":\"ri.mio.main.view.82a798ad-d637-4595-acc6-987bcf16629b\"\
        ,\"mediaItemRid\":\"ri.mio.main.media-item.001ec98b-1620-4814-9e17-8e9c4e536225\"\
        }}}`                       |\n| Short                                    \
        \                                                                        \
        \         | number                                                      |\
        \ `8739`                                                                 \
        \                            |\n| String                                 \

    Ontologies.NotQuery:
      required:
      - type
      - value
      type: object
      properties:
        type:
          type: string
        value:
          $ref: "#/components/schemas/Ontologies.SearchJsonQuery"
      description: Returns objects where the query is not satisfied.
    Ontologies.NotQueryV2:
      required:
      - type
      - value
      type: object
      properties:
        type:
          type: string
        value:
          $ref: "#/components/schemas/Ontologies.SearchJsonQueryV2"
      description: Returns objects where the query is not satisfied.
    Ontologies.NumberFormatAffix:
      required:
      - affix
      - baseFormatOptions
      - type
      type: object
      properties:
        affix:
          $ref: "#/components/schemas/Ontologies.Affix"
        baseFormatOptions:
          $ref: "#/components/schemas/Ontologies.NumberFormatOptions"
        type:
          type: string
      description: |
        Attach arbitrary text before and/or after the formatted number.
        Example: prefix "USD " and postfix " total" displays as "USD 1,234.56 total"
    Ontologies.NumberFormatBasisPoints:
      required:
      - baseFormatOptions
      type: object
      properties:
        baseFormatOptions:
          $ref: "#/components/schemas/Ontologies.NumberFormatOptions"
      description: |
        Display the value as basis points. Multiplies by 10,000 and appends "bps" suffix.
        Used in finance where 1 basis point = 0.01%.
        Example: 0.0025 displays as "25 bps", 0.01 displays as "100 bps"
    Ontologies.NumberFormatCurrency:
      required:
      - baseFormatOptions
      - currencyCode
      - style
      - type
      type: object
      properties:
        baseFormatOptions:
          $ref: "#/components/schemas/Ontologies.NumberFormatOptions"
        currencyCode:
          $ref: "#/components/schemas/Ontologies.PropertyTypeReferenceOrStringConstant"
        style:
          $ref: "#/components/schemas/Ontologies.NumberFormatCurrencyStyle"
        type:
          type: string
      description: |
        Format numbers as currency values with proper symbols and styling.
        Example: 1234.56 with currency "USD" displays as "USD 1,234.56" (standard) or "USD 1.2K" (compact)
    Ontologies.NumberFormatCurrencyStyle:
      type: string
      description: |
        Currency rendering style options:
        - STANDARD: Full currency formatting (e.g., "USD 1,234.56")
        - COMPACT: Abbreviated currency formatting (e.g., "USD 1.2K")
      enum:
      - STANDARD
      - COMPACT
    Ontologies.NumberFormatCustomUnit:
      required:
      - baseFormatOptions
      - type
      - unit
      type: object
      properties:
        baseFormatOptions:
          $ref: "#/components/schemas/Ontologies.NumberFormatOptions"
        type:
          type: string
        unit:
          $ref: "#/components/schemas/Ontologies.PropertyTypeReferenceOrStringConstant"
      description: |
        Format numbers with custom units not supported by standard formatting.
        Use this for domain-specific units like "requests/sec", "widgets", etc.
        Example: 1500 with unit "widgets" displays as "1,500 widgets"
    Ontologies.NumberFormatDuration:
      required:
      - baseValue
      - formatStyle
      - type
      type: object
      properties:
        baseValue:
          $ref: "#/components/schemas/Ontologies.DurationBaseValue"
        formatStyle:
          $ref: "#/components/schemas/Ontologies.DurationFormatStyle"
        precision:
          $ref: "#/components/schemas/Ontologies.DurationPrecision"
        type:
          type: string
      description: |
        Format numeric values representing time durations.
        - Human readable: 3661 seconds displays as "1h 1m 1s"
        - Timecode: 3661 seconds displays as "01:01:01"
    Ontologies.NumberFormatFixedValues:
      required:
      - type
      type: object
      properties:
        type:
          type: string
        values:
          type: object
          additionalProperties:
            type: string
      description: |
        Map integer values to custom human-readable strings.
        Example: {1: "First", 2: "Second", 3: "Third"} would display 2 as "Second".
    Ontologies.NumberFormatNotation:
      type: string
      description: |
        Number notation style options:
        - STANDARD: Regular number display ("1,234")
        - SCIENTIFIC: Scientific notation ("1.234E3")
        - ENGINEERING: Engineering notation ("1.234E3")
        - COMPACT: Compact notation ("1.2K")
      enum:
      - STANDARD
      - SCIENTIFIC
      - ENGINEERING
      - COMPACT
    Ontologies.NumberFormatOptions:
      type: object
      properties:
        convertNegativeToParenthesis:
          type: boolean
          description: "If true, wrap negative numbers in parentheses instead of a\
            \ minus sign."
        maximumFractionDigits:
          type: integer
        maximumSignificantDigits:
          type: integer
        minimumFractionDigits:
          type: integer
        minimumIntegerDigits:
          type: integer
        minimumSignificantDigits:
          type: integer
        notation:
          $ref: "#/components/schemas/Ontologies.NumberFormatNotation"
        roundingMode:
          $ref: "#/components/schemas/Ontologies.NumberRoundingMode"
        useGrouping:
          type: boolean
          description: "If true, show a locale-appropriate number grouping (e.g. thousands\
            \ for en)."
      description: |
        Base number formatting options that can be applied to all number formatters.
        Controls precision, grouping, rounding, and notation. Consistent with JavaScript's Intl.NumberFormat.

        Examples:
        - useGrouping: true makes 1234567 display as "1,234,567"
        - maximumFractionDigits: 2 makes 3.14159 display as "3.14"
        - notation: SCIENTIFIC makes 1234 display as "1.234E3"
    Ontologies.NumberFormatRatio:
      required:
      - baseFormatOptions
      - ratioType
      - type
      type: object
      properties:
        baseFormatOptions:
          $ref: "#/components/schemas/Ontologies.NumberFormatOptions"
        ratioType:
          $ref: "#/components/schemas/Ontologies.NumberRatioType"
        type:
          type: string
      description: |
        Display the value as a ratio with different scaling factors and suffixes:
        - PERCENTAGE: Multiply by 100 and add "%" suffix (0.15 → "15%")
        - PER_MILLE: Multiply by 1000 and add "‰" suffix (0.015 → "15‰")
        - BASIS_POINTS: Multiply by 10000 and add "bps" suffix (0.0015 → "15bps")
    Ontologies.NumberFormatScale:
      required:
      - baseFormatOptions
      - scaleType
      - type
      type: object
      properties:
        baseFormatOptions:
          $ref: "#/components/schemas/Ontologies.NumberFormatOptions"
        scaleType:
          $ref: "#/components/schemas/Ontologies.NumberScaleType"
        type:
          type: string
      description: |
        Scale the numeric value by dividing by the specified factor and append an appropriate suffix.
        - THOUSANDS: 1500 displays as "1.5K"
        - MILLIONS: 2500000 displays as "2.5M"
        - BILLIONS: 3200000000 displays as "3.2B"
    Ontologies.NumberFormatStandard:
      required:
      - baseFormatOptions
      - type
      type: object
      properties:
        baseFormatOptions:
          $ref: "#/components/schemas/Ontologies.NumberFormatOptions"
        type:
          type: string
      description: |
        Standard number formatting with configurable options.
        This provides basic number formatting without any special units, scaling, or transformations.
    Ontologies.NumberFormatStandardUnit:
      required:
      - baseFormatOptions
      - type
      - unit
      type: object
      properties:
        baseFormatOptions:
          $ref: "#/components/schemas/Ontologies.NumberFormatOptions"
        type:
          type: string
        unit:
          $ref: "#/components/schemas/Ontologies.PropertyTypeReferenceOrStringConstant"
      description: |
        Format numbers with standard units supported by Intl.NumberFormat.
        Examples: "meter", "kilogram", "celsius", "percent"
        Input: 25 with unit "celsius" displays as "25 degrees C"
    Ontologies.NumberRatioType:
      type: string
      description: |
        Ratio format options for displaying proportional values:
        - PERCENTAGE: Multiply by 100 and add "%" suffix
        - PER_MILLE: Multiply by 1000 and add "‰" suffix
        - BASIS_POINTS: Multiply by 10000 and add "bps" suffix
      enum:
      - PERCENTAGE
      - PER_MILLE
      - BASIS_POINTS
    Ontologies.NumberRoundingMode:
      type: string
      description: |
        Number rounding behavior:
        - CEIL: Always round up (3.1 becomes 4)
        - FLOOR: Always round down (3.9 becomes 3)
        - ROUND_CLOSEST: Round to nearest (3.4 becomes 3, 3.6 becomes 4)
      enum:
      - CEIL
      - FLOOR
      - ROUND_CLOSEST
    Ontologies.NumberScaleType:
      type: string
      description: |
        Scale factor options for large numbers:
        - THOUSANDS: Divide by 1,000 and add "K" suffix
        - MILLIONS: Divide by 1,000,000 and add "M" suffix
        - BILLIONS: Divide by 1,000,000,000 and add "B" suffix
      enum:
      - THOUSANDS
      - MILLIONS
      - BILLIONS
    Ontologies.ObjectAlreadyExists:
      description: |
        The object the user is attempting to create already exists.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - CONFLICT
          parameters:
            type: object
    Ontologies.ObjectChanged:
      description: |
        An object used by this `Action` was changed by someone else while the `Action` was running.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - CONFLICT
          parameters:
            type: object
            properties:
              objectType:
                $ref: "#/components/schemas/Ontologies.ObjectTypeApiName"
              primaryKey:
                $ref: "#/components/schemas/Ontologies.PropertyValue"
    Ontologies.ObjectEdit:
      discriminator:
        propertyName: type
        mapping:
          addLink: "#/components/schemas/Ontologies.AddLink"
          addObject: "#/components/schemas/Ontologies.AddObject"
          deleteLink: "#/components/schemas/Ontologies.DeleteLink"
          deleteObject: "#/components/schemas/Ontologies.DeleteObject"
          modifyObject: "#/components/schemas/Ontologies.ModifyObject"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.ModifyObject"
      - $ref: "#/components/schemas/Ontologies.DeleteObject"
      - $ref: "#/components/schemas/Ontologies.AddObject"
      - $ref: "#/components/schemas/Ontologies.DeleteLink"
      - $ref: "#/components/schemas/Ontologies.AddLink"
    Ontologies.ObjectEdits:
      required:
      - addedLinksCount
      - addedObjectCount
      - deletedLinksCount
      - deletedObjectsCount
      - modifiedObjectsCount
      - type
      type: object
      properties:
        addedLinksCount:
          type: integer
        addedObjectCount:
          type: integer
        deletedLinksCount:
          type: integer
        deletedObjectsCount:
          type: integer
        edits:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.ObjectEdit"
        modifiedObjectsCount:
          type: integer
        type:
          type: string
    Ontologies.ObjectLocator:
      required:
      - objectTypeApiName
      - primaryKeyValue
      type: object
      properties:
        objectTypeApiName:
          $ref: "#/components/schemas/Ontologies.ObjectTypeApiName"
        primaryKeyValue:
          $ref: "#/components/schemas/Ontologies.PrimaryKeyValue"
      description: An object identifier containing an object type API name and primary
        key.
    Ontologies.ObjectNotFound:
      description: "The requested object is not found, or the client token does not\
        \ have access to it."
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - NOT_FOUND
          parameters:
            type: object
            properties:
              objectType:
                $ref: "#/components/schemas/Ontologies.ObjectTypeApiName"
              primaryKey:
                type: object
                additionalProperties:
                  $ref: "#/components/schemas/Ontologies.PrimaryKeyValue"
    Ontologies.ObjectParameterPropertyArgument:
      required:
      - parameterId
      - propertyTypeApiName
      - type
      type: object
      properties:
        parameterId:
          $ref: "#/components/schemas/Ontologies.ParameterId"
        propertyTypeApiName:
          $ref: "#/components/schemas/Ontologies.PropertyTypeApiName"
        type:
          type: string
      description: Represents an object parameter property argument in a logic rule.
    Ontologies.ObjectPrimaryKey:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/Ontologies.PropertyValue"
    Ontologies.ObjectPropertyType:
      description: |
        A union of all the types supported by Ontology Object properties.
      discriminator:
        propertyName: type
        mapping:
          array: "#/components/schemas/Ontologies.OntologyObjectArrayType"
          attachment: "#/components/schemas/Core.AttachmentType"
          boolean: "#/components/schemas/Core.BooleanType"
          byte: "#/components/schemas/Core.ByteType"
          cipherText: "#/components/schemas/Core.CipherTextType"
          date: "#/components/schemas/Core.DateType"
          decimal: "#/components/schemas/Core.DecimalType"
          double: "#/components/schemas/Core.DoubleType"
          float: "#/components/schemas/Core.FloatType"
          geopoint: "#/components/schemas/Core.GeoPointType"
          geoshape: "#/components/schemas/Core.GeoShapeType"
          geotimeSeriesReference: "#/components/schemas/Core.GeotimeSeriesReferenceType"
          integer: "#/components/schemas/Core.IntegerType"
          long: "#/components/schemas/Core.LongType"
          marking: "#/components/schemas/Core.MarkingType"
          mediaReference: "#/components/schemas/Core.MediaReferenceType"
          short: "#/components/schemas/Core.ShortType"
          string: "#/components/schemas/Core.StringType"
          struct: "#/components/schemas/Ontologies.StructType"
          timeseries: "#/components/schemas/Core.TimeseriesType"
          timestamp: "#/components/schemas/Core.TimestampType"
          vector: "#/components/schemas/Core.VectorType"
      oneOf:
      - $ref: "#/components/schemas/Core.DateType"
      - $ref: "#/components/schemas/Ontologies.StructType"
      - $ref: "#/components/schemas/Core.StringType"
      - $ref: "#/components/schemas/Core.ByteType"
      - $ref: "#/components/schemas/Core.DoubleType"
      - $ref: "#/components/schemas/Core.GeoPointType"
      - $ref: "#/components/schemas/Core.GeotimeSeriesReferenceType"
      - $ref: "#/components/schemas/Core.IntegerType"
      - $ref: "#/components/schemas/Core.FloatType"
      - $ref: "#/components/schemas/Core.GeoShapeType"
      - $ref: "#/components/schemas/Core.LongType"
      - $ref: "#/components/schemas/Core.BooleanType"
      - $ref: "#/components/schemas/Core.CipherTextType"
      - $ref: "#/components/schemas/Core.MarkingType"
      - $ref: "#/components/schemas/Core.AttachmentType"
      - $ref: "#/components/schemas/Core.MediaReferenceType"
      - $ref: "#/components/schemas/Core.TimeseriesType"
      - $ref: "#/components/schemas/Ontologies.OntologyObjectArrayType"
      - $ref: "#/components/schemas/Core.ShortType"
      - $ref: "#/components/schemas/Core.VectorType"
      - $ref: "#/components/schemas/Core.DecimalType"
      - $ref: "#/components/schemas/Core.TimestampType"
    Ontologies.ObjectPropertyValueConstraint:
      required:
      - type
      type: object
      properties:
        type:
          type: string
      description: |
        The parameter value must be a property value of an object found within an object set.
    Ontologies.ObjectQueryResultConstraint:
      required:
      - type
      type: object
      properties:
        type:
          type: string
      description: |
        The parameter value must be the primary key of an object found within an object set.
    Ontologies.ObjectRid:
      type: string
      description: |
        The unique resource identifier of an object, useful for interacting with other Foundry APIs.
    Ontologies.ObjectSet:
      description: Represents the definition of an `ObjectSet` in the `Ontology`.
      discriminator:
        propertyName: type
        mapping:
          asBaseObjectTypes: "#/components/schemas/Ontologies.ObjectSetAsBaseObjectTypesType"
          asType: "#/components/schemas/Ontologies.ObjectSetAsTypeType"
          base: "#/components/schemas/Ontologies.ObjectSetBaseType"
          filter: "#/components/schemas/Ontologies.ObjectSetFilterType"
          interfaceBase: "#/components/schemas/Ontologies.ObjectSetInterfaceBaseType"
          interfaceLinkSearchAround: "#/components/schemas/Ontologies.ObjectSetInterfaceLinkSearchAroundType"
          intersect: "#/components/schemas/Ontologies.ObjectSetIntersectionType"
          methodInput: "#/components/schemas/Ontologies.ObjectSetMethodInputType"
          nearestNeighbors: "#/components/schemas/Ontologies.ObjectSetNearestNeighborsType"
          reference: "#/components/schemas/Ontologies.ObjectSetReferenceType"
          searchAround: "#/components/schemas/Ontologies.ObjectSetSearchAroundType"
          static: "#/components/schemas/Ontologies.ObjectSetStaticType"
          subtract: "#/components/schemas/Ontologies.ObjectSetSubtractType"
          union: "#/components/schemas/Ontologies.ObjectSetUnionType"
          withProperties: "#/components/schemas/Ontologies.ObjectSetWithPropertiesType"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.ObjectSetSearchAroundType"
      - $ref: "#/components/schemas/Ontologies.ObjectSetStaticType"
      - $ref: "#/components/schemas/Ontologies.ObjectSetIntersectionType"
      - $ref: "#/components/schemas/Ontologies.ObjectSetWithPropertiesType"
      - $ref: "#/components/schemas/Ontologies.ObjectSetInterfaceLinkSearchAroundType"
      - $ref: "#/components/schemas/Ontologies.ObjectSetSubtractType"
      - $ref: "#/components/schemas/Ontologies.ObjectSetNearestNeighborsType"
      - $ref: "#/components/schemas/Ontologies.ObjectSetUnionType"
      - $ref: "#/components/schemas/Ontologies.ObjectSetAsTypeType"
      - $ref: "#/components/schemas/Ontologies.ObjectSetMethodInputType"
      - $ref: "#/components/schemas/Ontologies.ObjectSetReferenceType"
      - $ref: "#/components/schemas/Ontologies.ObjectSetFilterType"
      - $ref: "#/components/schemas/Ontologies.ObjectSetInterfaceBaseType"
      - $ref: "#/components/schemas/Ontologies.ObjectSetAsBaseObjectTypesType"
      - $ref: "#/components/schemas/Ontologies.ObjectSetBaseType"
    Ontologies.ObjectSetAsBaseObjectTypesType:
      required:
      - objectSet
      - type
      type: object
      properties:
        objectSet:
          $ref: "#/components/schemas/Ontologies.ObjectSet"
        type:
          type: string
      description: |
        Casts the objects in the object set to their base type and thus ensures objects are returned with all of their
        properties in the resulting object set, not just the properties that implement interface properties.
    Ontologies.ObjectSetAsTypeType:
      required:
      - entityType
      - objectSet
      - type
      type: object
      properties:
        entityType:
          type: string
          description: |
            An object type or interface type API name.
        objectSet:
          $ref: "#/components/schemas/Ontologies.ObjectSet"
        type:
          type: string
      description: "Casts an object set to a specified object type or interface type\
        \ API name. Any object whose object type does \nnot match the object type\
        \ provided or implement the interface type provided will be dropped from the\
        \ resulting \nobject set.\n"
    Ontologies.ObjectSetBaseType:
      required:
      - objectType
      - type
      type: object
      properties:
        objectType:
          type: string
          description: The API name of the object type.
          example: exampleAircraft
        type:
          type: string
    Ontologies.ObjectSetFilterType:
      required:
      - objectSet
      - type
      - where
      type: object
      properties:
        objectSet:
          $ref: "#/components/schemas/Ontologies.ObjectSet"
        type:
          type: string
        where:
          $ref: "#/components/schemas/Ontologies.SearchJsonQueryV2"
    Ontologies.ObjectSetInterfaceBaseType:
      required:
      - interfaceType
      - type
      type: object
      properties:
        includeAllBaseObjectProperties:
          type: boolean
          description: "A flag that will return all of the underlying object properties\
            \ for the objects that implement the interface. \nThis includes properties\
            \ that don't explicitly implement an SPT on the interface.\n"
        interfaceType:
          type: string
          description: "An object set with objects that implement the interface with\
            \ the given interface API name. The objects in \nthe object set will only\
            \ have properties that implement properties of the given interface, unless\
            \ you set the includeAllBaseObjectProperties flag.\n"
        type:
          type: string
    Ontologies.ObjectSetInterfaceLinkSearchAroundType:
      required:
      - interfaceLink
      - objectSet
      - type
      type: object
      properties:
        interfaceLink:
          $ref: "#/components/schemas/Ontologies.InterfaceLinkTypeApiName"
        objectSet:
          $ref: "#/components/schemas/Ontologies.ObjectSet"
        type:
          type: string
    Ontologies.ObjectSetIntersectionType:
      required:
      - type
      type: object
      properties:
        objectSets:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.ObjectSet"
        type:
          type: string
    Ontologies.ObjectSetMethodInputType:
      required:
      - type
      type: object
      properties:
        type:
          type: string
      description: |
        ObjectSet which is the root of a MethodObjectSet definition.

        This feature is experimental and not yet generally available.
    Ontologies.ObjectSetNearestNeighborsType:
      required:
      - numNeighbors
      - objectSet
      - propertyIdentifier
      - query
      - type
      type: object
      properties:
        numNeighbors:
          type: integer
          description: |
            The number of objects to return. If the number of documents in the objectType is less than the provided
            value, all objects will be returned. This value is limited to 1 &lt;= numNeighbors &lt;= 500.
        objectSet:
          $ref: "#/components/schemas/Ontologies.ObjectSet"
        propertyIdentifier:
          $ref: "#/components/schemas/Ontologies.PropertyIdentifier"
        query:
          $ref: "#/components/schemas/Ontologies.NearestNeighborsQuery"
        similarityThreshold:
          type: number
          description: |
            The similarity threshold results must be above to be included in the returned in the object set.
            0 &lt;= Threshold &lt;= 1. Where 1 is identical and 0 is least similar.
          format: double
        type:
          type: string
      description: "ObjectSet containing the top `numNeighbors` objects with `propertyIdentifier`\
        \ nearest to the input vector or\ntext. This can only be performed on a property\
        \ with type vector that has been configured to be searched with\napproximate\
        \ nearest neighbors using a similarity function configured in the Ontology.\n\
        \nA non-zero score for each resulting object is returned when the `orderType`\
        \ in the `orderBy` field is set to\n`relevance`. Note that:\n  - Scores will\
        \ not be returned if a nearestNeighbors object set is composed through union,\
        \ subtraction \n    or intersection with non-nearestNeighbors object sets.\n\
        \  - If results have scores, the order of the scores will be decreasing (duplicate\
        \ scores are possible).\n"
    Ontologies.ObjectSetNotFound:
      description: "The requested object set is not found, or the client token does\
        \ not have access to it."
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - NOT_FOUND
          parameters:
            required:
            - objectSetRid
            type: object
            properties:
              objectSetRid:
                $ref: "#/components/schemas/Ontologies.ObjectSetRid"
    Ontologies.ObjectSetReferenceType:
      required:
      - reference
      - type
      type: object
      properties:
        reference:
          $ref: "#/components/schemas/Ontologies.ObjectSetRid"
        type:
          type: string
    Ontologies.ObjectSetRid:
      type: string
    Ontologies.ObjectSetSearchAroundType:
      required:
      - link
      - objectSet
      - type
      type: object
      properties:
        link:
          $ref: "#/components/schemas/Ontologies.LinkTypeApiName"
        objectSet:
          $ref: "#/components/schemas/Ontologies.ObjectSet"
        type:
          type: string
    Ontologies.ObjectSetStaticType:
      required:
      - type
      type: object
      properties:
        objects:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.ObjectRid"
        type:
          type: string
    Ontologies.ObjectSetStreamSubscribeRequest:
      required:
      - objectSet
      type: object
      properties:
        objectSet:
          $ref: "#/components/schemas/Ontologies.ObjectSet"
        propertySet:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.SelectedPropertyApiName"
        referenceSet:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.SelectedPropertyApiName"
    Ontologies.ObjectSetStreamSubscribeRequests:
      required:
      - id
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Ontologies.RequestId"
        requests:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.ObjectSetStreamSubscribeRequest"
      description: "The list of object sets that should be subscribed to. A client\
        \ can stop subscribing to an object set \nby removing the request from subsequent\
        \ ObjectSetStreamSubscribeRequests.\n"
    Ontologies.ObjectSetSubscribeResponse:
      discriminator:
        propertyName: type
        mapping:
          error: "#/components/schemas/Ontologies.SubscriptionError"
          qos: "#/components/schemas/Ontologies.QosError"
          success: "#/components/schemas/Ontologies.SubscriptionSuccess"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.QosError"
      - $ref: "#/components/schemas/Ontologies.SubscriptionSuccess"
      - $ref: "#/components/schemas/Ontologies.SubscriptionError"
    Ontologies.ObjectSetSubscribeResponses:
      required:

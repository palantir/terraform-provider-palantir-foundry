        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/Datasets.CreateTransactionPermissionDenied"
                - $ref: "#/components/schemas/Datasets.AbortTransactionPermissionDenied"
                - $ref: "#/components/schemas/Datasets.CommitTransactionPermissionDenied"
                - $ref: "#/components/schemas/Datasets.DeleteFilePermissionDenied"
        "404":
          description: Not Found

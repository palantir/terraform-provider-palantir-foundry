        keyType:
          $ref: "#/components/schemas/Ontologies.QueryAggregationKeyType"
        type:
          type: string
        valueType:
          $ref: "#/components/schemas/Ontologies.TwoDimensionalAggregation"
    Ontologies.TimeRange:
      description: An absolute or relative range for a time series query.
      discriminator:
        propertyName: type
        mapping:
          absolute: "#/components/schemas/Ontologies.AbsoluteTimeRange"
          relative: "#/components/schemas/Ontologies.RelativeTimeRange"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.AbsoluteTimeRange"
      - $ref: "#/components/schemas/Ontologies.RelativeTimeRange"
    Ontologies.TimeSeriesAggregationMethod:
      type: string
      description: |
        The aggregation function to use for aggregating time series data.
      enum:
      - SUM
      - MEAN
      - STANDARD_DEVIATION
      - MAX
      - MIN
      - PERCENT_CHANGE
      - DIFFERENCE
      - PRODUCT
      - COUNT
      - FIRST
      - LAST
    Ontologies.TimeSeriesAggregationStrategy:
      description: |
        CUMULATIVE aggregates all points up to the current point.
        ROLLING aggregates all points in a rolling window whose size is either the specified number of points or
        time duration.
        PERIODIC aggregates all points in specified time windows.
      discriminator:
        propertyName: type
        mapping:
          cumulative: "#/components/schemas/Ontologies.TimeSeriesCumulativeAggregate"
          periodic: "#/components/schemas/Ontologies.TimeSeriesPeriodicAggregate"
          rolling: "#/components/schemas/Ontologies.TimeSeriesRollingAggregate"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.TimeSeriesRollingAggregate"
      - $ref: "#/components/schemas/Ontologies.TimeSeriesPeriodicAggregate"
      - $ref: "#/components/schemas/Ontologies.TimeSeriesCumulativeAggregate"
    Ontologies.TimeSeriesCumulativeAggregate:
      required:
      - type
      type: object
      properties:
        type:
          type: string
      description: |
        The cumulative aggregate is calculated progressively for each point in the input time series,
        considering all preceding points up to and including the current point.
    Ontologies.TimeSeriesPeriodicAggregate:
      required:
      - type
      - windowSize
      - windowType
      type: object
      properties:
        alignmentTimestamp:
          type: string
          description: "The timestamp used to align the result, such that ticks in\
            \ the result time series will lie at integer\nmultiples of the window\
            \ duration from the alignment timestamp.\n\nDefault is the first epoch\
            \ timestamp (January 1, 1970, 00:00:00 UTC) so that all aggregated points\
            \ have\ntimestamps at midnight UTC at the start of each window duration.\n\
            \nFor example, for a weekly aggregate with alignment timestamp 5 January,\
            \ 8:33PM, \neach aggregated timestamp will lie on the 7 day intervals\
            \ at 8:33PM starting at 5 January.\n"
          format: date-time
        type:
          type: string
        windowSize:
          $ref: "#/components/schemas/Ontologies.PreciseDuration"
        windowType:
          $ref: "#/components/schemas/Ontologies.TimeSeriesWindowType"
      description: |
        Aggregates values over discrete, periodic windows for a given time series.

        A periodic window divides the time series into windows of fixed durations.
        For each window, an aggregate function is applied to the points within that window. The result is a time series
        with values representing the aggregate for each window. Windows with no data points are not included
        in the output.

        Periodic aggregation is useful for downsampling a continuous stream of data to larger granularities such as
        hourly, daily, monthly.
    Ontologies.TimeSeriesPoint:
      required:
      - time
      - value
      type: object
      properties:
        time:
          type: string
          description: An ISO 8601 timestamp
          format: date-time
        value:
          description: An object which is either an enum String or a double number.
      description: |
        A time and value pair.
    Ontologies.TimeSeriesPropertyV2:
      type: string
    Ontologies.TimeSeriesRollingAggregate:
      required:
      - type
      - windowSize
      type: object
      properties:
        type:
          type: string
        windowSize:
          $ref: "#/components/schemas/Ontologies.TimeSeriesRollingAggregateWindow"
    Ontologies.TimeSeriesRollingAggregateWindow:
      description: |
        A rolling window is a moving subset of data points that ends at the current timestamp (inclusive)
        and spans a specified duration (window size). As new data points are added, old points fall out of the
        window if they are outside the specified duration.

        Rolling windows are commonly used for smoothing data, detecting trends, and reducing noise
        in time series analysis.
      discriminator:
        propertyName: type
        mapping:
          duration: "#/components/schemas/Ontologies.PreciseDuration"
          pointsCount: "#/components/schemas/Ontologies.RollingAggregateWindowPoints"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.PreciseDuration"
      - $ref: "#/components/schemas/Ontologies.RollingAggregateWindowPoints"
    Ontologies.TimeSeriesValueBankProperty:

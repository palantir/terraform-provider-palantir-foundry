        severity: MODERATE
    DataHealth.SchemaComparisonType:
      type: string
      description: "The type of schema comparison to perform:\n- EXACT_MATCH_ORDERED_COLUMNS:\
        \ Schemas must have identical columns in the same order.\n- EXACT_MATCH_UNORDERED_COLUMNS:\
        \ Schemas must have identical columns but order doesn't matter.\n- COLUMN_ADDITIONS_ALLOWED:\
        \ Expected schema columns must be present, additional columns are allowed\
        \ and \n  missing column types are ignored.\n- COLUMN_ADDITIONS_ALLOWED_STRICT:\
        \ Expected schema columns must be present, additional columns are allowed.\
        \ \n  Both expected and actual columns must specify types and they must match\
        \ exactly."
      example: EXACT_MATCH_ORDERED_COLUMNS
      enum:
      - EXACT_MATCH_ORDERED_COLUMNS
      - EXACT_MATCH_UNORDERED_COLUMNS
      - COLUMN_ADDITIONS_ALLOWED
      - COLUMN_ADDITIONS_ALLOWED_STRICT

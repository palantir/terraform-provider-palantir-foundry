  /v2/datasets/{datasetRid}/files:
    get:
      tags:
      - DatasetsApiService
      description: "Lists Files contained in a Dataset. By default files are listed\
        \ on the latest view of the default \nbranch - `master` for most enrollments.\n\
        #### Advanced Usage\nSee [Datasets Core Concepts](/docs/foundry/data-integration/datasets/)\
        \ for details on using branches and transactions.\nTo **list files on a specific\
        \ Branch** specify the Branch's name as `branchName`. This will include the\
        \ most\nrecent version of all files since the latest snapshot transaction,\
        \ or the earliest ancestor transaction of the \nbranch if there are no snapshot\
        \ transactions.\nTo **list files on the resolved view of a transaction** specify\
        \ the Transaction's resource identifier\nas `endTransactionRid`. This will\
        \ include the most recent version of all files since the latest snapshot\n\
        transaction, or the earliest ancestor transaction if there are no snapshot\
        \ transactions.\nTo **list files on the resolved view of a range of transactions**\
        \ specify the the start transaction's resource\nidentifier as `startTransactionRid`\
        \ and the end transaction's resource identifier as `endTransactionRid`. This\n\
        will include the most recent version of all files since the `startTransactionRid`\
        \ up to the `endTransactionRid`.\nNote that an intermediate snapshot transaction\
        \ will remove all files from the view. Behavior is undefined when \nthe start\
        \ and end transactions do not belong to the same root-to-leaf path.\nTo **list\
        \ files on a specific transaction** specify the Transaction's resource identifier\
        \ as both the \n`startTransactionRid` and `endTransactionRid`. This will include\
        \ only files that were modified as part of that\nTransaction.\n"
      operationId: datasetsListFiles
      parameters:
      - name: datasetRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Datasets.DatasetRid"
      - name: branchName
        in: query
        description: |
          The name of the Branch on which to list Files. Defaults to `master` for most enrollments.
        required: false
        schema:
          $ref: "#/components/schemas/Datasets.BranchName"
      - name: startTransactionRid
        in: query
        description: |
          The Resource Identifier (RID) of the start Transaction.
        required: false
        schema:
          $ref: "#/components/schemas/Datasets.TransactionRid"
      - name: endTransactionRid
        in: query
        description: |
          The Resource Identifier (RID) of the end Transaction.
        required: false
        schema:
          $ref: "#/components/schemas/Datasets.TransactionRid"
      - name: pageSize
        in: query
        description: The page size to use for the endpoint.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PageSize"
      - name: pageToken
        in: query
        description: |-
          The page token indicates where to start paging. This should be omitted from the first page's request.
          To fetch the next page, clients should take the value from the `nextPageToken` field of the previous response
          and use it to populate the `pageToken` field of the next request.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PageToken"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Datasets.ListFilesResponse"
      security:
      - BearerAuth: []
      x-releaseStage: STABLE

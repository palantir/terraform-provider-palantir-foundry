      - symbol
      type: object
      properties:
        symbol:
          $ref: "#/components/schemas/Gaia.GaiaSymbol"
    Gaia.TacticalGraphicProperties:
      required:
      - modifiers
      - sidc
      type: object
      properties:
        controlPoints:
          type: array
          items:
            $ref: "#/components/schemas/Gaia.GaiaCoordinate"
        modifiers:
          $ref: "#/components/schemas/Gaia.MilSymModifiers"
        sidc:
          $ref: "#/components/schemas/Gaia.MilsymSymbol"
      description: |
        The unique properties (WSG84 control points, modifiers, and the SIDC) required to create a tactical graphic.
    Gaia.TemporaryObjectSet:
      required:
      - expiryTime
      type: object
      properties:
        expiryTime:
          type: string
          format: date-time
        objectSetRid:
          $ref: "#/components/schemas/Gaia.ObjectSetRid"
    Gaia.TextAlignment:
      type: string
      example: CENTER
      enum:
      - CENTER
      - RIGHT
      - LEFT
    Gaia.UnknownSymbolType:
      description: "Unknown symbol type not supported, must be either IconSymbol or\
        \ MilsymSymbol."
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            type: object
            properties:
              unknownType:
                type: string
    Geo.BBox:
      type: array
      description: |
        A GeoJSON object MAY have a member named "bbox" to include
        information on the coordinate range for its Geometries, Features, or
        FeatureCollections. The value of the bbox member MUST be an array of
        length 2*n where n is the number of dimensions represented in the
        contained geometries, with all axes of the most southwesterly point
        followed by all axes of the more northeasterly point. The axes order
        of a bbox follows the axes order of geometries.
      items:
        $ref: "#/components/schemas/Geo.Coordinate"
    Geo.Coordinate:
      type: number
      format: double
    Geo.Feature:
      required:
      - type
      type: object
      properties:
        bbox:
          $ref: "#/components/schemas/Geo.BBox"
        geometry:
          $ref: "#/components/schemas/Geo.Geometry"
        id:
          description: |
            If a `Feature` has a commonly used identifier, that identifier
            SHOULD be included as a member of the Feature object with the name
            "id", and the value of this member is either a JSON string or
            number.
        properties:
          type: object
          additionalProperties: {}
          description: |
            A `Feature` object has a member with the name "properties".  The
            value of the properties member is an object (any JSON object or a
            JSON null value).
        type:
          type: string
      description: GeoJSon 'Feature' object
    Geo.FeatureCollection:
      required:
      - type
      type: object
      properties:
        bbox:
          $ref: "#/components/schemas/Geo.BBox"
        features:
          type: array
          items:
            $ref: "#/components/schemas/Geo.FeatureCollectionTypes"
        type:
          type: string
      description: GeoJSon 'FeatureCollection' object
    Geo.FeatureCollectionTypes:
      discriminator:
        propertyName: type
        mapping:
          Feature: "#/components/schemas/Geo.Feature"
      oneOf:
      - $ref: "#/components/schemas/Geo.Feature"
    Geo.FeaturePropertyKey:
      type: string
    Geo.GeoJsonObject:
      description: |
        GeoJSon object

        The coordinate reference system for all GeoJSON coordinates is a
        geographic coordinate reference system, using the World Geodetic System
        1984 (WGS 84) datum, with longitude and latitude units of decimal
        degrees.
        This is equivalent to the coordinate reference system identified by the
        Open Geospatial Consortium (OGC) URN
        An OPTIONAL third-position element SHALL be the height in meters above
        or below the WGS 84 reference ellipsoid.
        In the absence of elevation values, applications sensitive to height or
        depth SHOULD interpret positions as being at local ground or sea level.
      discriminator:
        propertyName: type
        mapping:
          Feature: "#/components/schemas/Geo.Feature"
          FeatureCollection: "#/components/schemas/Geo.FeatureCollection"
          GeometryCollection: "#/components/schemas/Geo.GeometryCollection"
          LineString: "#/components/schemas/Geo.LineString"
          MultiLineString: "#/components/schemas/Geo.MultiLineString"
          MultiPoint: "#/components/schemas/Geo.MultiPoint"
          MultiPolygon: "#/components/schemas/Geo.MultiPolygon"
          Point: "#/components/schemas/Geo.GeoPoint"
          Polygon: "#/components/schemas/Geo.Polygon"
      oneOf:
      - $ref: "#/components/schemas/Geo.MultiPoint"
      - $ref: "#/components/schemas/Geo.GeometryCollection"
      - $ref: "#/components/schemas/Geo.MultiLineString"
      - $ref: "#/components/schemas/Geo.FeatureCollection"
      - $ref: "#/components/schemas/Geo.LineString"
      - $ref: "#/components/schemas/Geo.MultiPolygon"
      - $ref: "#/components/schemas/Geo.GeoPoint"
      - $ref: "#/components/schemas/Geo.Polygon"
      - $ref: "#/components/schemas/Geo.Feature"
    Geo.GeoPoint:
      required:
      - coordinates
      - type
      type: object
      properties:
        bbox:
          $ref: "#/components/schemas/Geo.BBox"
        coordinates:
          $ref: "#/components/schemas/Geo.Position"
        type:
          type: string
    Geo.Geometry:
      description: Abstract type for all GeoJSon object except Feature and FeatureCollection
      discriminator:
        propertyName: type
        mapping:
          GeometryCollection: "#/components/schemas/Geo.GeometryCollection"
          LineString: "#/components/schemas/Geo.LineString"
          MultiLineString: "#/components/schemas/Geo.MultiLineString"
          MultiPoint: "#/components/schemas/Geo.MultiPoint"
          MultiPolygon: "#/components/schemas/Geo.MultiPolygon"
          Point: "#/components/schemas/Geo.GeoPoint"
          Polygon: "#/components/schemas/Geo.Polygon"
      oneOf:
      - $ref: "#/components/schemas/Geo.MultiPoint"
      - $ref: "#/components/schemas/Geo.GeometryCollection"
      - $ref: "#/components/schemas/Geo.MultiLineString"
      - $ref: "#/components/schemas/Geo.LineString"
      - $ref: "#/components/schemas/Geo.MultiPolygon"
      - $ref: "#/components/schemas/Geo.GeoPoint"
      - $ref: "#/components/schemas/Geo.Polygon"
    Geo.GeometryCollection:
      required:
      - type
      type: object
      properties:
        bbox:
          $ref: "#/components/schemas/Geo.BBox"
        geometries:
          minItems: 0
          type: array
          items:
            $ref: "#/components/schemas/Geo.Geometry"
        type:
          type: string
      description: |
        GeoJSon geometry collection

        GeometryCollections composed of a single part or a number of parts of a
        single type SHOULD be avoided when that single part or a single object
        of multipart type (MultiPoint, MultiLineString, or MultiPolygon) could
        be used instead.
    Geo.LineString:
      required:
      - type
      type: object
      properties:
        bbox:
          $ref: "#/components/schemas/Geo.BBox"
        coordinates:
          $ref: "#/components/schemas/Geo.LineStringCoordinates"
        type:
          type: string
    Geo.LineStringCoordinates:
      minItems: 2
      type: array
      description: |
        GeoJSon fundamental geometry construct, array of two or more positions.
      items:
        $ref: "#/components/schemas/Geo.Position"
    Geo.LinearRing:
      minItems: 4
      type: array
      description: |
        A linear ring is a closed LineString with four or more positions.

        The first and last positions are equivalent, and they MUST contain
        identical values; their representation SHOULD also be identical.

        A linear ring is the boundary of a surface or the boundary of a hole in
        a surface.

        A linear ring MUST follow the right-hand rule with respect to the area
        it bounds, i.e., exterior rings are counterclockwise, and holes are
        clockwise.
      items:
        $ref: "#/components/schemas/Geo.Position"
    Geo.MultiLineString:
      required:
      - type
      type: object
      properties:
        bbox:
          $ref: "#/components/schemas/Geo.BBox"
        coordinates:
          type: array
          items:
            $ref: "#/components/schemas/Geo.LineStringCoordinates"
        type:
          type: string
    Geo.MultiPoint:
      required:
      - type
      type: object
      properties:
        bbox:
          $ref: "#/components/schemas/Geo.BBox"
        coordinates:
          type: array
          items:
            $ref: "#/components/schemas/Geo.Position"
        type:
          type: string
    Geo.MultiPolygon:
      required:
      - type
      type: object
      properties:
        bbox:
          $ref: "#/components/schemas/Geo.BBox"
        coordinates:
          type: array
          items:
            type: array
            items:
              $ref: "#/components/schemas/Geo.LinearRing"
        type:
          type: string
    Geo.Polygon:
      required:
      - type
      type: object
      properties:
        bbox:
          $ref: "#/components/schemas/Geo.BBox"
        coordinates:
          type: array
          items:
            $ref: "#/components/schemas/Geo.LinearRing"
        type:
          type: string
    Geo.Position:
      maxItems: 3
      minItems: 2
      type: array
      description: |
        GeoJSon fundamental geometry construct.

        A position is an array of numbers. There MUST be two or more elements.
        The first two elements are longitude and latitude, precisely in that order and using decimal numbers.
        Altitude or elevation MAY be included as an optional third element.

        Implementations SHOULD NOT extend positions beyond three elements
        because the semantics of extra elements are unspecified and ambiguous.
        Historically, some implementations have used a fourth element to carry
        a linear referencing measure (sometimes denoted as "M") or a numerical
        timestamp, but in most situations a parser will not be able to properly
        interpret these values. The interpretation and meaning of additional
        elements is beyond the scope of this specification, and additional
        elements MAY be ignored by parsers.
      items:
        $ref: "#/components/schemas/Geo.Coordinate"

        \ transaction, or the earliest\nancestor transaction of the branch if there\
        \ are no snapshot transactions.\nTo **get a file's metadata from the resolved\
        \ view of a transaction** specify the Transaction's resource identifier\n\
        as `endTransactionRid`. This will retrieve metadata for the most recent version\
        \ of the file since the latest snapshot\ntransaction, or the earliest ancestor\
        \ transaction if there are no snapshot transactions.\nTo **get a file's metadata\
        \ from the resolved view of a range of transactions** specify the the start\
        \ transaction's\nresource identifier as `startTransactionRid` and the end\
        \ transaction's resource identifier as `endTransactionRid`.\nThis will retrieve\
        \ metadata for the most recent version of the file since the `startTransactionRid`\
        \ up to the \n`endTransactionRid`. Behavior is undefined when the start and\
        \ end transactions do not belong to the same root-to-leaf path.\nTo **get\
        \ a file's metadata from a specific transaction** specify the Transaction's\
        \ resource identifier as both the \n`startTransactionRid` and `endTransactionRid`.\n"
      operationId: datasetsGetFile

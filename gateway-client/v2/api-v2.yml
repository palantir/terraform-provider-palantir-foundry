  /v2/admin/users/{userId}/groupMemberships:
    get:
      tags:
      - AdminApiService
      description: "Lists all Groups a given User is a member of.\n\nThis is a paged\
        \ endpoint. Each page may be smaller or larger than the requested page size.\
        \ However, \nit is guaranteed that if there are more results available, the\
        \ `nextPageToken` field will be populated. \nTo get the next page, make the\
        \ same request again, but set the value of the `pageToken` query parameter\
        \ \nto be value of the `nextPageToken` value of the previous response. If\
        \ there is no `nextPageToken` field \nin the response, you are on the last\
        \ page.\n"
      operationId: adminListGroupMemberships
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.UserId"
      - name: transitive
        in: query
        description: |
          When true, includes the transitive memberships of the Groups the User is a member of. For example, say the
          User is a member of Group A, and Group A is a member of Group B. If `transitive=false` only Group A will
          be returned, but if `transitive=true` then Groups A and B will be returned. This
          will recursively resolve Groups through all layers of nesting.

          Defaults to false.
        required: false
        schema:
          type: boolean
      - name: pageSize
        in: query
        description: The page size to use for the endpoint.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PageSize"
      - name: pageToken
        in: query
        description: |-
          The page token indicates where to start paging. This should be omitted from the first page's request.
          To fetch the next page, clients should take the value from the `nextPageToken` field of the previous response
          and use it to populate the `pageToken` field of the next request.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PageToken"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.ListGroupMembershipsResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/Core.InvalidPageSize"
                - $ref: "#/components/schemas/Admin.UserDeleted"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.UserNotFound"
      security:
      - BearerAuth: []
      x-releaseStage: STABLE

    AipAgents.StreamingContinueSessionRequest:
      required:
      - userInput
      type: object
      properties:
        contextsOverride:
          type: array
          description: |
            If set, automatic [context](/docs/foundry/agent-studio/retrieval-context/) retrieval is skipped and the list of specified context is provided to the Agent instead.
            If omitted, relevant context for the user message is automatically retrieved and included in the prompt, based on data sources configured on the Agent for the session.
          items:
            $ref: "#/components/schemas/AipAgents.InputContext"
        messageId:
          $ref: "#/components/schemas/AipAgents.MessageId"
        parameterInputs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/AipAgents.ParameterValue"
          description: |
            Any supplied values for [application variables](/docs/foundry/agent-studio/application-state/) to pass to the Agent for the exchange.
          example:
            currentCustomerOrders:
              objectSet:
                objectSet:
                  objectType: customerOrder
                  type: base
                type: filter
                where:
                  field: customerId
                  type: eq
                  value: 123abc
              ontology: example-ontology
              type: objectSet
        sessionTraceId:
          $ref: "#/components/schemas/AipAgents.SessionTraceId"
        userInput:
          $ref: "#/components/schemas/AipAgents.UserTextInput"
      example:
        messageId: 00f8412a-c29d-4063-a417-8052825285a5
        parameterInputs:
          currentCustomerOrders:
            objectSet:
              objectSet:
                objectType: customerOrder
                type: base
              type: filter
              where:
                field: customerId
                type: eq
                value: 123abc
            ontology: example-ontology
            type: objectSet
        sessionTraceId: 12345678-1234-5678-1234-123456789abc
        userInput:
          text: What is the status of my order?

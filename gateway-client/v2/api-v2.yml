      enum:
      - DAYS
      - MONTHS
      - QUARTERS
      - YEARS
    Ontologies.ExtractPropertyExpression:
      required:
      - part
      - property
      - type
      type: object
      properties:
        part:
          $ref: "#/components/schemas/Ontologies.ExtractDatePart"
        property:
          $ref: "#/components/schemas/Ontologies.DerivedPropertyDefinition"
        type:
          type: string
      description: |
        Extracts the specified date part from a date or timestamp.
    Ontologies.FieldNameV1:
      type: string
      description: "A reference to an Ontology object property with the form `properties.{propertyApiName}`."
    Ontologies.FilterValue:
      type: string
      description: |
        Represents the value of a property filter. For instance, false is the FilterValue in
        `properties.{propertyApiName}.isNull=false`.
    Ontologies.FixedValuesMapKey:
      type: integer
      description: Integer key for fixed value mapping.
    Ontologies.FunctionEncounteredUserFacingError:
      description: |
        The authored function failed to execute because of a user induced error. The message argument
        is meant to be displayed to the user.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            required:
            - functionRid
            - functionVersion
            - message
            type: object
            properties:
              functionRid:
                $ref: "#/components/schemas/Ontologies.FunctionRid"
              functionVersion:
                $ref: "#/components/schemas/Ontologies.FunctionVersion"
              message:
                type: string
    Ontologies.FunctionExecutionFailed:
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            required:
            - functionRid
            - functionVersion
            type: object
            properties:
              functionRid:
                $ref: "#/components/schemas/Ontologies.FunctionRid"
              functionVersion:
                $ref: "#/components/schemas/Ontologies.FunctionVersion"
              message:
                type: string
              stacktrace:
                type: string
    Ontologies.FunctionExecutionTimedOut:
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - TIMEOUT
          parameters:
            required:
            - functionRid
            - functionVersion
            type: object
            properties:
              functionRid:
                $ref: "#/components/schemas/Ontologies.FunctionRid"
              functionVersion:
                $ref: "#/components/schemas/Ontologies.FunctionVersion"
    Ontologies.FunctionInvalidInput:
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            required:
            - functionRid
            - functionVersion
            type: object
            properties:
              functionRid:
                $ref: "#/components/schemas/Ontologies.FunctionRid"
              functionVersion:
                $ref: "#/components/schemas/Ontologies.FunctionVersion"
    Ontologies.FunctionLogicRule:
      required:
      - functionRid
      - functionVersion
      - type
      type: object
      properties:
        functionInputValues:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Ontologies.LogicRuleArgument"
        functionRid:
          $ref: "#/components/schemas/Ontologies.FunctionRid"
        functionVersion:
          $ref: "#/components/schemas/Ontologies.FunctionVersion"
        type:
          type: string
    Ontologies.FunctionParameterName:
      type: string
      description: |
        The name of an input to a function.
    Ontologies.FunctionRid:
      type: string
      description: |
        The unique resource identifier of a Function, useful for interacting with other Foundry APIs.
    Ontologies.FunctionVersion:
      type: string
      description: |
        The version of the given Function, written `<major>.<minor>.<patch>-<tag>`, where `-<tag>` is optional.
        Examples: `1.2.3`, `1.2.3-rc1`.
    Ontologies.Fuzzy:
      type: boolean
      description: Setting fuzzy to `true` allows approximate matching in search queries
        that support it.
    Ontologies.FuzzyV2:
      type: boolean
      description: Setting fuzzy to `true` allows approximate matching in search queries
        that support it.
    Ontologies.GeotimeSeriesId:
      type: string
      description: The unique id of a geotime series (track) associated with a GTSR.
    Ontologies.GeotimeSeriesIntegrationRid:
      type: string
      description: The unique resource identifier of a geotime integration.
    Ontologies.GeotimeSeriesProperty:
      required:
      - geotimeSeriesId
      - geotimeSeriesIntegrationRid
      type: object
      properties:
        geotimeSeriesId:
          $ref: "#/components/schemas/Ontologies.GeotimeSeriesId"
        geotimeSeriesIntegrationRid:
          $ref: "#/components/schemas/Ontologies.GeotimeSeriesIntegrationRid"
      description: The representation of a geotime series integration as a data type.
    Ontologies.GeotimeSeriesValue:
      required:
      - position
      - timestamp
      - type
      type: object
      properties:
        position:
          $ref: "#/components/schemas/Geo.Position"
        timestamp:
          type: string
          format: date-time
        type:
          type: string
      description: The underlying data values pointed to by a GeotimeSeriesReference.
    Ontologies.GetSelectedPropertyOperation:
      required:
      - selectedPropertyApiName
      - type
      type: object
      properties:
        selectedPropertyApiName:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        type:
          type: string
      description: |
        Gets a single value of a property. Throws if the target object set is on the MANY side of the link and could
        explode the cardinality.

        Use collectList or collectSet which will return a list of values in that case.
    Ontologies.GreatestPropertyExpression:
      required:
      - type
      type: object
      properties:
        properties:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.DerivedPropertyDefinition"
        type:
          type: string
      description: |
        Finds greatest of two or more numeric, date or timestamp values.
    Ontologies.GroupMemberConstraint:
      required:
      - type
      type: object
      properties:
        type:
          type: string
      description: |
        The parameter value must be the user id of a member belonging to at least one of the groups defined by the constraint.
    Ontologies.GtQuery:
      required:
      - field
      - type
      - value
      type: object
      properties:
        field:
          $ref: "#/components/schemas/Ontologies.FieldNameV1"
        type:
          type: string
        value:
          $ref: "#/components/schemas/Ontologies.PropertyValue"
      description: Returns objects where the specified field is greater than a value.
    Ontologies.GtQueryV2:
      required:
      - type
      - value
      type: object
      properties:
        field:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        propertyIdentifier:
          $ref: "#/components/schemas/Ontologies.PropertyIdentifier"
        type:
          type: string
        value:
          $ref: "#/components/schemas/Ontologies.PropertyValue"
      description: |
        Returns objects where the specified field is greater than a value. Allows you to specify a property to query on
        by a variety of means. Either `field` or `propertyIdentifier` must be supplied, but not both.
    Ontologies.GteQuery:
      required:
      - field
      - type
      - value
      type: object
      properties:
        field:
          $ref: "#/components/schemas/Ontologies.FieldNameV1"
        type:
          type: string
        value:
          $ref: "#/components/schemas/Ontologies.PropertyValue"
      description: Returns objects where the specified field is greater than or equal
        to a value.
    Ontologies.GteQueryV2:
      required:
      - type
      - value
      type: object
      properties:
        field:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        propertyIdentifier:
          $ref: "#/components/schemas/Ontologies.PropertyIdentifier"
        type:
          type: string
        value:
          $ref: "#/components/schemas/Ontologies.PropertyValue"
      description: "Returns objects where the specified field is greater than or equal\
        \ to a value. Allows you to specify a property \nto query on by a variety\
        \ of means. Either `field` or `propertyIdentifier` must be supplied, but not\
        \ both.\n"
    Ontologies.HighScaleComputationNotEnabled:
      description: High-scale compute was required for this Ontology query but is
        not enabled on this enrollment.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - TIMEOUT
          parameters:
            type: object
    Ontologies.HumanReadableFormat:
      required:
      - type
      type: object
      properties:
        showFullUnits:
          type: boolean
          description: Whether to show full or abbreviated time units.
        type:
          type: string
      description: Formats the duration as a human-readable written string.
    Ontologies.Icon:
      description: A union currently only consisting of the BlueprintIcon (more icon
        types may be added in the future).
      discriminator:
        propertyName: type
        mapping:
          blueprint: "#/components/schemas/Ontologies.BlueprintIcon"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.BlueprintIcon"
    Ontologies.InQuery:
      required:
      - type
      type: object
      properties:
        field:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        propertyIdentifier:
          $ref: "#/components/schemas/Ontologies.PropertyIdentifier"
        type:
          type: string
        value:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.PropertyValue"
      description: "Returns objects where the specified field equals any of the provided\
        \ values. Allows you to\nspecify a property to query on by a variety of means.\
        \ Either `field` or `propertyIdentifier` must be supplied, \nbut not both.\n"
    Ontologies.InterfaceLinkType:
      required:
      - apiName
      - cardinality
      - displayName
      - linkedEntityApiName
      - required
      - rid
      type: object
      properties:
        apiName:
          $ref: "#/components/schemas/Ontologies.InterfaceLinkTypeApiName"
        cardinality:
          $ref: "#/components/schemas/Ontologies.InterfaceLinkTypeCardinality"
        description:
          type: string
          description: The description of the interface link type.
        displayName:
          $ref: "#/components/schemas/Core.DisplayName"
        linkedEntityApiName:
          $ref: "#/components/schemas/Ontologies.InterfaceLinkTypeLinkedEntityApiName"
        required:
          type: boolean
          description: |
            Whether each implementing object type must declare at least one implementation of this link.
        rid:
          $ref: "#/components/schemas/Ontologies.InterfaceLinkTypeRid"
      description: |
        A link type constraint defined at the interface level where the implementation of the links is provided
        by the implementing object types.
    Ontologies.InterfaceLinkTypeApiName:
      type: string
      description: "The name of the interface link type in the API. To find the API\
        \ name for your Interface Link Type, check the \n[Ontology Manager](/docs/foundry/ontology-manager/overview/).\n"
    Ontologies.InterfaceLinkTypeCardinality:
      type: string
      description: |
        The cardinality of the link in the given direction. Cardinality can be "ONE", meaning an object can
        link to zero or one other objects, or "MANY", meaning an object can link to any number of other objects.
      enum:
      - ONE
      - MANY
    Ontologies.InterfaceLinkTypeLinkedEntityApiName:
      description: A reference to the linked entity. This can either be an object
        or an interface type.
      discriminator:
        propertyName: type
        mapping:
          interfaceTypeApiName: "#/components/schemas/Ontologies.LinkedInterfaceTypeApiName"
          objectTypeApiName: "#/components/schemas/Ontologies.LinkedObjectTypeApiName"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.LinkedObjectTypeApiName"
      - $ref: "#/components/schemas/Ontologies.LinkedInterfaceTypeApiName"
    Ontologies.InterfaceLinkTypeNotFound:
      description: "The requested interface link type is not found, or the client\
        \ token does not have access to it."
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - NOT_FOUND
          parameters:
            type: object
            properties:
              interfaceLinkTypeApiName:
                $ref: "#/components/schemas/Ontologies.InterfaceLinkTypeApiName"
              interfaceLinkTypeRid:
                $ref: "#/components/schemas/Ontologies.InterfaceLinkTypeRid"
              interfaceTypeApiName:
                $ref: "#/components/schemas/Ontologies.InterfaceTypeApiName"
              interfaceTypeRid:
                $ref: "#/components/schemas/Ontologies.InterfaceTypeRid"
    Ontologies.InterfaceLinkTypeRid:
      type: string
      description: |
        The unique resource identifier of an interface link type, useful for interacting with other Foundry APIs.
    Ontologies.InterfaceParameterPropertyArgument:
      required:
      - parameterId
      - sharedPropertyTypeRid
      - type
      type: object
      properties:
        parameterId:
          $ref: "#/components/schemas/Ontologies.ParameterId"
        sharedPropertyTypeRid:
          type: string
        type:
          type: string
      description: Represents an interface parameter property argument in a logic
        rule.
    Ontologies.InterfaceSharedPropertyType:
      required:
      - apiName
      - dataType
      - displayName
      - required
      - rid
      type: object
      properties:
        apiName:
          $ref: "#/components/schemas/Ontologies.SharedPropertyTypeApiName"
        dataType:
          $ref: "#/components/schemas/Ontologies.ObjectPropertyType"
        description:
          type: string
          description: A short text that describes the SharedPropertyType.
        displayName:
          $ref: "#/components/schemas/Core.DisplayName"
        required:
          type: boolean
          description: |
            Whether each implementing object type must declare an implementation for this property.
        rid:
          $ref: "#/components/schemas/Ontologies.SharedPropertyTypeRid"
        valueTypeApiName:
          $ref: "#/components/schemas/Ontologies.ValueTypeApiName"
      description: |
        A shared property type with an additional field to indicate whether the property must be included on every
        object type that implements the interface, or whether it is optional.
    Ontologies.InterfaceToObjectTypeMapping:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/Ontologies.PropertyApiName"
      description: Represents an implementation of an interface (the mapping of interface
        property to local property).
    Ontologies.InterfaceToObjectTypeMappings:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/Ontologies.InterfaceToObjectTypeMapping"
      description: Map from object type to the interface-to-object-type mapping for
        that object type.
    Ontologies.InterfaceType:
      required:
      - apiName
      - displayName
      - rid
      type: object
      properties:
        allExtendsInterfaces:
          type: array
          description: |
            A list of interface API names that this interface extends, both directly and indirectly.
          items:
            $ref: "#/components/schemas/Ontologies.InterfaceTypeApiName"
        allLinks:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Ontologies.InterfaceLinkType"
          description: |
            A map from an interface link type API name to the corresponding interface link type. The map describes the
            set of link types the interface has, including links from all directly and indirectly extended interfaces.
        allProperties:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Ontologies.InterfaceSharedPropertyType"
          description: "A map from a shared property type API name to the corresponding\
            \ shared property type. The map describes the \nset of properties the\
            \ interface has, including properties from all directly and indirectly\
            \ extended \ninterfaces.\n"
        apiName:
          $ref: "#/components/schemas/Ontologies.InterfaceTypeApiName"
        description:
          type: string
          description: The description of the interface.
        displayName:
          $ref: "#/components/schemas/Core.DisplayName"
        extendsInterfaces:
          type: array
          description: "A list of interface API names that this interface extends.\
            \ An interface can extend other interfaces to \ninherit their properties.\n"
          items:
            $ref: "#/components/schemas/Ontologies.InterfaceTypeApiName"
        implementedByObjectTypes:
          type: array
          description: |
            A list of object API names that implement this interface.
          items:
            $ref: "#/components/schemas/Ontologies.ObjectTypeApiName"
        links:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Ontologies.InterfaceLinkType"
          description: |
            A map from an interface link type API name to the corresponding interface link type. The map describes the
            set of link types the interface has.
        properties:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Ontologies.InterfaceSharedPropertyType"
          description: "A map from a shared property type API name to the corresponding\
            \ shared property type. The map describes the \nset of properties the\
            \ interface has. A shared property type must be unique across all of the\
            \ properties.\n"
        rid:
          $ref: "#/components/schemas/Ontologies.InterfaceTypeRid"
      description: Represents an interface type in the Ontology.
    Ontologies.InterfaceTypeApiName:
      type: string
      description: |
        The name of the interface type in the API in UpperCamelCase format. To find the API name for your interface
        type, use the `List interface types` endpoint or check the **Ontology Manager**.
    Ontologies.InterfaceTypeNotFound:
      description: "The requested interface type is not found, or the client token\
        \ does not have access to it."
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - NOT_FOUND
          parameters:
            type: object
            properties:
              apiName:
                $ref: "#/components/schemas/Ontologies.InterfaceTypeApiName"
              rid:
                $ref: "#/components/schemas/Ontologies.InterfaceTypeRid"
    Ontologies.InterfaceTypeRid:
      type: string
      description: "The unique resource identifier of an interface, useful for interacting\
        \ with other Foundry APIs."
    Ontologies.InterfaceTypesNotFound:
      description: "The requested interface types were not found, or the client token\
        \ does not have access to it."
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - NOT_FOUND
          parameters:
            type: object
            properties:
              apiName:
                type: array
                items:
                  $ref: "#/components/schemas/Ontologies.InterfaceTypeApiName"
              rid:
                type: array
                items:
                  $ref: "#/components/schemas/Ontologies.InterfaceTypeRid"
    Ontologies.IntersectsBoundingBoxQuery:
      required:
      - type
      - value
      type: object
      properties:
        field:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        propertyIdentifier:
          $ref: "#/components/schemas/Ontologies.PropertyIdentifier"
        type:
          type: string
        value:
          $ref: "#/components/schemas/Ontologies.BoundingBoxValue"
      description: "Returns objects where the specified field intersects the bounding\
        \ box provided. Allows you to specify a property \nto query on by a variety\
        \ of means. Either `field` or `propertyIdentifier` must be supplied, but not\
        \ both.\n"
    Ontologies.IntersectsPolygonQuery:
      required:
      - type
      - value
      type: object
      properties:
        field:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        propertyIdentifier:
          $ref: "#/components/schemas/Ontologies.PropertyIdentifier"
        type:
          type: string
        value:
          $ref: "#/components/schemas/Ontologies.PolygonValue"
      description: "Returns objects where the specified field intersects the polygon\
        \ provided. Allows you to specify a property to \nquery on by a variety of\
        \ means. Either `field` or `propertyIdentifier` must be supplied, but not\
        \ both.\n"
    Ontologies.InvalidAggregationOrdering:
      description: |
        Aggregation ordering can only be applied to metrics with exactly one groupBy clause.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            type: object
    Ontologies.InvalidAggregationOrderingWithNullValues:
      description: |
        Aggregation ordering cannot be applied for groupBy clauses that allow null values.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            type: object
    Ontologies.InvalidAggregationRange:
      description: |
        Aggregation range should include one lt or lte and one gt or gte.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            type: object
    Ontologies.InvalidAggregationRangePropertyType:
      description: |
        Range group by is not supported by property type.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            required:
            - objectType
            - property
            - propertyBaseType
            type: object
            properties:
              objectType:
                $ref: "#/components/schemas/Ontologies.ObjectTypeApiName"
              property:
                $ref: "#/components/schemas/Ontologies.PropertyApiName"
              propertyBaseType:
                $ref: "#/components/schemas/Ontologies.ValueType"
    Ontologies.InvalidAggregationRangeValue:
      description: |
        Aggregation value does not conform to the expected underlying type.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            required:
            - objectType
            - property
            - propertyBaseType
            type: object
            properties:
              objectType:
                $ref: "#/components/schemas/Ontologies.ObjectTypeApiName"
              property:
                $ref: "#/components/schemas/Ontologies.PropertyApiName"
              propertyBaseType:
                $ref: "#/components/schemas/Ontologies.ValueType"
    Ontologies.InvalidApplyActionOptionCombination:
      description: The given options are individually valid but cannot be used in
        the given combination.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            type: object
            properties:
              invalidCombination:
                $ref: "#/components/schemas/Ontologies.ApplyActionRequestOptions"
    Ontologies.InvalidContentLength:
      description: "A `Content-Length` header is required for all uploads, but was\
        \ missing or invalid."
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            type: object
    Ontologies.InvalidContentType:
      description: |
        The `Content-Type` cannot be inferred from the request content and filename.
        Please check your request content and filename to ensure they are compatible.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            type: object
    Ontologies.InvalidDerivedPropertyDefinition:
      description: Derived property definition was invalid due to shape of query or
        type checking.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            required:
            - derivedProperty
            - objectType
            type: object
            properties:
              derivedProperty:
                $ref: "#/components/schemas/Ontologies.DerivedPropertyApiName"
              objectType:
                $ref: "#/components/schemas/Ontologies.ObjectTypeApiName"
    Ontologies.InvalidDurationGroupByPropertyType:
      description: |
        Invalid property type for duration groupBy.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            required:
            - objectType
            - property
            - propertyBaseType
            type: object
            properties:
              objectType:
                $ref: "#/components/schemas/Ontologies.ObjectTypeApiName"
              property:
                $ref: "#/components/schemas/Ontologies.PropertyApiName"
              propertyBaseType:
                $ref: "#/components/schemas/Ontologies.ValueType"
    Ontologies.InvalidDurationGroupByValue:
      description: |
        Duration groupBy value is invalid. Units larger than day must have value `1` and date properties do not support
        filtering on units smaller than day. As examples, neither bucketing by every two weeks nor bucketing a date by
        every two hours are allowed.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode

      - $ref: "#/components/schemas/Ontologies.AggregationRangesGrouping"
      - $ref: "#/components/schemas/Ontologies.AggregationExactGrouping"
    Ontologies.AggregationGroupByV2:
      description: Specifies a grouping for aggregation results.
      discriminator:
        propertyName: type
        mapping:
          duration: "#/components/schemas/Ontologies.AggregationDurationGroupingV2"
          exact: "#/components/schemas/Ontologies.AggregationExactGroupingV2"
          fixedWidth: "#/components/schemas/Ontologies.AggregationFixedWidthGroupingV2"
          ranges: "#/components/schemas/Ontologies.AggregationRangesGroupingV2"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.AggregationDurationGroupingV2"
      - $ref: "#/components/schemas/Ontologies.AggregationFixedWidthGroupingV2"
      - $ref: "#/components/schemas/Ontologies.AggregationRangesGroupingV2"
      - $ref: "#/components/schemas/Ontologies.AggregationExactGroupingV2"

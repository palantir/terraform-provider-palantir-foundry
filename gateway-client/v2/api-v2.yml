            [Spark SQL dialect](https://spark.apache.org/docs/latest/sql-ref.html).\
            \ This supports SELECT\nqueries only. Datasets can be referenced in SQL\
            \ queries by path or by RID. See the \n[documentation](https://www.palantir.com/docs/foundry/analytics-connectivity/odbc-jdbc-drivers/#use-sql-to-query-foundry-datasets)\n\
            for more details.\n"
          example: SELECT * FROM `/Path/To/Dataset`

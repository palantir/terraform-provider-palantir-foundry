openapi: 3.0.1
info:
  title: Palantir OpenAPI
  description: The Palantir REST API. Please see https://www.palantir.com/docs for
    more details.
  version: 3.0.1
externalDocs:
  description: API Documentation
  url: https://www.palantir.com/docs
paths:
  /v2/admin/enrollments/getCurrent:
    get:
      tags:
      - AdminApiService
      description: |
        Returns the Enrollment associated with the current User's primary organization.
      operationId: adminGetCurrentEnrollment
      parameters:
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.Enrollment"
              example:
                createdTime: 2003-05-06T12:34:56.789Z
                name: Example Enrollment
                rid: ri.control-panel.main.customer.466f812b-f974-4478-9d4f-90402cd3def6
      security:
      - BearerAuth: []
      x-releaseStage: PRIVATE_BETA
  /v2/admin/enrollments/{enrollmentRid}:
    get:
      tags:
      - AdminApiService
      description: Get the Enrollment with the specified rid.
      operationId: adminGetEnrollment
      parameters:
      - name: enrollmentRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.EnrollmentRid"
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.Enrollment"
              example:
                createdTime: 2003-05-06T12:34:56.789Z
                name: Example Enrollment
                rid: ri.control-panel.main.customer.466f812b-f974-4478-9d4f-90402cd3def6
      security:
      - BearerAuth: []
      x-releaseStage: PRIVATE_BETA
  /v2/admin/enrollments/{enrollmentRid}/authenticationProviders:
    get:
      tags:
      - AdminApiService
      description: |+
        Lists all AuthenticationProviders.

      operationId: adminListAuthenticationProviders
      parameters:
      - name: enrollmentRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.EnrollmentRid"
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.ListAuthenticationProvidersResponse"
      security:
      - BearerAuth: []
      x-releaseStage: PUBLIC_BETA
  /v2/admin/enrollments/{enrollmentRid}/authenticationProviders/{authenticationProviderRid}:
    get:
      tags:
      - AdminApiService
      description: Get the AuthenticationProvider with the specified rid.
      operationId: adminGetAuthenticationProvider
      parameters:
      - name: enrollmentRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.EnrollmentRid"
      - name: authenticationProviderRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Admin.AuthenticationProviderRid"
        example: ri.control-panel.main.saml.3faf689c-eaa1-4137-851f-81d58afe4c86
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.AuthenticationProvider"
              example:
                enabled: true
                name: Example SAML Provider
                realm: 1bd3813a-ef8b-4211-bfbd-8b6485d0eb83
                rid: ri.control-panel.main.saml.3faf689c-eaa1-4137-851f-81d58afe4c86
                supportedHosts:
                - example.palantirfoundry.com
                supportedUsernamePatterns:
                - .*@example.com
                - .*@palantir.com
      security:
      - BearerAuth: []
      x-releaseStage: PUBLIC_BETA
  /v2/admin/enrollments/{enrollmentRid}/authenticationProviders/{authenticationProviderRid}/preregisterGroup:
    post:
      tags:
      - AdminApiService
      description: |
        Register a Group with a given name before any users with this group log in through this Authentication Provider.
        Preregistered groups can be used anywhere other groups are used in the platform.
      operationId: adminPreregisterGroup
      parameters:
      - name: enrollmentRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.EnrollmentRid"
      - name: authenticationProviderRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Admin.AuthenticationProviderRid"
        example: ri.control-panel.main.saml.3faf689c-eaa1-4137-851f-81d58afe4c86
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Admin.PreregisterGroupRequest"
            example:
              name: Data Source Admins
              organizations:
              - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Core.PrincipalId"
              example: f05f8da4-b84c-4fca-9c77-8af0b13d11de
      security:
      - BearerAuth: []
      x-releaseStage: PUBLIC_BETA
  /v2/admin/enrollments/{enrollmentRid}/authenticationProviders/{authenticationProviderRid}/preregisterUser:
    post:
      tags:
      - AdminApiService
      description: |
        Register a User with a given username before they log in to the platform for the first time through this
        Authentication Provider. Preregistered users can be assigned to groups and roles prior to first login.
      operationId: adminPreregisterUser
      parameters:
      - name: enrollmentRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.EnrollmentRid"
      - name: authenticationProviderRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Admin.AuthenticationProviderRid"
        example: ri.control-panel.main.saml.3faf689c-eaa1-4137-851f-81d58afe4c86
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Admin.PreregisterUserRequest"
            example:
              attributes:
                department:
                - Finance
                jobTitle:
                - Accountant
                multipass:email:primary:
                - jsmith@example.com
                multipass:familyName:
                - Smith
                multipass:givenName:
                - John
                multipass:organization-rid:
                - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
                multipass:realm:
                - eab0a251-ca1a-4a84-a482-200edfb8026f
              email: jsmith@example.com
              familyName: Smith
              givenName: John
              organization: ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
              username: jsmith
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Core.PrincipalId"
              example: f05f8da4-b84c-4fca-9c77-8af0b13d11de
      security:
      - BearerAuth: []
      x-releaseStage: PUBLIC_BETA
  /v2/admin/enrollments/{enrollmentRid}/hosts:
    get:
      tags:
      - AdminApiService
      description: |-
        Lists all Hosts.

        This is a paged endpoint. Each page may be smaller or larger than the requested page size. However, it is guaranteed that if there are more results available, the `nextPageToken` field will be populated. To get the next page, make the same request again, but set the value of the `pageToken` query parameter to be value of the `nextPageToken` value of the previous response. If there is no `nextPageToken` field in the response, you are on the last page.
      operationId: adminListHosts
      parameters:
      - name: enrollmentRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.EnrollmentRid"
      - name: pageSize
        in: query
        description: The page size to use for the endpoint.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PageSize"
      - name: pageToken
        in: query
        description: |-
          The page token indicates where to start paging. This should be omitted from the first page's request.
          To fetch the next page, clients should take the value from the `nextPageToken` field of the previous response
          and use it to populate the `pageToken` field of the next request.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PageToken"
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.ListHostsResponse"
      security:
      - BearerAuth: []
      x-releaseStage: PRIVATE_BETA
  /v2/admin/enrollments/{enrollmentRid}/roleAssignments:
    get:
      tags:
      - AdminApiService
      description: |
        List all principals who are assigned a role for the given Enrollment.
      operationId: adminListEnrollmentRoleAssignments
      parameters:
      - name: enrollmentRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.EnrollmentRid"
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.ListEnrollmentRoleAssignmentsResponse"
      security:
      - BearerAuth: []
      x-releaseStage: PRIVATE_BETA
  /v2/admin/enrollments/{enrollmentRid}/roleAssignments/add:
    post:
      tags:
      - AdminApiService
      description: |
        Assign roles to principals for the given Enrollment. At most 100 role assignments can be added in a single request.
      operationId: adminAddEnrollmentRoleAssignments
      parameters:
      - name: enrollmentRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.EnrollmentRid"
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Admin.AddEnrollmentRoleAssignmentsRequest"
            example:
              roleAssignments:
              - principalId: f05f8da4-b84c-4fca-9c77-8af0b13d11de
                roleId: 8bf49052-dc37-4528-8bf0-b551cfb71268
        required: true
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      x-releaseStage: PRIVATE_BETA
  /v2/admin/enrollments/{enrollmentRid}/roleAssignments/remove:
    post:
      tags:
      - AdminApiService
      description: |
        Remove roles from principals for the given Enrollment. At most 100 role assignments can be removed in a single request.
      operationId: adminRemoveEnrollmentRoleAssignments
      parameters:
      - name: enrollmentRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.EnrollmentRid"
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Admin.RemoveEnrollmentRoleAssignmentsRequest"
            example:
              roleAssignments:
              - principalId: f05f8da4-b84c-4fca-9c77-8af0b13d11de
                roleId: 8bf49052-dc37-4528-8bf0-b551cfb71268
        required: true
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      x-releaseStage: PRIVATE_BETA
  /v2/admin/groups:
    get:
      tags:
      - AdminApiService
      description: |-
        Lists all Groups.

        This is a paged endpoint. Each page may be smaller or larger than the requested page size. However, it is guaranteed that if there are more results available, the `nextPageToken` field will be populated. To get the next page, make the same request again, but set the value of the `pageToken` query parameter to be value of the `nextPageToken` value of the previous response. If there is no `nextPageToken` field in the response, you are on the last page.
      operationId: adminListGroups
      parameters:
      - name: pageSize
        in: query
        description: The page size to use for the endpoint.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PageSize"
      - name: pageToken
        in: query
        description: |-
          The page token indicates where to start paging. This should be omitted from the first page's request.
          To fetch the next page, clients should take the value from the `nextPageToken` field of the previous response
          and use it to populate the `pageToken` field of the next request.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PageToken"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.ListGroupsResponse"
      security:
      - BearerAuth: []
      x-releaseStage: STABLE
    post:
      tags:
      - AdminApiService
      description: Creates a new Group.
      operationId: adminCreateGroup
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Admin.CreateGroupRequest"
            example:
              attributes:
                department:
                - Finance
                jobTitle:
                - Accountant
                multipass:email:primary:
                - jsmith@example.com
                multipass:familyName:
                - Smith
                multipass:givenName:
                - John
                multipass:organization-rid:
                - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
                multipass:realm:
                - eab0a251-ca1a-4a84-a482-200edfb8026f
              description: Create and modify data sources in the platform
              name: Data Source Admins
              organizations:
              - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
        required: true
      responses:
        "200":
          description: The created Group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.Group"
              example:
                attributes:
                  department:
                  - Finance
                  jobTitle:
                  - Accountant
                  multipass:email:primary:
                  - jsmith@example.com
                  multipass:familyName:
                  - Smith
                  multipass:givenName:
                  - John
                  multipass:organization-rid:
                  - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
                  multipass:realm:
                  - eab0a251-ca1a-4a84-a482-200edfb8026f
                description: Create and modify data sources in the platform
                id: f05f8da4-b84c-4fca-9c77-8af0b13d11de
                name: Data Source Admins
                organizations:
                - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
                realm: palantir-internal-realm
      security:
      - BearerAuth: []
      x-releaseStage: STABLE
  /v2/admin/groups/getBatch:
    post:
      tags:
      - AdminApiService
      description: |-
        Execute multiple get requests on Group.

        The maximum batch size for this endpoint is 500.
      operationId: adminGetGroupsBatch
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              maxItems: 500
              minItems: 1
              type: array
              items:
                $ref: "#/components/schemas/Admin.GetGroupsBatchRequestElement"
            example:
            - groupId: f05f8da4-b84c-4fca-9c77-8af0b13d11de
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.GetGroupsBatchResponse"
              example:
                data:
                  f05f8da4-b84c-4fca-9c77-8af0b13d11de:
                    attributes:
                      department:
                      - Finance
                      jobTitle:
                      - Accountant
                      multipass:email:primary:
                      - jsmith@example.com
                      multipass:familyName:
                      - Smith
                      multipass:givenName:
                      - John
                      multipass:organization-rid:
                      - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
                      multipass:realm:
                      - eab0a251-ca1a-4a84-a482-200edfb8026f
                    description: Create and modify data sources in the platform
                    id: f05f8da4-b84c-4fca-9c77-8af0b13d11de
                    name: Data Source Admins
                    organizations:
                    - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
                    realm: palantir-internal-realm
      security:
      - BearerAuth: []
      x-releaseStage: STABLE
  /v2/admin/groups/search:
    post:
      tags:
      - AdminApiService
      description: |
        Perform a case-insensitive prefix search for groups based on group name.
      operationId: adminSearchGroups
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Admin.SearchGroupsRequest"
            example:
              pageSize: 100
              pageToken: v1.QnVpbGQgdGhlIEZ1dHVyZTogaHR0cHM6Ly93d3cucGFsYW50aXIuY29tL2NhcmVlcnMvP2xldmVyLXNvdXJjZSU1YiU1ZD1BUElEb2NzI29wZW4tcG9zaXRpb25z
              where:
                type: queryString
                value: jsmith
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.SearchGroupsResponse"
              example:
                data:
                - attributes:
                    department:
                    - Finance
                    jobTitle:
                    - Accountant
                    multipass:email:primary:
                    - jsmith@example.com
                    multipass:familyName:
                    - Smith
                    multipass:givenName:
                    - John
                    multipass:organization-rid:
                    - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
                    multipass:realm:
                    - eab0a251-ca1a-4a84-a482-200edfb8026f
                  description: Create and modify data sources in the platform
                  id: f05f8da4-b84c-4fca-9c77-8af0b13d11de
                  name: Data Source Admins
                  organizations:
                  - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
                  realm: palantir-internal-realm
                nextPageToken: v1.QnVpbGQgdGhlIEZ1dHVyZTogaHR0cHM6Ly93d3cucGFsYW50aXIuY29tL2NhcmVlcnMvP2xldmVyLXNvdXJjZSU1YiU1ZD1BUElEb2NzI29wZW4tcG9zaXRpb25z
      security:
      - BearerAuth: []
      x-releaseStage: STABLE
  /v2/admin/groups/{groupId}:
    get:
      tags:
      - AdminApiService
      description: Get the Group with the specified id.
      operationId: adminGetGroup
      parameters:
      - name: groupId
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.PrincipalId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.Group"
              example:
                attributes:
                  department:
                  - Finance
                  jobTitle:
                  - Accountant
                  multipass:email:primary:
                  - jsmith@example.com
                  multipass:familyName:
                  - Smith
                  multipass:givenName:
                  - John
                  multipass:organization-rid:
                  - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
                  multipass:realm:
                  - eab0a251-ca1a-4a84-a482-200edfb8026f
                description: Create and modify data sources in the platform
                id: f05f8da4-b84c-4fca-9c77-8af0b13d11de
                name: Data Source Admins
                organizations:
                - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
                realm: palantir-internal-realm
      security:
      - BearerAuth: []
      x-releaseStage: STABLE
    delete:
      tags:
      - AdminApiService
      description: Delete the Group with the specified id.
      operationId: adminDeleteGroup
      parameters:
      - name: groupId
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.PrincipalId"
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      x-releaseStage: STABLE
  /v2/admin/groups/{groupId}/groupMembers:
    get:
      tags:
      - AdminApiService
      description: "Lists all members (which can be a User or a Group) of a given\
        \ Group.\n\nThis is a paged endpoint. Each page may be smaller or larger than\
        \ the requested page size. However, \nit is guaranteed that if there are more\
        \ results available, the `nextPageToken` field will be populated. \nTo get\
        \ the next page, make the same request again, but set the value of the `pageToken`\
        \ query parameter \nto be value of the `nextPageToken` value of the previous\
        \ response. If there is no `nextPageToken` field \nin the response, you are\
        \ on the last page.\n"
      operationId: adminListGroupMembers
      parameters:
      - name: groupId
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.PrincipalId"
      - name: transitive
        in: query
        description: |
          When true, includes the transitive members of groups contained within this group. For example, say the
          Group has member Group A, and Group A has member User B. If `transitive=false` only Group A will
          be returned, but if `transitive=true` then Group A and User B will be returned. This
          will recursively resolve Groups through all layers of nesting.

          Defaults to false.
        required: false
        schema:
          type: boolean
      - name: pageSize
        in: query
        description: The page size to use for the endpoint.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PageSize"
      - name: pageToken
        in: query
        description: |-
          The page token indicates where to start paging. This should be omitted from the first page's request.
          To fetch the next page, clients should take the value from the `nextPageToken` field of the previous response
          and use it to populate the `pageToken` field of the next request.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PageToken"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.ListGroupMembersResponse"
      security:
      - BearerAuth: []
      x-releaseStage: STABLE
  /v2/admin/groups/{groupId}/groupMembers/add:
    post:
      tags:
      - AdminApiService
      operationId: adminAddGroupMembers
      parameters:
      - name: groupId
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.PrincipalId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Admin.AddGroupMembersRequest"
            example:
              expiration: 2026-01-31T00:00:00.000Z
              principalIds:
              - f05f8da4-b84c-4fca-9c77-8af0b13d11de
        required: true
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      x-releaseStage: STABLE
  /v2/admin/groups/{groupId}/groupMembers/remove:
    post:
      tags:
      - AdminApiService
      operationId: adminRemoveGroupMembers
      parameters:
      - name: groupId
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.PrincipalId"

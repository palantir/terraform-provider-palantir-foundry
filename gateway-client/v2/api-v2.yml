          $ref: "#/components/schemas/Streams.StreamType"
      example:
        branchName: master
        compressed: false
        partitionsCount: 1
        streamType: LOW_LATENCY
    Streams.CreateStreamRequestChangeDataCaptureConfiguration:
      description: |
        Configuration for utilizing the stream as a change data capture (CDC) dataset. To configure CDC on a stream, at
        least one key needs to be provided.

        For more information on CDC in
        Foundry, see the [Change Data Capture](/docs/foundry/data-integration/change-data-capture/) user documentation.
      discriminator:
        propertyName: type
        mapping:
          fullRow: "#/components/schemas/Streams.CreateStreamRequestFullRowChangeDataCaptureConfiguration"
      oneOf:
      - $ref: "#/components/schemas/Streams.CreateStreamRequestFullRowChangeDataCaptureConfiguration"
    Streams.CreateStreamRequestFullRowChangeDataCaptureConfiguration:
      required:
      - deletionFieldName
      - orderingFieldName
      - type
      type: object
      properties:
        deletionFieldName:
          $ref: "#/components/schemas/Core.FieldName"
        orderingFieldName:
          $ref: "#/components/schemas/Core.FieldName"
        type:
          type: string
    Streams.CreateStreamRequestStreamSchema:
      type: object
      properties:
        changeDataCapture:
          $ref: "#/components/schemas/Core.ChangeDataCaptureConfiguration"
        fields:
          type: array
          items:
            $ref: "#/components/schemas/Core.Field"
        keyFieldNames:
          type: array
          description: |
            The names of the fields to be used as keys for partitioning records. These key fields are used to group
            all records with the same key into the same partition, to guarantee processing order of grouped records. These
            keys are not meant to uniquely identify records, and do not by themselves deduplicate records. To deduplicate
            records, provide a change data capture configuration for the schema.

            Key fields can only be of the following types:
            - Boolean
            - Byte
            - Date
            - Decimal
            - Integer
            - Long
            - Short
            - String
            - Timestamp

            For additional information on keys for Foundry streams, see the
            [streaming keys](/docs/foundry/building-pipelines/streaming-keys/) user documentation.
          items:
            $ref: "#/components/schemas/Core.FieldName"

        The schema for a Foundry stream. Records pushed to this stream must match this schema.
      example:
        fields:
        - name: timestamp
          schema:
            dataType:
              type: timestamp
            nullable: false
        - name: value
          schema:
            dataType:
              type: string
            nullable: false
        keyFieldNames:

      - schema
      type: object
      properties:
        branchName:
          $ref: "#/components/schemas/Datasets.BranchName"
        compressed:
          $ref: "#/components/schemas/Streams.Compressed"
        partitionsCount:
          $ref: "#/components/schemas/Streams.PartitionsCount"

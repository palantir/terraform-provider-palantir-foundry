      - $ref: "#/components/schemas/Ontologies.ObjectSetSubscribeResponses"
    Ontologies.StreamTimeSeriesPointsRequest:
      type: object
      properties:
        aggregate:
          $ref: "#/components/schemas/Ontologies.AggregateTimeSeries"
        range:
          $ref: "#/components/schemas/Ontologies.TimeRange"
    Ontologies.StreamTimeSeriesPointsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.TimeSeriesPoint"
    Ontologies.StreamTimeSeriesValuesRequest:
      type: object
      properties:
        range:
          $ref: "#/components/schemas/Ontologies.TimeRange"
    Ontologies.StreamTimeSeriesValuesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.TimeseriesEntry"
    Ontologies.StreamingOutputFormat:
      type: string
      description: |
        Which format to serialize the binary stream in.
        ARROW is more efficient for streaming a large sized response.
      enum:
      - JSON
      - ARROW
    Ontologies.StringConstant:
      required:
      - type
      - value
      type: object
      properties:
        type:
          type: string
        value:
          type: string
    Ontologies.StringLengthConstraint:
      required:
      - type
      type: object
      properties:
        gt:
          description: Greater than
        gte:
          description: Greater than or equal
        lt:
          description: Less than
        lte:
          description: Less than or equal
        type:
          type: string
      description: |
        The parameter value must have a length within the defined range.
        *This range is always inclusive.*
    Ontologies.StringRegexMatchConstraint:
      required:
      - regex
      - type
      type: object
      properties:
        configuredFailureMessage:
          type: string
          description: |
            The message indicating that the regular expression was not matched.
            This is configured per parameter in the **Ontology Manager**.
        regex:
          type: string
          description: The regular expression configured in the **Ontology Manager**.
        type:
          type: string
      description: |
        The parameter value must match a predefined regular expression.
    Ontologies.StructConstraint:
      required:
      - type
      type: object
      properties:
        properties:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Ontologies.ValueTypeApiName"
          description: A map of the properties of the struct type to the value type
            applied to that property.
        type:
          type: string
    Ontologies.StructEvaluatedConstraint:
      required:
      - type
      type: object
      properties:
        structFields:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Ontologies.StructFieldEvaluationResult"
        type:
          type: string
      description: Represents the validity of a singleton struct parameter.
    Ontologies.StructFieldApiName:
      type: string
      description: The name of a struct field in the Ontology.
    Ontologies.StructFieldArgument:
      description: |
        Represents an argument used for an individual struct field.
      discriminator:
        propertyName: type
        mapping:
          structListParameterFieldValue: "#/components/schemas/Ontologies.StructListParameterFieldArgument"
          structParameterFieldValue: "#/components/schemas/Ontologies.StructParameterFieldArgument"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.StructListParameterFieldArgument"
      - $ref: "#/components/schemas/Ontologies.StructParameterFieldArgument"
    Ontologies.StructFieldEvaluatedConstraint:
      description: "A constraint that an action struct parameter field value must\
        \ satisfy in order to be considered valid.\nConstraints can be configured\
        \ on fields of struct parameters in the **Ontology Manager**. \nApplicable\
        \ constraints are determined dynamically based on parameter inputs. \nParameter\
        \ values are evaluated against the final set of constraints.\n\nThe type of\
        \ the constraint.\n| Type                  | Description                 \
        \                                                                        \
        \                                                                        \
        \                                                    |\n|-----------------------|---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|\n\
        | `oneOf`               | The struct parameter field has a manually predefined\
        \ set of options.                                                        \
        \                                                                        \
        \                            |\n| `range`               | The struct parameter\
        \ field value must be within the defined range.                          \
        \                                                                        \
        \                                                            |\n| `stringLength`\
        \        | The struct parameter field value must have a length within the\
        \ defined range.                                                         \
        \                                                                        \
        \                  |\n| `stringRegexMatch`    | The struct parameter field\
        \ value must match a predefined regular expression.                      \
        \                                                                        \
        \                                                      |\n"
      discriminator:
        propertyName: type
        mapping:
          oneOf: "#/components/schemas/Ontologies.OneOfConstraint"
          range: "#/components/schemas/Ontologies.RangeConstraint"
          stringLength: "#/components/schemas/Ontologies.StringLengthConstraint"
          stringRegexMatch: "#/components/schemas/Ontologies.StringRegexMatchConstraint"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.OneOfConstraint"
      - $ref: "#/components/schemas/Ontologies.RangeConstraint"
      - $ref: "#/components/schemas/Ontologies.StringLengthConstraint"
      - $ref: "#/components/schemas/Ontologies.StringRegexMatchConstraint"
    Ontologies.StructFieldEvaluationResult:
      required:
      - required
      - result
      type: object
      properties:
        evaluatedConstraints:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.StructFieldEvaluatedConstraint"
        required:
          type: boolean
          description: Represents whether the parameter is a required input to the
            action.
        result:
          $ref: "#/components/schemas/Ontologies.ValidationResult"
      description: Represents the validity of a struct parameter's fields against
        the configured constraints.
    Ontologies.StructFieldSelector:
      required:
      - propertyApiName
      - structFieldApiName
      - type
      type: object
      properties:
        propertyApiName:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        structFieldApiName:
          $ref: "#/components/schemas/Ontologies.StructFieldApiName"
        type:
          type: string
      description: |
        A combination of a property API name and a struct field API name used to select struct fields. Note that you can
        still select struct properties with only a 'PropertyApiNameSelector'; the queries will then become 'OR' queries
        across the fields of the struct property, and derived property expressions will operate on the whole struct
        where applicable.
    Ontologies.StructFieldType:
      required:
      - apiName
      - dataType
      - rid
      type: object
      properties:
        apiName:
          $ref: "#/components/schemas/Ontologies.StructFieldApiName"
        dataType:
          $ref: "#/components/schemas/Ontologies.ObjectPropertyType"
        rid:
          $ref: "#/components/schemas/Ontologies.StructFieldTypeRid"
    Ontologies.StructFieldTypeRid:
      type: string
      description: "The unique resource identifier of a struct field, useful for interacting\
        \ with other Foundry APIs."
    Ontologies.StructListParameterFieldArgument:
      required:
      - parameterId
      - structParameterFieldApiName
      - type
      type: object
      properties:
        parameterId:
          $ref: "#/components/schemas/Ontologies.ParameterId"
        structParameterFieldApiName:
          $ref: "#/components/schemas/Ontologies.StructParameterFieldApiName"
        type:
          type: string
      description: Represents a struct list parameter field argument in a logic rule.
    Ontologies.StructParameterFieldApiName:
      type: string
      description: |
        The unique identifier of the struct parameter field.
    Ontologies.StructParameterFieldArgument:
      required:
      - parameterId
      - structParameterFieldApiName
      - type
      type: object
      properties:
        parameterId:
          $ref: "#/components/schemas/Ontologies.ParameterId"
        structParameterFieldApiName:
          $ref: "#/components/schemas/Ontologies.StructParameterFieldApiName"
        type:
          type: string
      description: Represents a struct parameter field argument in a logic rule.
    Ontologies.StructType:
      required:
      - type
      type: object
      properties:
        structFieldTypes:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.StructFieldType"
        type:
          type: string
    Ontologies.SubmissionCriteriaEvaluation:
      required:
      - result
      type: object
      properties:
        configuredFailureMessage:
          type: string
          description: |
            The message indicating one of the **submission criteria** was not satisfied.
            This is configured per **submission criteria** in the **Ontology Manager**.
        result:
          $ref: "#/components/schemas/Ontologies.ValidationResult"
      description: |
        Contains the status of the **submission criteria**.
        **Submission criteria** are the prerequisites that need to be satisfied before an Action can be applied.
        These are configured in the **Ontology Manager**.
    Ontologies.SubscriptionClosed:
      required:
      - cause
      - id
      - type
      type: object
      properties:
        cause:
          $ref: "#/components/schemas/Ontologies.SubscriptionClosureCause"
        id:
          $ref: "#/components/schemas/Ontologies.SubscriptionId"
        type:
          type: string
      description: |
        The subscription has been closed due to an irrecoverable error during its lifecycle.
    Ontologies.SubscriptionClosureCause:
      discriminator:
        propertyName: type
        mapping:
          error: "#/components/schemas/Ontologies.Error"
          reason: "#/components/schemas/Ontologies.Reason"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.Reason"
      - $ref: "#/components/schemas/Ontologies.Error"
    Ontologies.SubscriptionError:
      required:
      - type
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.Error"
        type:
          type: string
    Ontologies.SubscriptionId:
      type: string
      description: A unique identifier used to associate subscription requests with
        responses.
      format: uuid
    Ontologies.SubscriptionSuccess:
      required:
      - id
      - type
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Ontologies.SubscriptionId"
        type:
          type: string
    Ontologies.SubtractPropertyExpression:
      required:
      - left
      - right
      - type
      type: object
      properties:
        left:
          $ref: "#/components/schemas/Ontologies.DerivedPropertyDefinition"
        right:
          $ref: "#/components/schemas/Ontologies.DerivedPropertyDefinition"
        type:
          type: string
      description: |
        Subtracts the right numeric value from the left numeric value.
    Ontologies.SumAggregation:
      required:
      - field
      - type
      type: object
      properties:
        field:
          $ref: "#/components/schemas/Ontologies.FieldNameV1"
        name:
          $ref: "#/components/schemas/Ontologies.AggregationMetricName"
        type:
          type: string
      description: Computes the sum of values for the provided field.
    Ontologies.SumAggregationV2:
      required:
      - field
      - type
      type: object
      properties:
        direction:
          $ref: "#/components/schemas/Ontologies.OrderByDirection"
        field:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        name:
          $ref: "#/components/schemas/Ontologies.AggregationMetricName"
        type:
          type: string
      description: Computes the sum of values for the provided field.
    Ontologies.SyncApplyActionResponseV2:
      type: object
      properties:
        edits:
          $ref: "#/components/schemas/Ontologies.ActionResults"
        validation:
          $ref: "#/components/schemas/Ontologies.ValidateActionResponseV2"
    Ontologies.SynchronousWebhookOutputArgument:
      required:
      - type
      - webhookOutputParamName
      type: object
      properties:
        type:
          type: string
        webhookOutputParamName:
          type: string
          description: The name of the webhook output parameter.
      description: Represents a synchronous webhook output argument in a logic rule.
    Ontologies.ThreeDimensionalAggregation:
      required:
      - keyType
      - type
      - valueType
      type: object
      properties:
        keyType:
          $ref: "#/components/schemas/Ontologies.QueryAggregationKeyType"
        type:
          type: string
        valueType:
          $ref: "#/components/schemas/Ontologies.TwoDimensionalAggregation"
    Ontologies.TimeCodeFormat:
      required:
      - type
      type: object
      properties:
        type:
          type: string
      description: Formats the duration in a timecode format.
    Ontologies.TimeRange:
      description: An absolute or relative range for a time series query.
      discriminator:
        propertyName: type
        mapping:
          absolute: "#/components/schemas/Ontologies.AbsoluteTimeRange"
          relative: "#/components/schemas/Ontologies.RelativeTimeRange"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.AbsoluteTimeRange"
      - $ref: "#/components/schemas/Ontologies.RelativeTimeRange"
    Ontologies.TimeSeriesAggregationMethod:
      type: string
      description: |
        The aggregation function to use for aggregating time series data.
      enum:
      - SUM
      - MEAN
      - STANDARD_DEVIATION
      - MAX
      - MIN
      - PERCENT_CHANGE
      - DIFFERENCE
      - PRODUCT
      - COUNT
      - FIRST
      - LAST
    Ontologies.TimeSeriesAggregationStrategy:
      description: |
        CUMULATIVE aggregates all points up to the current point.
        ROLLING aggregates all points in a rolling window whose size is either the specified number of points or
        time duration.
        PERIODIC aggregates all points in specified time windows.
      discriminator:
        propertyName: type
        mapping:
          cumulative: "#/components/schemas/Ontologies.TimeSeriesCumulativeAggregate"
          periodic: "#/components/schemas/Ontologies.TimeSeriesPeriodicAggregate"
          rolling: "#/components/schemas/Ontologies.TimeSeriesRollingAggregate"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.TimeSeriesRollingAggregate"
      - $ref: "#/components/schemas/Ontologies.TimeSeriesPeriodicAggregate"
      - $ref: "#/components/schemas/Ontologies.TimeSeriesCumulativeAggregate"
    Ontologies.TimeSeriesCumulativeAggregate:
      required:
      - type
      type: object
      properties:
        type:
          type: string
      description: |
        The cumulative aggregate is calculated progressively for each point in the input time series,
        considering all preceding points up to and including the current point.
    Ontologies.TimeSeriesPeriodicAggregate:
      required:
      - type
      - windowSize
      - windowType
      type: object
      properties:
        alignmentTimestamp:
          type: string
          description: "The timestamp used to align the result, such that ticks in\
            \ the result time series will lie at integer\nmultiples of the window\
            \ duration from the alignment timestamp.\n\nDefault is the first epoch\
            \ timestamp (January 1, 1970, 00:00:00 UTC) so that all aggregated points\
            \ have\ntimestamps at midnight UTC at the start of each window duration.\n\
            \nFor example, for a weekly aggregate with alignment timestamp 5 January,\
            \ 8:33PM, \neach aggregated timestamp will lie on the 7 day intervals\
            \ at 8:33PM starting at 5 January.\n"
          format: date-time
        type:
          type: string
        windowSize:
          $ref: "#/components/schemas/Ontologies.PreciseDuration"
        windowType:
          $ref: "#/components/schemas/Ontologies.TimeSeriesWindowType"
      description: |
        Aggregates values over discrete, periodic windows for a given time series.

        A periodic window divides the time series into windows of fixed durations.
        For each window, an aggregate function is applied to the points within that window. The result is a time series
        with values representing the aggregate for each window. Windows with no data points are not included
        in the output.

        Periodic aggregation is useful for downsampling a continuous stream of data to larger granularities such as
        hourly, daily, monthly.
    Ontologies.TimeSeriesPoint:
      required:
      - time
      - value
      type: object
      properties:
        time:
          type: string
          description: An ISO 8601 timestamp
          format: date-time
        value:
          description: An object which is either an enum String or a double number.
      description: |
        A time and value pair.
    Ontologies.TimeSeriesPropertyV2:
      type: string
    Ontologies.TimeSeriesRollingAggregate:
      required:
      - type
      - windowSize
      type: object
      properties:
        type:
          type: string
        windowSize:
          $ref: "#/components/schemas/Ontologies.TimeSeriesRollingAggregateWindow"
    Ontologies.TimeSeriesRollingAggregateWindow:
      description: |
        A rolling window is a moving subset of data points that ends at the current timestamp (inclusive)
        and spans a specified duration (window size). As new data points are added, old points fall out of the
        window if they are outside the specified duration.

        Rolling windows are commonly used for smoothing data, detecting trends, and reducing noise
        in time series analysis.
      discriminator:
        propertyName: type
        mapping:
          duration: "#/components/schemas/Ontologies.PreciseDuration"
          pointsCount: "#/components/schemas/Ontologies.RollingAggregateWindowPoints"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.PreciseDuration"
      - $ref: "#/components/schemas/Ontologies.RollingAggregateWindowPoints"
    Ontologies.TimeSeriesValueBankProperty:
      type: string
    Ontologies.TimeSeriesWindowType:
      type: string
      enum:
      - START
      - END
    Ontologies.TimeUnit:
      type: string
      enum:
      - MILLISECONDS
      - SECONDS
      - MINUTES
      - HOURS
      - DAYS
      - WEEKS
      - MONTHS
      - YEARS
      - QUARTERS
    Ontologies.TimeseriesEntry:
      required:
      - time
      - value
      type: object
      properties:
        time:
          type: string
          description: An ISO 8601 timestamp
          format: date-time
        value:
          description: "An object which is either an enum String, double number, or\
            \ a geopoint."
      description: |
        A time and value pair.
    Ontologies.TimeseriesSyncRid:
      type: string
      description: The RID identifying a time series sync.
    Ontologies.TimeseriesTemplateRid:
      type: string
      description: The RID identifying a time series codex template that resolves
        to a derived series.
    Ontologies.TimeseriesTemplateVersion:
      type: string
      description: The version corresponding to a codex template.
    Ontologies.TooManyNearestNeighborsRequested:
      description: The value of numNeighbors must be in the range 1 &lt;= numNeighbors
        &lt;= 500.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            required:
            - maxNumNeighbors
            - requestedNumNeighbors
            type: object
            properties:
              maxNumNeighbors:
                type: integer
              requestedNumNeighbors:
                type: integer
    Ontologies.TransactionEdit:
      discriminator:
        propertyName: type
        mapping:
          addLink: "#/components/schemas/Ontologies.AddLinkEdit"
          addObject: "#/components/schemas/Ontologies.AddObjectEdit"
          deleteObject: "#/components/schemas/Ontologies.DeleteObjectEdit"
          modifyObject: "#/components/schemas/Ontologies.ModifyObjectEdit"
          removeLink: "#/components/schemas/Ontologies.DeleteLinkEdit"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.ModifyObjectEdit"
      - $ref: "#/components/schemas/Ontologies.DeleteObjectEdit"
      - $ref: "#/components/schemas/Ontologies.AddObjectEdit"
      - $ref: "#/components/schemas/Ontologies.DeleteLinkEdit"
      - $ref: "#/components/schemas/Ontologies.AddLinkEdit"
    Ontologies.TwoDimensionalAggregation:
      required:
      - keyType
      - type
      - valueType
      type: object
      properties:
        keyType:
          $ref: "#/components/schemas/Ontologies.QueryAggregationKeyType"
        type:
          type: string
        valueType:
          $ref: "#/components/schemas/Ontologies.QueryAggregationValueType"
    Ontologies.UnauthorizedCipherOperation:
      description: |
        The provided token does not have permission to take a specific Cipher operation.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - PERMISSION_DENIED
          parameters:
            required:
            - cipherChannel
            type: object
            properties:
              cipherChannel:
                type: string
    Ontologies.UndecryptableValue:
      description: |
        The value intended for decryption with Cipher cannot be decrypted.
        Ensure it is correctly formatted (CIPHER::<cipher-channel-rid>:<encrypted-value>::CIPHER).
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            required:
            - value
            type: object
            properties:
              value:
                type: string
    Ontologies.UnevaluableConstraint:
      required:
      - type
      type: object
      properties:
        type:
          type: string
      description: |
        The parameter cannot be evaluated because it depends on another parameter or object set that can't be evaluated.
        This can happen when a parameter's allowed values are defined by another parameter that is missing or invalid.
    Ontologies.UniqueIdentifierArgument:
      required:
      - type
      type: object
      properties:
        linkId:
          type: string
          description: "By default all UniqueIdentifier Logic Rule arguments will\
            \ generate different UUID. \nIf the linkId is present all Logic Rules\
            \ with the same linkId will all have the same uuid generated as the value.\n"
          format: uuid
        type:
          type: string
      description: Represents a unique identifier argument in a logic rule.
    Ontologies.UnknownParameter:
      description: |
        The provided parameters were not found. Please look at the `knownParameters` field
        to see which ones are available.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            type: object
            properties:
              expectedParameters:
                type: array
                items:
                  $ref: "#/components/schemas/Ontologies.ParameterId"
              unknownParameters:
                type: array
                items:
                  $ref: "#/components/schemas/Ontologies.ParameterId"
    Ontologies.UnsupportedObjectSet:
      description: The requested object set is not supported.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INVALID_ARGUMENT
          parameters:
            type: object
    Ontologies.UuidConstraint:
      required:
      - type
      type: object
      properties:
        type:
          type: string
      description: The string must be a valid UUID (Universally Unique Identifier).
    Ontologies.ValidateActionRequest:
      type: object
      properties:
        parameters:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Ontologies.DataValue"
          nullable: true
    Ontologies.ValidateActionResponse:
      required:
      - result
      type: object
      properties:
        parameters:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Ontologies.ParameterEvaluationResult"
        result:
          $ref: "#/components/schemas/Ontologies.ValidationResult"
        submissionCriteria:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.SubmissionCriteriaEvaluation"
    Ontologies.ValidateActionResponseV2:
      required:
      - result
      type: object
      properties:
        parameters:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Ontologies.ParameterEvaluationResult"
        result:
          $ref: "#/components/schemas/Ontologies.ValidationResult"
        submissionCriteria:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.SubmissionCriteriaEvaluation"
    Ontologies.ValidationResult:
      type: string
      description: |
        Represents the state of a validation.
      enum:
      - VALID
      - INVALID
    Ontologies.ValueType:
      type: string
      description: |
        A string indicating the type of each data value. Note that these types can be nested, for example an array of
        structs.

        | Type                | JSON value                                                                                                        |
        |---------------------|-------------------------------------------------------------------------------------------------------------------|
        | Array               | `Array<T>`, where `T` is the type of the array elements, e.g. `Array<String>`.                                    |
        | Attachment          | `Attachment`                                                                                                      |
        | Boolean             | `Boolean`                                                                                                         |
        | Byte                | `Byte`                                                                                                            |
        | CipherText          | `CipherText`                                                                                                      |
        | Date                | `LocalDate`                                                                                                       |
        | Decimal             | `Decimal`                                                                                                         |
        | Double              | `Double`                                                                                                          |
        | Float               | `Float`                                                                                                           |
        | Integer             | `Integer`                                                                                                         |
        | Long                | `Long`                                                                                                            |
        | Marking             | `Marking`                                                                                                         |
        | OntologyObject      | `OntologyObject<T>` where `T` is the API name of the referenced object type.                                      |
        | Short               | `Short`                                                                                                           |
        | String              | `String`                                                                                                          |
        | Struct              | `Struct<T>` where `T` contains field name and type pairs, e.g. `Struct<{ firstName: String, lastName: string }>`  |
        | Timeseries          | `TimeSeries<T>` where `T` is either `String` for an enum series or `Double` for a numeric series.                 |
        | Timestamp           | `Timestamp`                                                                                                       |
    Ontologies.ValueTypeApiName:
      type: string
      description: The name of the value type in the API in camelCase format.
    Ontologies.ValueTypeArrayType:
      required:
      - type
      type: object
      properties:
        subType:
          $ref: "#/components/schemas/Ontologies.ValueTypeFieldType"
        type:
          type: string
    Ontologies.ValueTypeConstraint:
      discriminator:
        propertyName: type
        mapping:
          array: "#/components/schemas/Ontologies.ArrayConstraint"
          enum: "#/components/schemas/Ontologies.EnumConstraint"
          length: "#/components/schemas/Ontologies.LengthConstraint"

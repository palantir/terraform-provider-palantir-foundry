        \ without the need for Databricks secrets. \nRefer to our [OIDC documentation](/docs/foundry/data-connection/oidc)\
        \ for an overview of how OpenID Connect is supported in Foundry.\nA service\
        \ principal federation policy must exist in Databricks to allow Foundry to\

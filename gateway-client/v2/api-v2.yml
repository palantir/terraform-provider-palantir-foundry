              type: string
      description: |
        The specified connection does not support creating or replacing a table import with the specified config.
    Connectivity.TableImportQuery:
      type: string
      description: "A single SQL query can be executed per sync, which should output\
        \ a data table \nand avoid operations like invoking stored procedures. \n\
        The query results are saved to the output dataset in Foundry.\n"
      example: SELECT * FROM table
    Connectivity.TableImportRid:

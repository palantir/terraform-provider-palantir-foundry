    Connectivity.WorkflowIdentityFederation:
      required:
      - audience
      - issuerUrl
      - subject
      - type
      type: object
      properties:
        audience:
          type: string
          description: "Identifies the recipients that the access token is intended\
            \ for as a string URI. \nThis should be the primary host name where the\
            \ Connection lives.\n"
          example: https://example.palantirfoundry.com
        issuerUrl:
          type: string
          description: Identifies the principal that issued the access token as a
            string URI.
          example: https://pltroidcpublicexample.s3.us-east-1.amazonaws.com/foundry
        servicePrincipalApplicationId:
          type: string
          description: "The ID of the Databricks [service principal](https://docs.databricks.com/aws/en/admin/users-groups/service-principals).\
            \ \nIf provided, a federated JWT token is exchanged using a\nservice principal\
            \ federation policy. If not provided, a federated JWT token is exchanged\
            \ using an account\nfederation policy.\n"
        subject:
          $ref: "#/components/schemas/Connectivity.ConnectionRid"
        type:
          type: string
      description: "Authenticate as a service principal using workload identity federation.\
        \ This is the recommended way to connect to Databricks. \nWorkload identity\
        \ federation allows workloads running in Foundry to access Databricks APIs\
        \ without the need for Databricks secrets. \nRefer to our [OIDC documentation](/docs/foundry/data-connection/oidc)\
        \ for an overview of how OpenID Connect is supported in Foundry.\nA service\
        \ principal federation policy must exist in Databricks to allow Foundry to\
        \ act as an identity provider. \nRefer to the [official documentation](https://docs.databricks.com/aws/en/dev-tools/auth/oauth-federation)\
        \ for guidance.\n"
      example:
        audience: https://example.palantirfoundry.com
        issuerUrl: https://pltroidcpublicexample.s3.us-east-1.amazonaws.com/foundry
        subject: ri.magritte..source.c078b71b-92f9-41b6-b0df-3760f411120b

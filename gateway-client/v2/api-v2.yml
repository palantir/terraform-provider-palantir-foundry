    Pack.DocumentDiscretionarySecurity:
      type: object
      properties:
        editors:
          type: array
          description: |
            A user must match at least one of these principals, or one of the
            principals in the owners to be granted able to edit the Document.

            The edit operation is required to perform any kind of edit to a Document.
          items:
            $ref: "#/components/schemas/Pack.DiscretionaryPrincipal"
        owners:
          type: array
          description: |
            A user must match at least one of these principals to be granted
            ownership of the Document. This field is required to be non-empty.

            The own operation is required to change Document security and to delete Documents.

            If the creator of the Document is not included in "owners", they will not
            be able to delete or change the Document's security.
          items:
            $ref: "#/components/schemas/Pack.DiscretionaryPrincipal"
        viewers:
          type: array
          description: |
            A user must match at least one of these principals, or one of the
            principals in the owners or editors to be able to view the Document.

            The view operation is required to view or search for a Document.
          items:
            $ref: "#/components/schemas/Pack.DiscretionaryPrincipal"

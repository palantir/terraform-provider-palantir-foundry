    Connectivity.CreateTableImportRequestTableImportInitialIncrementalState:
      description: "The incremental configuration for a table import enables append-style\
        \ transactions from the same table without duplication of data.\nYou must\
        \ provide a monotonically increasing column such as a timestamp or id and\
        \ an initial value for this column. \nAn incremental table import will import\
        \ rows where the value is greater than the largest already imported.\n\nYou\
        \ can use the '?' character to reference the incremental state value when\
        \ constructing your query. \nNormally this would be used in a WHERE clause\
        \ or similar filter applied in order to only sync data with an incremental\
        \ column value \nlarger than the previously observed maximum value stored\
        \ in the incremental state.\n"
      discriminator:
        propertyName: type
        mapping:
          dateColumnInitialIncrementalState: "#/components/schemas/Connectivity.CreateTableImportRequestDateColumnInitialIncrementalState"
          decimalColumnInitialIncrementalState: "#/components/schemas/Connectivity.CreateTableImportRequestDecimalColumnInitialIncrementalState"
          integerColumnInitialIncrementalState: "#/components/schemas/Connectivity.CreateTableImportRequestIntegerColumnInitialIncrementalState"
          longColumnInitialIncrementalState: "#/components/schemas/Connectivity.CreateTableImportRequestLongColumnInitialIncrementalState"
          stringColumnInitialIncrementalState: "#/components/schemas/Connectivity.CreateTableImportRequestStringColumnInitialIncrementalState"
          timestampColumnInitialIncrementalState: "#/components/schemas/Connectivity.CreateTableImportRequestTimestampColumnInitialIncrementalState"
      oneOf:
      - $ref: "#/components/schemas/Connectivity.CreateTableImportRequestStringColumnInitialIncrementalState"
      - $ref: "#/components/schemas/Connectivity.CreateTableImportRequestDateColumnInitialIncrementalState"
      - $ref: "#/components/schemas/Connectivity.CreateTableImportRequestIntegerColumnInitialIncrementalState"
      - $ref: "#/components/schemas/Connectivity.CreateTableImportRequestTimestampColumnInitialIncrementalState"
      - $ref: "#/components/schemas/Connectivity.CreateTableImportRequestLongColumnInitialIncrementalState"
      - $ref: "#/components/schemas/Connectivity.CreateTableImportRequestDecimalColumnInitialIncrementalState"

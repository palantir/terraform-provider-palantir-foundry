        schema:
          $ref: "#/components/schemas/AipAgents.SessionRid"
        example: ri.aip-agents..session.292db3b2-b653-4de6-971c-7e97a7b881d6
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false

          check the **Ontology Manager**.
        required: true
        schema:
          $ref: "#/components/schemas/Ontologies.ObjectTypeApiName"
        example: employee
      - name: primaryKey
        in: path
        description: |
          The primary key of the object from which the links originate. To look up the expected primary key for your

          $ref: "#/components/schemas/DataHealth.SeverityLevel"
        trendType:
          $ref: "#/components/schemas/DataHealth.TrendType"
      description: Configuration for trend-based validation with severity settings.
        At least one of trendType or differenceBounds must be specified. Both may
        be provided to validate both the trend pattern and the magnitude of change.
      example:
        differenceBounds:
          lowerBound: 0.0
          upperBound: 1000.0
        severity: MODERATE
        trendType: NON_DECREASING
    DataHealth.TrendType:
      type: string
      description: |-
        The type of trend to validate:
        - NON_INCREASING: Values should not increase over time
        - NON_DECREASING: Values should not decrease over time
        - STRICTLY_INCREASING: Values should strictly increase over time
        - STRICTLY_DECREASING: Values should strictly decrease over time
        - CONSTANT: Values should remain constant over time
      example: NON_INCREASING
      enum:
      - NON_INCREASING
      - NON_DECREASING
      - STRICTLY_INCREASING
      - STRICTLY_DECREASING
      - CONSTANT

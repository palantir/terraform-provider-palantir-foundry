  /v2/connectivity/connections/{connectionRid}/updateSecrets:
    post:
      tags:
      - ConnectivityApiService
      description: "Updates the secrets on the connection to the specified secret\
        \ values.\nSecrets that are currently configured on the connection but are\
        \ omitted in the request will remain unchanged.\n\nSecrets are transmitted\
        \ over the network encrypted using TLS. Once the secrets reach Foundry's servers,\
        \ \nthey will be temporarily decrypted and remain in plaintext in memory to\
        \ be processed as needed. \nThey will stay in plaintext in memory until the\
        \ garbage collection process cleans up the memory. \nThe secrets are always\
        \ stored encrypted on our servers.\n\nBy using this endpoint, you acknowledge\
        \ and accept any potential risks associated with the temporary \nin-memory\
        \ handling of secrets. If you do not want your secrets to be temporarily decrypted,\
        \ you should \nuse the Foundry UI instead.\n"
      operationId: connectivityUpdateSecretsForConnection
      parameters:
      - name: connectionRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Connectivity.ConnectionRid"
      requestBody:
        content:
          application/json:

      properties:
        duration:
          $ref: "#/components/schemas/Ontologies.Duration"
        field:
          $ref: "#/components/schemas/Ontologies.FieldNameV1"
        type:
          type: string
      description: |
        Divides objects into groups according to an interval. Note that this grouping applies only on date types.
        The interval uses the ISO 8601 notation. For example, "PT1H2M34S" represents a duration of 3754 seconds.
    Ontologies.AggregationDurationGroupingV2:
      required:
      - field
      - type
      - unit
      - value
      type: object
      properties:
        field:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        type:
          type: string
        unit:
          $ref: "#/components/schemas/Ontologies.TimeUnit"
        value:
          type: integer
      description: |
        Divides objects into groups according to an interval. Note that this grouping applies only on date and timestamp types.
        When grouping by `YEARS`, `QUARTERS`, `MONTHS`, or `WEEKS`, the `value` must be set to `1`.
    Ontologies.AggregationExactGrouping:
      required:
      - field
      - type
      type: object
      properties:
        field:
          $ref: "#/components/schemas/Ontologies.FieldNameV1"
        maxGroupCount:
          type: integer
        type:
          type: string
      description: Divides objects into groups according to an exact value.
    Ontologies.AggregationExactGroupingV2:
      required:
      - field
      - type
      type: object
      properties:
        defaultValue:
          type: string
          description: |
            Includes a group with the specified default value that includes all objects where the specified field's value is null.
            Cannot be used with includeNullValues.
        field:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        includeNullValues:
          type: boolean
          description: |
            Includes a group with a null value that includes all objects where the specified field's value is null.
            Cannot be used with defaultValue or orderBy clauses on the aggregation.
        maxGroupCount:
          type: integer
        type:
          type: string
      description: Divides objects into groups according to an exact value.

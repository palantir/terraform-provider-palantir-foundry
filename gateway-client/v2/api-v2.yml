      oneOf:
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestSnowflakeExternalOauth"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestSnowflakeKeyPairAuthentication"
      - $ref: "#/components/schemas/Connectivity.CreateConnectionRequestBasicCredentials"
    Connectivity.CreateConnectionRequestSnowflakeConnectionConfiguration:
      required:
      - accountIdentifier
      - authenticationMode
      - jdbcProperties
      - type
      type: object
      properties:
        accountIdentifier:
          type: string
          description: "An [account identifier](https://docs.snowflake.com/en/user-guide/admin-account-identifier)\
            \ uniquely \nidentifies a Snowflake account within your organization,\
            \ as well as throughout the global network of \nSnowflake-supported cloud\
            \ platforms and cloud regions.\n\nThe URL for an account uses the following\
            \ format: <account_identifier>.snowflakecomputing.com.\nAn example URL\
            \ is https://acme-test_aws_us_east_2.snowflakecomputing.com.\n"
          example: acme-test_aws_us_east_2
        authenticationMode:
          $ref: "#/components/schemas/Connectivity.CreateConnectionRequestSnowflakeAuthenticationMode"
        database:
          type: string
          description: |
            Specifies the default database to use once connected. If unspecified, defaults to the empty string.
            The specified database should be an existing database for which the specified default role has privileges.

            See https://docs.snowflake.com/developer-guide/jdbc/jdbc-parameters#db
          example: mydatabase
        jdbcProperties:
          $ref: "#/components/schemas/Connectivity.JdbcProperties"
        role:
          type: string
          description: "Specifies the default access control role to use in the Snowflake\
            \ session initiated by the driver. \nIf unspecified, no role will be used\
            \ when the session is initiated by the driver.\n\nThe specified role should\
            \ be an existing role that has already been assigned to the specified\
            \ user for \nthe driver. If the specified role has not already been assigned\
            \ to the user, the role is not used when \nthe session is initiated by\
            \ the driver.\n\nSee https://docs.snowflake.com/developer-guide/jdbc/jdbc-parameters#role\n"
          example: myrole
        schema:
          type: string
          description: "Specifies the default schema to use for the specified database\
            \ once connected. If unspecified, \ndefaults to the empty string.\nThe\
            \ specified schema should be an existing schema for which the specified\
            \ default role has privileges.\n\nSee https://docs.snowflake.com/developer-guide/jdbc/jdbc-parameters#schema\n"
          example: myschema
        type:
          type: string
        warehouse:
          type: string
          description: "Specifies the virtual warehouse to use once connected. If\
            \ unspecified, defaults to the empty string. \nThe specified warehouse\
            \ should be an existing warehouse for which the specified default role\
            \ has privileges.\n\nSee https://docs.snowflake.com/developer-guide/jdbc/jdbc-parameters#warehouse\n"
          example: mywarehouse
      example:
        accountIdentifier: acme-test_aws_us_east_2
        database: mydatabase
        jdbcProperties:
          propertyName1: propertyValue1
          propertyName2: propertyValue2
        role: myrole
        schema: myschema
        warehouse: mywarehouse

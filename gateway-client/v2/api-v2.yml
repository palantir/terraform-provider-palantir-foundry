  /v2/ontologies/{ontology}/interfaces/{interfaceType}/search:
    post:
      tags:
      - OntologiesApiService
      description: ":::callout{theme=warning title=Warning}\n  This endpoint will\
        \ be removed once TS OSDK is updated to use `objectSets/loadObjects` with\
        \ interface object\n  sets.\n:::\nSearch for objects in the specified ontology\
        \ and interface type. Any properties specified in the \"where\" or \n\"orderBy\"\
        \ parameters must be shared property type API names defined on the interface.\
        \ The following search \nqueries are supported:\n\n| Query type          \
        \                    | Description                                       \
        \                                                                | Supported\
        \ Types                 |\n|-----------------------------------------|-------------------------------------------------------------------------------------------------------------------|---------------------------------|\n\
        | lt                                      | The provided property is less\
        \ than the provided value.                                               \
        \             | number, string, date, timestamp |\n| gt                  \
        \                    | The provided property is greater than the provided\
        \ value.                                                         | number,\
        \ string, date, timestamp |\n| lte                                     | The\
        \ provided property is less than or equal to the provided value.         \
        \                                       | number, string, date, timestamp\
        \ |\n| gte                                     | The provided property is\
        \ greater than or equal to the provided value.                           \
        \                  | number, string, date, timestamp |\n| eq             \
        \                         | The provided property is exactly equal to the\
        \ provided value.                                                     | number,\
        \ string, date, timestamp |\n| isNull                                  | The\
        \ provided property is (or is not) null.                                 \
        \                                       | all                            \
        \ |\n| contains                                | The provided property contains\
        \ the provided value.                                                    \
        \            | array                           |\n| not                  \
        \                   | The sub-query does not match.                      \
        \                                                               | N/A (applied\
        \ on a query)        |\n| and                                     | All the\
        \ sub-queries match.                                                     \
        \                                   | N/A (applied on queries)        |\n\
        | or                                      | At least one of the sub-queries\
        \ match.                                                                 \
        \           | N/A (applied on queries)        |\n| startsWith            \
        \                  | The provided property starts with the provided term.\
        \                                                              | string  \
        \                        |\n| containsAllTermsInOrderPrefixLastTerm   | The\
        \ provided property contains all the terms provided in order. The last term\
        \ can be a partial prefix match.      | string                          |\n\
        | containsAllTermsInOrder                 | The provided property contains\
        \ the provided terms as a substring.                                     \
        \            | string                          |\n| containsAnyTerm      \
        \                   | The provided property contains at least one of the terms\
        \ separated by whitespace.                                 | string      \
        \                    |\n| containsAllTerms                        | The provided\
        \ property contains all the terms separated by whitespace.               \
        \                              | string                          |\n\nQueries\
        \ can be at most three levels deep. By default, terms are separated by whitespace\
        \ or punctuation (`?!,:;-[](){}'\"~`). Periods (`.`) on their own are ignored.\n\
        Partial terms are not matched by terms filters except where explicitly noted.\n\
        \nAttempting to use an unsupported query will result in a validation error.\
        \ Third-party applications using this \nendpoint via OAuth2 must request the\
        \ following operation scope: `api:ontologies-read`.\n"
      operationId: ontologiesSearchObjectsForInterface
      parameters:
      - name: ontology
        in: path
        description: |
          The API name of the ontology. To find the API name, use the **List ontologies** endpoint or
          check the **Ontology Manager**.
        required: true
        schema:
          $ref: "#/components/schemas/Ontologies.OntologyIdentifier"
        example: palantir
      - name: interfaceType
        in: path
        description: |
          The API name of the interface type. To find the API name, use the **List interface types** endpoint or
          check the **Ontology Manager**.
        required: true
        schema:
          $ref: "#/components/schemas/Ontologies.InterfaceTypeApiName"
        example: Employee
      - name: branch
        in: query
        description: |
          The Foundry branch to search objects from. If not specified, the default branch will be used.
        required: false
        schema:
          $ref: "#/components/schemas/Core.FoundryBranch"
      - name: preview
        in: query
        description: |
          A boolean flag that, when set to true, enables the use of beta features in preview mode.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Ontologies.SearchObjectsForInterfaceRequest"
        required: true
      responses:
        "200":
          description: Success response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ontologies.SearchObjectsResponseV2"
              example:
                data:
                - __apiName: Employee
                  __primaryKey: 1000
                  __rid: ri.phonograph2-objects.main.object.5b5dbc28-7f05-4e83-a33a-1e5b851ababb
                  age: 21
                  employeeId: 1000
                  firstName: john
                  lastName: smith
                nextPageToken: v1.QnVpbGQgdGhlIEZ1dHVyZTogaHR0cHM6Ly93d3cucGFsYW50aXIuY29tL2NhcmVlcnMvP2xldmVyLXNvdXJjZSU1YiU1ZD1BUElEb2NzI29wZW4tcG9zaXRpb25z
      security:
      - BearerAuth: []
      x-releaseStage: PRIVATE_BETA

      - objectSet
      - propertyIdentifier
      - query
      - type
      type: object
      properties:
        numNeighbors:
          type: integer
          description: |
            The number of objects to return. If the number of documents in the objectType is less than the provided
            value, all objects will be returned. This value is limited to 1 &lt;= numNeighbors &lt;= 500.
        objectSet:
          $ref: "#/components/schemas/Ontologies.ObjectSet"
        propertyIdentifier:
          $ref: "#/components/schemas/Ontologies.PropertyIdentifier"
        query:
          $ref: "#/components/schemas/Ontologies.NearestNeighborsQuery"
        type:
          type: string
      description: "ObjectSet containing the top `numNeighbors` objects with `propertyIdentifier`\
        \ nearest to the input vector or\ntext. This can only be performed on a property\
        \ with type vector that has been configured to be searched with\napproximate\
        \ nearest neighbors using a similarity function configured in the Ontology.\n\
        \nA non-zero score for each resulting object is returned when the `orderType`\
        \ in the `orderBy` field is set to\n`relevance`. Note that:\n  - Scores will\
        \ not be returned if a nearestNeighbors object set is composed through union,\
        \ subtraction \n    or intersection with non-nearestNeighbors object sets.\n\
        \  - If results have scores, the order of the scores will be decreasing (duplicate\
        \ scores are possible).\n"

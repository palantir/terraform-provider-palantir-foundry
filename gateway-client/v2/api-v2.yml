        Unique identifier for a symbol that can be used to fetch the symbol as a PNG using loadGenericSymbol endpoint.
        The ID is opaque and not meant to be parsed in any way.
      example: temp
    MapRendering.MrsGeometryStyle:
      type: object
      properties:
        fillStyle:
          $ref: "#/components/schemas/MapRendering.MrsFillStyle"
        labelStyle:
          $ref: "#/components/schemas/MapRendering.MrsLabelStyle"

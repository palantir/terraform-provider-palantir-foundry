      properties:
        contexts:
          $ref: "#/components/schemas/AipAgents.SessionExchangeContexts"
        id:
          $ref: "#/components/schemas/AipAgents.SessionTraceId"
        status:
          $ref: "#/components/schemas/AipAgents.SessionTraceStatus"
        toolCallGroups:
          type: array
          description: |
            List of tool call groups that were triggered at the same point in the trace for the agent response
            generation. The groups are returned in the same order as they were triggered by the agent.
          items:
            $ref: "#/components/schemas/AipAgents.ToolCallGroup"
      example:
        contexts:
          objectContexts:
          - objectRids:
            - ri.phonograph2-objects.main.object.48668bf6-8878-48d2-b8f8-f0017593feb5
            propertyTypeRids:
            - ri.ontology.main.property.7899aeb4-a389-4f2e-a0fd-e7193a4f6cb1
        id: 12345678-1234-5678-1234-123456789abc
        status: IN_PROGRESS
        toolCallGroups:
        - toolCalls:
          - input:
              thought: I need to find the customer with the name 'Titan Technologies'.
            toolMetadata:
              name: Object Query Tool
              type: FUNCTION
    AipAgents.SessionTraceId:

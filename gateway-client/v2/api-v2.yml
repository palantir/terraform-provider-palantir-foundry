  /v2/ontologies/{ontology}/objects/{objectType}/search:
    post:
      tags:
      - OntologiesApiService
      description: |
        Search for objects in the specified ontology and object type. The request body is used
        to filter objects based on the specified query. The supported queries are:

        | Query type                              | Description                                                                                                       | Supported Types                 |
        |-----------------------------------------|-------------------------------------------------------------------------------------------------------------------|---------------------------------|
        | lt                                      | The provided property is less than the provided value.                                                            | number, string, date, timestamp |
        | gt                                      | The provided property is greater than the provided value.                                                         | number, string, date, timestamp |
        | lte                                     | The provided property is less than or equal to the provided value.                                                | number, string, date, timestamp |
        | gte                                     | The provided property is greater than or equal to the provided value.                                             | number, string, date, timestamp |
        | eq                                      | The provided property is exactly equal to the provided value.                                                     | number, string, date, timestamp |
        | isNull                                  | The provided property is (or is not) null.                                                                        | all                             |
        | contains                                | The provided property contains the provided value.                                                                | array                           |
        | not                                     | The sub-query does not match.                                                                                     | N/A (applied on a query)        |
        | and                                     | All the sub-queries match.                                                                                        | N/A (applied on queries)        |
        | or                                      | At least one of the sub-queries match.                                                                            | N/A (applied on queries)        |
        | containsAllTermsInOrderPrefixLastTerm   | The provided property contains all the terms provided in order. The last term can be a partial prefix match.      | string                          |
        | containsAllTermsInOrder                 | The provided property contains the provided term as a substring.                                                  | string                          |
        | containsAnyTerm                         | The provided property contains at least one of the terms separated by whitespace.                                 | string                          |
        | containsAllTerms                        | The provided property contains all the terms separated by whitespace.                                             | string                          |
        | startsWith                              | Deprecated alias for containsAllTermsInOrderPrefixLastTerm.                                                       | string                          |

        Queries can be at most three levels deep. By default, terms are separated by whitespace or punctuation (`?!,:;-[](){}'"~`). Periods (`.`) on their own are ignored.
        Partial terms are not matched by terms filters except where explicitly noted.
      operationId: ontologiesSearchObjectsV2
      parameters:
      - name: ontology
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Ontologies.OntologyIdentifier"
        example: palantir
      - name: objectType
        in: path
        description: |
          The API name of the object type. To find the API name, use the **List object types** endpoint or
          check the **Ontology Manager**.
        required: true
        schema:
          $ref: "#/components/schemas/Ontologies.ObjectTypeApiName"
        example: employee
      - name: sdkPackageRid
        in: query
        description: |
          The package rid of the generated SDK.
        required: false
        schema:
          $ref: "#/components/schemas/Ontologies.SdkPackageRid"
      - name: sdkVersion
        in: query
        description: |
          The version of the generated SDK.
        required: false
        schema:
          $ref: "#/components/schemas/Ontologies.SdkVersion"
      - name: branch
        in: query
        description: |
          The Foundry branch to search objects from. If not specified, the default branch will be used.
          Branches are an experimental feature and not all workflows are supported.
        required: false
        schema:
          $ref: "#/components/schemas/Core.FoundryBranch"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Ontologies.SearchObjectsRequestV2"
            example:
              where:
                field: age
                type: eq
                value: 21
        required: true
      responses:
        "200":
          description: Success response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ontologies.SearchObjectsResponseV2"
              example:
                data:
                - __apiName: Employee
                  __primaryKey: 1000
                  __rid: ri.phonograph2-objects.main.object.5b5dbc28-7f05-4e83-a33a-1e5b851ababb
                  age: 21
                  employeeId: 1000
                  firstName: john
                  lastName: smith
      security:
      - BearerAuth: []
      x-releaseStage: STABLE

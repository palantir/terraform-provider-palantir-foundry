              $ref: "#/components/schemas/Ontologies.PropertyApiName"
          description: "A map from object type API name to a list of property type\
            \ API names. For each returned object, if the \nobject’s object type is\
            \ a key in the map, then we augment the response for that object type\
            \ with the list \nof properties specified in the value.\n"
        augmentedSharedPropertyTypes:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/Ontologies.SharedPropertyTypeApiName"
          description: "A map from interface type API name to a list of shared property\
            \ type API names. For each returned object, if\nthe object implements\
            \ an interface that is a key in the map, then we augment the response\
            \ for that object \ntype with the list of properties specified in the\
            \ value.\n"
        orderBy:
          $ref: "#/components/schemas/Ontologies.SearchOrderByV2"
        otherInterfaceTypes:
          type: array
          description: "A list of interface type API names. Object types must implement\
            \ all the mentioned interfaces in order to be \nincluded in the response.\n"
          items:
            $ref: "#/components/schemas/Ontologies.InterfaceTypeApiName"
        pageSize:
          $ref: "#/components/schemas/Core.PageSize"
        pageToken:
          $ref: "#/components/schemas/Core.PageToken"
        selectedObjectTypes:
          type: array
          description: "A list of object type API names that should be included in\
            \ the response. If non-empty, object types that are\nnot mentioned will\
            \ not be included in the response even if they implement the specified\
            \ interface. Omit the \nparameter to include all object types.\n"
          items:
            $ref: "#/components/schemas/Ontologies.ObjectTypeApiName"
        selectedSharedPropertyTypes:
          type: array
          description: "A list of shared property type API names of the interface\
            \ type that should be included in the response. \nOmit this parameter\
            \ to include all properties of the interface type in the response.\n"
          items:
            $ref: "#/components/schemas/Ontologies.SharedPropertyTypeApiName"
        where:
          $ref: "#/components/schemas/Ontologies.SearchJsonQueryV2"
    Ontologies.SearchObjectsRequest:
      required:
      - query
      type: object
      properties:
        fields:
          type: array
          description: |
            The API names of the object type properties to include in the response.
          items:
            $ref: "#/components/schemas/Ontologies.PropertyApiName"
        orderBy:
          $ref: "#/components/schemas/Ontologies.SearchOrderBy"
        pageSize:
          $ref: "#/components/schemas/Core.PageSize"
        pageToken:
          $ref: "#/components/schemas/Core.PageToken"
        query:
          $ref: "#/components/schemas/Ontologies.SearchJsonQuery"
    Ontologies.SearchObjectsRequestV2:
      type: object
      properties:
        excludeRid:
          type: boolean
          description: |
            A flag to exclude the retrieval of the `__rid` property.
            Setting this to true may improve performance of this endpoint for object types in OSV2.
        orderBy:
          $ref: "#/components/schemas/Ontologies.SearchOrderByV2"
        pageSize:
          $ref: "#/components/schemas/Core.PageSize"
        pageToken:
          $ref: "#/components/schemas/Core.PageToken"
        select:
          type: array
          description: |
            The API names of the object type properties to include in the response.
          items:
            $ref: "#/components/schemas/Ontologies.PropertyApiName"
        snapshot:
          type: boolean
          description: |
            A flag to use snapshot consistency when paging.
            Setting this to true will give you a consistent view from before you start paging through the results, ensuring you do not get duplicate or missing items.
            Setting this to false will let new results enter as you page, but you may encounter duplicate or missing items.
            This defaults to false if not specified, which means you will always get the latest results.
        where:
          $ref: "#/components/schemas/Ontologies.SearchJsonQueryV2"
    Ontologies.SearchObjectsResponse:
      required:
      - totalCount
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.OntologyObject"
        nextPageToken:
          $ref: "#/components/schemas/Core.PageToken"
        totalCount:
          $ref: "#/components/schemas/Core.TotalCount"
    Ontologies.SearchObjectsResponseV2:
      required:
      - totalCount
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.OntologyObjectV2"
        nextPageToken:
          $ref: "#/components/schemas/Core.PageToken"
        totalCount:
          $ref: "#/components/schemas/Core.TotalCount"
    Ontologies.SearchOrderBy:
      type: object
      properties:
        fields:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.SearchOrdering"
      description: Specifies the ordering of search results by a field and an ordering
        direction.
    Ontologies.SearchOrderByType:
      type: string
      enum:
      - fields
      - relevance
    Ontologies.SearchOrderByV2:
      type: object
      properties:
        fields:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.SearchOrderingV2"
        orderType:
          $ref: "#/components/schemas/Ontologies.SearchOrderByType"
      description: Specifies the ordering of search results by a field and an ordering
        direction or by relevance if scores are required in a nearestNeighbors query.
        By default `orderType` is set to `fields`.
    Ontologies.SearchOrdering:
      required:
      - field
      type: object
      properties:
        direction:
          type: string
          description: Specifies the ordering direction (can be either `asc` or `desc`)
        field:
          $ref: "#/components/schemas/Ontologies.FieldNameV1"
    Ontologies.SearchOrderingV2:
      required:
      - field
      type: object
      properties:
        direction:
          type: string
          description: Specifies the ordering direction (can be either `asc` or `desc`)
        field:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
    Ontologies.SelectedPropertyApiName:
      type: string
      description: "By default, whenever an object is requested, all of its properties\
        \ are returned, except for properties of the \nfollowing types:\n- Vector\n\
        \nThe response can be filtered to only include certain properties using the\
        \ `properties` query parameter. Note\nthat ontology object set endpoints refer\
        \ to this parameter as `select`.\n\nProperties to include can be specified\
        \ in one of two ways.\n\n- A comma delimited list as the value for the `properties`\
        \ query parameter\n  `properties={property1ApiName},{property2ApiName}`\n\
        - Multiple `properties` query parameters.\n  `properties={property1ApiName}&properties={property2ApiName}`\n\
        \nThe primary key of the object will always be returned even if it wasn't\
        \ specified in the `properties` values.\n\nUnknown properties specified in\
        \ the `properties` list will result in a `PropertiesNotFound` error.\n\nTo\
        \ find the API name for your property, use the `Get object type` endpoint\
        \ or check the **Ontology Manager**.\n"
    Ontologies.SelectedPropertyApproximateDistinctAggregation:
      required:
      - selectedPropertyApiName
      - type
      type: object
      properties:
        selectedPropertyApiName:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        type:
          type: string
      description: Computes an approximate number of distinct values for the provided
        field.
    Ontologies.SelectedPropertyApproximatePercentileAggregation:
      required:
      - approximatePercentile
      - selectedPropertyApiName
      - type
      type: object
      properties:
        approximatePercentile:
          type: number
          format: double
        selectedPropertyApiName:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        type:
          type: string
      description: Computes the approximate percentile value for the provided field.
    Ontologies.SelectedPropertyAvgAggregation:
      required:
      - selectedPropertyApiName
      - type
      type: object
      properties:
        selectedPropertyApiName:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        type:
          type: string
      description: Computes the average value for the provided field.
    Ontologies.SelectedPropertyCollectListAggregation:
      required:
      - limit
      - selectedPropertyApiName
      - type
      type: object
      properties:
        limit:
          type: integer
          description: |
            Maximum number of values to collect. The maximum supported limit is 100.
        selectedPropertyApiName:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        type:
          type: string
      description: |
        Lists all values of a property up to the specified limit. The maximum supported limit is 100, by default.

        NOTE: A separate count aggregation should be used to determine the total count of values, to account for
        a possible truncation of the returned list.

        Ignores objects for which a property is absent, so the returned list will contain non-null values only.
        Returns an empty list when none of the objects have values for a provided property.
    Ontologies.SelectedPropertyCollectSetAggregation:
      required:
      - limit
      - selectedPropertyApiName
      - type
      type: object
      properties:
        limit:
          type: integer
          description: |
            Maximum number of values to collect. The maximum supported limit is 100.
        selectedPropertyApiName:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        type:
          type: string
      description: |
        Lists all distinct values of a property up to the specified limit. The maximum supported limit is 100.

        NOTE: A separate cardinality / exactCardinality aggregation should be used to determine the total count of
        values, to account for a possible truncation of the returned set.

        Ignores objects for which a property is absent, so the returned list will contain non-null values only.
        Returns an empty list when none of the objects have values for a provided property.
    Ontologies.SelectedPropertyCountAggregation:
      required:
      - type
      type: object
      properties:
        type:
          type: string
      description: Computes the total count of objects.
    Ontologies.SelectedPropertyExactDistinctAggregation:
      required:
      - selectedPropertyApiName
      - type
      type: object
      properties:
        selectedPropertyApiName:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        type:
          type: string
      description: |
        Computes an exact number of distinct values for the provided field. May be slower than an approximate distinct aggregation.
    Ontologies.SelectedPropertyExpression:
      required:
      - objectSet
      - operation
      - type
      type: object
      properties:
        objectSet:
          $ref: "#/components/schemas/Ontologies.MethodObjectSet"
        operation:
          $ref: "#/components/schemas/Ontologies.SelectedPropertyOperation"
        type:
          type: string
      description: Definition for a selected property over a MethodObjectSet.
    Ontologies.SelectedPropertyMaxAggregation:
      required:
      - selectedPropertyApiName
      - type
      type: object
      properties:
        selectedPropertyApiName:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        type:
          type: string
      description: Computes the maximum value for the provided field.
    Ontologies.SelectedPropertyMinAggregation:
      required:
      - selectedPropertyApiName
      - type
      type: object
      properties:
        selectedPropertyApiName:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        type:
          type: string
      description: Computes the minimum value for the provided field.
    Ontologies.SelectedPropertyOperation:
      description: |
        Operation on a selected property, can be an aggregation function or retrieval of a single selected property
      discriminator:
        propertyName: type
        mapping:
          approximateDistinct: "#/components/schemas/Ontologies.SelectedPropertyApproximateDistinctAggregation"
          approximatePercentile: "#/components/schemas/Ontologies.SelectedPropertyApproximatePercentileAggregation"
          avg: "#/components/schemas/Ontologies.SelectedPropertyAvgAggregation"
          collectList: "#/components/schemas/Ontologies.SelectedPropertyCollectListAggregation"
          collectSet: "#/components/schemas/Ontologies.SelectedPropertyCollectSetAggregation"
          count: "#/components/schemas/Ontologies.SelectedPropertyCountAggregation"
          exactDistinct: "#/components/schemas/Ontologies.SelectedPropertyExactDistinctAggregation"
          get: "#/components/schemas/Ontologies.GetSelectedPropertyOperation"
          max: "#/components/schemas/Ontologies.SelectedPropertyMaxAggregation"
          min: "#/components/schemas/Ontologies.SelectedPropertyMinAggregation"
          sum: "#/components/schemas/Ontologies.SelectedPropertySumAggregation"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.SelectedPropertyApproximateDistinctAggregation"
      - $ref: "#/components/schemas/Ontologies.SelectedPropertyMinAggregation"
      - $ref: "#/components/schemas/Ontologies.SelectedPropertyAvgAggregation"
      - $ref: "#/components/schemas/Ontologies.SelectedPropertyMaxAggregation"
      - $ref: "#/components/schemas/Ontologies.SelectedPropertyApproximatePercentileAggregation"
      - $ref: "#/components/schemas/Ontologies.GetSelectedPropertyOperation"
      - $ref: "#/components/schemas/Ontologies.SelectedPropertyCountAggregation"
      - $ref: "#/components/schemas/Ontologies.SelectedPropertySumAggregation"
      - $ref: "#/components/schemas/Ontologies.SelectedPropertyCollectListAggregation"
      - $ref: "#/components/schemas/Ontologies.SelectedPropertyExactDistinctAggregation"
      - $ref: "#/components/schemas/Ontologies.SelectedPropertyCollectSetAggregation"
    Ontologies.SelectedPropertySumAggregation:
      required:
      - selectedPropertyApiName
      - type
      type: object
      properties:
        selectedPropertyApiName:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        type:
          type: string
      description: Computes the sum of values for the provided field.
    Ontologies.SeriesId:
      type: string
      description: The unique codex id of a time series.
    Ontologies.SharedPropertiesNotFound:
      required:
      - errorName
      - errorCode
      - parameters
      properties:
        errorCode:
          type: string
          enum:
          - NOT_FOUND
        errorInstanceId:
          type: string
          format: uuid
        errorName:
          type: string
        parameters:
          type: object
          properties:
            missingSharedProperties:
              type: array
              items:
                $ref: "#/components/schemas/Ontologies.SharedPropertyTypeApiName"
            objectType:
              type: array
              items:
                $ref: "#/components/schemas/Ontologies.ObjectTypeApiName"
      description: The requested shared property types are not present on every object
        type.
    Ontologies.SharedPropertyType:
      required:
      - apiName
      - dataType
      - displayName
      - rid
      type: object
      properties:
        apiName:
          $ref: "#/components/schemas/Ontologies.SharedPropertyTypeApiName"
        dataType:
          $ref: "#/components/schemas/Ontologies.ObjectPropertyType"
        description:
          type: string
          description: A short text that describes the SharedPropertyType.
        displayName:
          $ref: "#/components/schemas/Core.DisplayName"
        rid:
          $ref: "#/components/schemas/Ontologies.SharedPropertyTypeRid"
      description: A property type that can be shared across object types.
    Ontologies.SharedPropertyTypeApiName:
      type: string
      description: |
        The name of the shared property type in the API in lowerCamelCase format. To find the API name for your
        shared property type, use the `List shared property types` endpoint or check the **Ontology Manager**.
    Ontologies.SharedPropertyTypeNotFound:
      required:
      - errorName
      - errorCode
      - parameters
      properties:
        errorCode:
          type: string
          enum:
          - NOT_FOUND
        errorInstanceId:
          type: string
          format: uuid
        errorName:
          type: string
        parameters:
          type: object
          properties:
            apiName:
              $ref: "#/components/schemas/Ontologies.SharedPropertyTypeApiName"
            rid:
              $ref: "#/components/schemas/Ontologies.SharedPropertyTypeRid"
      description: "The requested shared property type is not found, or the client\
        \ token does not have access to it."
    Ontologies.SharedPropertyTypeRid:
      type: string
      description: |
        The unique resource identifier of an shared property type, useful for interacting with other Foundry APIs.
    Ontologies.StartsWithQuery:
      required:
      - type
      - value
      type: object
      properties:
        field:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        propertyIdentifier:
          $ref: "#/components/schemas/Ontologies.PropertyIdentifier"
        type:
          type: string
        value:
          type: string
          example: foo
      description: "Deprecated alias for `containsAllTermsInOrderPrefixLastTerm`,\
        \ which is preferred because the name `startsWith` is misleading.\nReturns\
        \ objects where the specified field starts with the provided value. Allows\
        \ you to specify a property to \nquery on by a variety of means. Either `field`\
        \ or `propertyIdentifier` must be supplied, but not both.\n"
    Ontologies.StreamMessage:
      discriminator:
        propertyName: type
        mapping:
          objectSetChanged: "#/components/schemas/Ontologies.ObjectSetUpdates"
          refreshObjectSet: "#/components/schemas/Ontologies.RefreshObjectSet"
          subscribeResponses: "#/components/schemas/Ontologies.ObjectSetSubscribeResponses"
          subscriptionClosed: "#/components/schemas/Ontologies.SubscriptionClosed"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.ObjectSetUpdates"
      - $ref: "#/components/schemas/Ontologies.RefreshObjectSet"
      - $ref: "#/components/schemas/Ontologies.SubscriptionClosed"
      - $ref: "#/components/schemas/Ontologies.ObjectSetSubscribeResponses"
    Ontologies.StreamTimeSeriesPointsRequest:
      type: object
      properties:
        aggregate:
          $ref: "#/components/schemas/Ontologies.AggregateTimeSeries"
        range:
          $ref: "#/components/schemas/Ontologies.TimeRange"
    Ontologies.StreamTimeSeriesPointsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.TimeSeriesPoint"
    Ontologies.StreamTimeSeriesValuesRequest:
      type: object
      properties:
        range:
          $ref: "#/components/schemas/Ontologies.TimeRange"
    Ontologies.StreamTimeSeriesValuesResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.TimeseriesEntry"
    Ontologies.StreamingOutputFormat:
      type: string
      description: |
        Which format to serialize the binary stream in.
        ARROW is more efficient for streaming a large sized response.
      enum:
      - JSON
      - ARROW
    Ontologies.StringLengthConstraint:
      required:
      - type
      type: object
      properties:
        gt:
          description: Greater than
        gte:
          description: Greater than or equal
        lt:
          description: Less than
        lte:
          description: Less than or equal
        type:
          type: string
      description: |
        The parameter value must have a length within the defined range.
        *This range is always inclusive.*
    Ontologies.StringRegexMatchConstraint:
      required:
      - regex
      - type
      type: object
      properties:
        configuredFailureMessage:
          type: string
          description: |
            The message indicating that the regular expression was not matched.
            This is configured per parameter in the **Ontology Manager**.
        regex:
          type: string
          description: The regular expression configured in the **Ontology Manager**.
        type:
          type: string
      description: |
        The parameter value must match a predefined regular expression.
    Ontologies.StructEvaluatedConstraint:
      required:
      - type
      type: object
      properties:
        structFields:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Ontologies.StructFieldEvaluationResult"
        type:
          type: string
      description: Represents the validity of a singleton struct parameter.
    Ontologies.StructFieldApiName:
      type: string
      description: The name of a struct field in the Ontology.
    Ontologies.StructFieldEvaluatedConstraint:
      description: "A constraint that an action struct parameter field value must\
        \ satisfy in order to be considered valid.\nConstraints can be configured\
        \ on fields of struct parameters in the **Ontology Manager**. \nApplicable\
        \ constraints are determined dynamically based on parameter inputs. \nParameter\
        \ values are evaluated against the final set of constraints.\n\nThe type of\
        \ the constraint.\n| Type                  | Description                 \
        \                                                                        \
        \                                                                        \
        \                                                    |\n|-----------------------|---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|\n\
        | `oneOf`               | The struct parameter field has a manually predefined\
        \ set of options.                                                        \
        \                                                                        \
        \                            |\n| `range`               | The struct parameter\
        \ field value must be within the defined range.                          \
        \                                                                        \
        \                                                            |\n| `stringLength`\
        \        | The struct parameter field value must have a length within the\
        \ defined range.                                                         \
        \                                                                        \
        \                  |\n| `stringRegexMatch`    | The struct parameter field\
        \ value must match a predefined regular expression.                      \
        \                                                                        \
        \                                                      |\n"
      discriminator:
        propertyName: type
        mapping:
          oneOf: "#/components/schemas/Ontologies.OneOfConstraint"
          range: "#/components/schemas/Ontologies.RangeConstraint"
          stringLength: "#/components/schemas/Ontologies.StringLengthConstraint"
          stringRegexMatch: "#/components/schemas/Ontologies.StringRegexMatchConstraint"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.OneOfConstraint"
      - $ref: "#/components/schemas/Ontologies.RangeConstraint"
      - $ref: "#/components/schemas/Ontologies.StringLengthConstraint"
      - $ref: "#/components/schemas/Ontologies.StringRegexMatchConstraint"
    Ontologies.StructFieldEvaluationResult:
      required:
      - required
      - result
      type: object
      properties:
        evaluatedConstraints:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.StructFieldEvaluatedConstraint"
        required:
          type: boolean
          description: Represents whether the parameter is a required input to the
            action.
        result:
          $ref: "#/components/schemas/Ontologies.ValidationResult"
      description: Represents the validity of a struct parameter's fields against
        the configured constraints.
    Ontologies.StructFieldSelector:
      required:
      - propertyApiName
      - structFieldApiName
      - type
      type: object
      properties:
        propertyApiName:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        structFieldApiName:
          $ref: "#/components/schemas/Ontologies.StructFieldApiName"
        type:
          type: string
      description: |
        A combination of a property API name and a struct field API name used to select struct fields. Note that you can
        still select struct properties with only a 'PropertyApiNameSelector'; the queries will then become 'OR' queries
        across the fields of the struct property, and derived property expressions will operate on the whole struct
        where applicable.
    Ontologies.StructFieldType:
      required:
      - apiName
      - dataType
      - rid
      type: object
      properties:
        apiName:
          $ref: "#/components/schemas/Ontologies.StructFieldApiName"
        dataType:
          $ref: "#/components/schemas/Ontologies.ObjectPropertyType"
        rid:
          $ref: "#/components/schemas/Ontologies.StructFieldTypeRid"
    Ontologies.StructFieldTypeRid:
      type: string
      description: "The unique resource identifier of a struct field, useful for interacting\
        \ with other Foundry APIs."
    Ontologies.StructParameterFieldApiName:
      type: string
      description: |
        The unique identifier of the struct parameter field.
    Ontologies.StructType:
      required:
      - type
      type: object
      properties:
        structFieldTypes:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.StructFieldType"
        type:
          type: string
    Ontologies.SubmissionCriteriaEvaluation:
      required:
      - result
      type: object
      properties:
        configuredFailureMessage:
          type: string
          description: |
            The message indicating one of the **submission criteria** was not satisfied.
            This is configured per **submission criteria** in the **Ontology Manager**.
        result:
          $ref: "#/components/schemas/Ontologies.ValidationResult"
      description: |
        Contains the status of the **submission criteria**.
        **Submission criteria** are the prerequisites that need to be satisfied before an Action can be applied.
        These are configured in the **Ontology Manager**.
    Ontologies.SubscriptionClosed:
      required:
      - cause
      - id
      - type
      type: object
      properties:
        cause:
          $ref: "#/components/schemas/Ontologies.SubscriptionClosureCause"
        id:
          $ref: "#/components/schemas/Ontologies.SubscriptionId"
        type:
          type: string
      description: |
        The subscription has been closed due to an irrecoverable error during its lifecycle.
    Ontologies.SubscriptionClosureCause:
      discriminator:
        propertyName: type
        mapping:
          error: "#/components/schemas/Ontologies.Error"
          reason: "#/components/schemas/Ontologies.Reason"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.Reason"
      - $ref: "#/components/schemas/Ontologies.Error"
    Ontologies.SubscriptionError:
      required:
      - type
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Ontologies.Error"
        type:
          type: string
    Ontologies.SubscriptionId:
      type: string
      description: A unique identifier used to associate subscription requests with
        responses.
      format: uuid
    Ontologies.SubscriptionSuccess:
      required:
      - id
      - type
      type: object
      properties:
        id:
          $ref: "#/components/schemas/Ontologies.SubscriptionId"
        type:
          type: string
    Ontologies.SubtractPropertyExpression:
      required:
      - left
      - right
      - type
      type: object
      properties:
        left:
          $ref: "#/components/schemas/Ontologies.DerivedPropertyDefinition"
        right:
          $ref: "#/components/schemas/Ontologies.DerivedPropertyDefinition"
        type:
          type: string
      description: |
        Subtracts the right numeric value from the left numeric value.
    Ontologies.SumAggregation:
      required:
      - field
      - type
      type: object
      properties:
        field:
          $ref: "#/components/schemas/Ontologies.FieldNameV1"
        name:
          $ref: "#/components/schemas/Ontologies.AggregationMetricName"
        type:
          type: string
      description: Computes the sum of values for the provided field.
    Ontologies.SumAggregationV2:
      required:
      - field
      - type
      type: object
      properties:
        direction:
          $ref: "#/components/schemas/Ontologies.OrderByDirection"
        field:
          $ref: "#/components/schemas/Ontologies.PropertyApiName"
        name:
          $ref: "#/components/schemas/Ontologies.AggregationMetricName"
        type:
          type: string

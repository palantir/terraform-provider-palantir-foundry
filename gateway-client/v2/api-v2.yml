          text: What is the status of my order?
    AipAgents.SessionExchangeContexts:
      type: object
      properties:
        functionRetrievedContexts:
          type: array
          description: |
            Context retrieved from running a function that was included as additional context in the prompt to the Agent.
          items:
            $ref: "#/components/schemas/AipAgents.FunctionRetrievedContext"
        objectContexts:
          type: array
          description: |
            Relevant object context for the user's message that was included in the prompt to the Agent.
          items:
            $ref: "#/components/schemas/AipAgents.ObjectContext"
      description: |
        Retrieved context which was passed to the Agent as input for the exchange.
      example:
        objectContexts:
        - objectRids:
          - ri.phonograph2-objects.main.object.48668bf6-8878-48d2-b8f8-f0017593feb5
          propertyTypeRids:
          - ri.ontology.main.property.7899aeb4-a389-4f2e-a0fd-e7193a4f6cb1
    AipAgents.SessionExchangeResult:
      required:
      - agentMarkdownResponse
      - interruptedOutput
      - sessionTraceId
      type: object
      properties:
        agentMarkdownResponse:
          $ref: "#/components/schemas/AipAgents.AgentMarkdownResponse"
        interruptedOutput:
          type: boolean
          description: |
            True if the exchange was canceled.
            In that case, the response (if any) was provided by the client as part of the cancellation request rather than by the Agent.
          example: false
        parameterUpdates:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/AipAgents.ParameterValueUpdate"
          description: |
            Any updates to application variable values which were generated by the Agent for this exchange.
            Updates can only be generated for application variables configured with `READ_WRITE` access on the Agent in AIP Agent Studio.
        sessionTraceId:
          $ref: "#/components/schemas/AipAgents.SessionTraceId"
        totalTokensUsed:
          type: integer
          description: |
            Total tokens used to compute the result. Omitted if token usage information is not supported by the model used for the session.
          example: 6448
      description: The returned result from the Agent for a session exchange.
      example:
        agentMarkdownResponse: The status of your order is **In Transit**.
        interruptedOutput: false
        sessionTraceId: 12345678-1234-5678-1234-123456789abc
        totalTokensUsed: 6448
    AipAgents.SessionExecutionFailed:
      description: |
        Failed to generate a response for a session due to an unexpected error.
      allOf:
      - $ref: "#/components/schemas/BaseError"
      - required:
        - errorCode
        - parameters
        - errorName
        properties:
          errorCode:
            type: string
            enum:
            - INTERNAL
          parameters:
            required:
            - agentRid
            - details
            - message
            - sessionRid
            type: object
            properties:
              agentRid:
                $ref: "#/components/schemas/AipAgents.AgentRid"
              details:
                type: string
                description: Any additional details provided for the error.
              message:
                type: string
                description: The error message.
              sessionRid:
                $ref: "#/components/schemas/AipAgents.SessionRid"
    AipAgents.SessionMetadata:
      required:
      - createdTime
      - estimatedExpiresTime
      - messageCount
      - title
      - updatedTime
      type: object
      properties:
        createdTime:
          type: string
          description: The time the session was created.
          format: date-time
          example: 2024-10-01T20:04:24.962583055Z
        estimatedExpiresTime:
          type: string
          description: |
            The estimated time at which the session is due to expire.
            Once a session has expired, it can no longer be accessed and a new session must be created.
            The expiry time is automatically extended when new exchanges are added to the session.
          format: date-time
          example: 2024-10-02T22:04:24.962583055Z
        messageCount:
          type: integer
          description: |
            The count of messages in the session.
            Includes both user messages and Agent replies, so each complete exchange counts as two messages.
          example: 6
        title:
          type: string
          description: The title of the session.
          example: What is the status of my order?
        updatedTime:
          type: string
          description: The time the session was last updated.
          format: date-time
          example: 2024-10-01T22:04:24.962583055Z
      description: Metadata for a conversation session with an Agent.
      example:
        createdTime: 2024-10-01T20:04:24.962583055Z
        estimatedExpiresTime: 2024-10-02T22:04:24.962583055Z
        messageCount: 6
        title: What is the status of my order?
        updatedTime: 2024-10-01T22:04:24.962583055Z

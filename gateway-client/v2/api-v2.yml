                - $ref: "#/components/schemas/Datasets.DatasetNotFound"
                - $ref: "#/components/schemas/Datasets.FileNotFoundOnTransactionRange"
                - $ref: "#/components/schemas/Datasets.TransactionNotFound"
                - $ref: "#/components/schemas/Datasets.FileNotFound"

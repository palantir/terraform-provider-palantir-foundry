openapi: 3.0.1
info:
  title: Palantir OpenAPI
  description: The Palantir REST API. Please see https://www.palantir.com/docs for
    more details.
  version: 3.0.1
externalDocs:
  description: API Documentation
  url: https://www.palantir.com/docs
paths:
  /v2/admin/enrollments/getCurrent:
    get:
      tags:
      - AdminApiService
      description: |
        Returns the Enrollment associated with the current User's primary organization.
      operationId: adminGetCurrentEnrollment
      parameters:
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.Enrollment"
              example:
                createdTime: 2003-05-06T12:34:56.789Z
                name: Example Enrollment
                rid: ri.control-panel.main.customer.466f812b-f974-4478-9d4f-90402cd3def6
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.GetCurrentEnrollmentPermissionDenied"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.EnrollmentNotFound"
      security:
      - BearerAuth: []
      x-releaseStage: PRIVATE_BETA
  /v2/admin/enrollments/{enrollmentRid}:
    get:
      tags:
      - AdminApiService
      description: Get the Enrollment with the specified rid.
      operationId: adminGetEnrollment
      parameters:
      - name: enrollmentRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.EnrollmentRid"
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.Enrollment"
              example:
                createdTime: 2003-05-06T12:34:56.789Z
                name: Example Enrollment
                rid: ri.control-panel.main.customer.466f812b-f974-4478-9d4f-90402cd3def6
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.EnrollmentNotFound"
      security:
      - BearerAuth: []
      x-releaseStage: PRIVATE_BETA
  /v2/admin/enrollments/{enrollmentRid}/authenticationProviders:
    get:
      tags:
      - AdminApiService
      description: |+
        Lists all AuthenticationProviders.

      operationId: adminListAuthenticationProviders
      parameters:
      - name: enrollmentRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.EnrollmentRid"
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.ListAuthenticationProvidersResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.EnrollmentNotFound"
      security:
      - BearerAuth: []
      x-releaseStage: PUBLIC_BETA
  /v2/admin/enrollments/{enrollmentRid}/authenticationProviders/{authenticationProviderRid}:
    get:
      tags:
      - AdminApiService
      description: Get the AuthenticationProvider with the specified rid.
      operationId: adminGetAuthenticationProvider
      parameters:
      - name: enrollmentRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.EnrollmentRid"
      - name: authenticationProviderRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Admin.AuthenticationProviderRid"
        example: ri.control-panel.main.saml.3faf689c-eaa1-4137-851f-81d58afe4c86
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.AuthenticationProvider"
              example:
                enabled: true
                name: Example SAML Provider
                realm: 1bd3813a-ef8b-4211-bfbd-8b6485d0eb83
                rid: ri.control-panel.main.saml.3faf689c-eaa1-4137-851f-81d58afe4c86
                supportedHosts:
                - example.palantirfoundry.com
                supportedUsernamePatterns:
                - .*@example.com
                - .*@palantir.com
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.AuthenticationProviderNotFound"
      security:
      - BearerAuth: []
      x-releaseStage: PUBLIC_BETA
  /v2/admin/enrollments/{enrollmentRid}/authenticationProviders/{authenticationProviderRid}/preregisterGroup:
    post:
      tags:
      - AdminApiService
      description: |
        Register a Group with a given name before any users with this group log in through this Authentication Provider.
        Preregistered groups can be used anywhere other groups are used in the platform.
      operationId: adminPreregisterGroup
      parameters:
      - name: enrollmentRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.EnrollmentRid"
      - name: authenticationProviderRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Admin.AuthenticationProviderRid"
        example: ri.control-panel.main.saml.3faf689c-eaa1-4137-851f-81d58afe4c86
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Admin.PreregisterGroupRequest"
            example:
              name: Data Source Admins
              organizations:
              - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Core.PrincipalId"
              example: f05f8da4-b84c-4fca-9c77-8af0b13d11de
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.PreregisterGroupPermissionDenied"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.AuthenticationProviderNotFound"
      security:
      - BearerAuth: []
      x-releaseStage: PUBLIC_BETA
  /v2/admin/enrollments/{enrollmentRid}/authenticationProviders/{authenticationProviderRid}/preregisterUser:
    post:
      tags:
      - AdminApiService
      description: |
        Register a User with a given username before they log in to the platform for the first time through this
        Authentication Provider. Preregistered users can be assigned to groups and roles prior to first login.
      operationId: adminPreregisterUser
      parameters:
      - name: enrollmentRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.EnrollmentRid"
      - name: authenticationProviderRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Admin.AuthenticationProviderRid"
        example: ri.control-panel.main.saml.3faf689c-eaa1-4137-851f-81d58afe4c86
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Admin.PreregisterUserRequest"
            example:
              attributes:
                department:
                - Finance
                jobTitle:
                - Accountant
                multipass:email:primary:
                - jsmith@example.com
                multipass:familyName:
                - Smith
                multipass:givenName:
                - John
                multipass:organization-rid:
                - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
                multipass:realm:
                - eab0a251-ca1a-4a84-a482-200edfb8026f
              email: jsmith@example.com
              familyName: Smith
              givenName: John
              organization: ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
              username: jsmith
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Core.PrincipalId"
              example: f05f8da4-b84c-4fca-9c77-8af0b13d11de
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.PreregisterUserPermissionDenied"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.AuthenticationProviderNotFound"
      security:
      - BearerAuth: []
      x-releaseStage: PUBLIC_BETA
  /v2/admin/enrollments/{enrollmentRid}/hosts:
    get:
      tags:
      - AdminApiService
      description: |-
        Lists all Hosts.

        This is a paged endpoint. Each page may be smaller or larger than the requested page size. However, it is guaranteed that if there are more results available, the `nextPageToken` field will be populated. To get the next page, make the same request again, but set the value of the `pageToken` query parameter to be value of the `nextPageToken` value of the previous response. If there is no `nextPageToken` field in the response, you are on the last page.
      operationId: adminListHosts
      parameters:
      - name: enrollmentRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.EnrollmentRid"
      - name: pageSize
        in: query
        description: The page size to use for the endpoint.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PageSize"
      - name: pageToken
        in: query
        description: |-
          The page token indicates where to start paging. This should be omitted from the first page's request.
          To fetch the next page, clients should take the value from the `nextPageToken` field of the previous response
          and use it to populate the `pageToken` field of the next request.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PageToken"
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.ListHostsResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Core.InvalidPageSize"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.ListHostsPermissionDenied"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.EnrollmentNotFound"
      security:
      - BearerAuth: []
      x-releaseStage: PRIVATE_BETA
  /v2/admin/enrollments/{enrollmentRid}/roleAssignments:
    get:
      tags:
      - AdminApiService
      description: |
        List all principals who are assigned a role for the given Enrollment.
      operationId: adminListEnrollmentRoleAssignments
      parameters:
      - name: enrollmentRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.EnrollmentRid"
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.ListEnrollmentRoleAssignmentsResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.ListEnrollmentRoleAssignmentsPermissionDenied"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.EnrollmentNotFound"
      security:
      - BearerAuth: []
      x-releaseStage: PRIVATE_BETA
  /v2/admin/enrollments/{enrollmentRid}/roleAssignments/add:
    post:
      tags:
      - AdminApiService
      description: |
        Assign roles to principals for the given Enrollment. At most 100 role assignments can be added in a single request.
      operationId: adminAddEnrollmentRoleAssignments
      parameters:
      - name: enrollmentRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.EnrollmentRid"
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Admin.AddEnrollmentRoleAssignmentsRequest"
            example:
              roleAssignments:
              - principalId: f05f8da4-b84c-4fca-9c77-8af0b13d11de
                roleId: 8bf49052-dc37-4528-8bf0-b551cfb71268
        required: true
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.AddEnrollmentRoleAssignmentsPermissionDenied"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/Admin.PrincipalNotFound"
                - $ref: "#/components/schemas/Admin.EnrollmentRoleNotFound"
                - $ref: "#/components/schemas/Admin.EnrollmentNotFound"
      security:
      - BearerAuth: []
      x-releaseStage: PRIVATE_BETA
  /v2/admin/enrollments/{enrollmentRid}/roleAssignments/remove:
    post:
      tags:
      - AdminApiService
      description: |
        Remove roles from principals for the given Enrollment. At most 100 role assignments can be removed in a single request.
      operationId: adminRemoveEnrollmentRoleAssignments
      parameters:
      - name: enrollmentRid
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.EnrollmentRid"
      - name: preview
        in: query
        description: Enables the use of preview functionality.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PreviewMode"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Admin.RemoveEnrollmentRoleAssignmentsRequest"
            example:
              roleAssignments:
              - principalId: f05f8da4-b84c-4fca-9c77-8af0b13d11de
                roleId: 8bf49052-dc37-4528-8bf0-b551cfb71268
        required: true
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.RemoveEnrollmentRoleAssignmentsPermissionDenied"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/Admin.PrincipalNotFound"
                - $ref: "#/components/schemas/Admin.EnrollmentRoleNotFound"
                - $ref: "#/components/schemas/Admin.EnrollmentNotFound"
      security:
      - BearerAuth: []
      x-releaseStage: PRIVATE_BETA
  /v2/admin/groups:
    get:
      tags:
      - AdminApiService
      description: |-
        Lists all Groups.

        This is a paged endpoint. Each page may be smaller or larger than the requested page size. However, it is guaranteed that if there are more results available, the `nextPageToken` field will be populated. To get the next page, make the same request again, but set the value of the `pageToken` query parameter to be value of the `nextPageToken` value of the previous response. If there is no `nextPageToken` field in the response, you are on the last page.
      operationId: adminListGroups
      parameters:
      - name: pageSize
        in: query
        description: The page size to use for the endpoint.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PageSize"
      - name: pageToken
        in: query
        description: |-
          The page token indicates where to start paging. This should be omitted from the first page's request.
          To fetch the next page, clients should take the value from the `nextPageToken` field of the previous response
          and use it to populate the `pageToken` field of the next request.
        required: false
        schema:
          $ref: "#/components/schemas/Core.PageToken"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.ListGroupsResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Core.InvalidPageSize"
      security:
      - BearerAuth: []
      x-releaseStage: STABLE
    post:
      tags:
      - AdminApiService
      description: Creates a new Group.
      operationId: adminCreateGroup
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Admin.CreateGroupRequest"
            example:
              attributes:
                department:
                - Finance
                jobTitle:
                - Accountant
                multipass:email:primary:
                - jsmith@example.com
                multipass:familyName:
                - Smith
                multipass:givenName:
                - John
                multipass:organization-rid:
                - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
                multipass:realm:
                - eab0a251-ca1a-4a84-a482-200edfb8026f
              description: Create and modify data sources in the platform
              name: Data Source Admins
              organizations:
              - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
        required: true
      responses:
        "200":
          description: The created Group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.Group"
              example:
                attributes:
                  department:
                  - Finance
                  jobTitle:
                  - Accountant
                  multipass:email:primary:
                  - jsmith@example.com
                  multipass:familyName:
                  - Smith
                  multipass:givenName:
                  - John
                  multipass:organization-rid:
                  - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
                  multipass:realm:
                  - eab0a251-ca1a-4a84-a482-200edfb8026f
                description: Create and modify data sources in the platform
                id: 0d1fe74e-2b70-4a93-9b1a-80070637788b
                name: Data Source Admins
                organizations:
                - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
                realm: palantir-internal-realm
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/Admin.InvalidGroupOrganizations"
                - $ref: "#/components/schemas/Admin.GroupNameAlreadyExists"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.CreateGroupPermissionDenied"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.OrganizationNotFound"
      security:
      - BearerAuth: []
      x-releaseStage: STABLE
  /v2/admin/groups/getBatch:
    post:
      tags:
      - AdminApiService
      description: |-
        Execute multiple get requests on Group.

        The maximum batch size for this endpoint is 500.
      operationId: adminGetGroupsBatch
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              maxItems: 500
              minItems: 1
              type: array
              items:
                $ref: "#/components/schemas/Admin.GetGroupsBatchRequestElement"
            example:
            - groupId: 0d1fe74e-2b70-4a93-9b1a-80070637788b
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.GetGroupsBatchResponse"
              example:
                data:
                  "0d1fe74e-2b70-4a93-9b1a-80070637788b":
                    attributes:
                      department:
                      - Finance
                      jobTitle:
                      - Accountant
                      multipass:email:primary:
                      - jsmith@example.com
                      multipass:familyName:
                      - Smith
                      multipass:givenName:
                      - John
                      multipass:organization-rid:
                      - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
                      multipass:realm:
                      - eab0a251-ca1a-4a84-a482-200edfb8026f
                    description: Create and modify data sources in the platform
                    id: 0d1fe74e-2b70-4a93-9b1a-80070637788b
                    name: Data Source Admins
                    organizations:
                    - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
                    realm: palantir-internal-realm
      security:
      - BearerAuth: []
      x-releaseStage: STABLE
  /v2/admin/groups/search:
    post:
      tags:
      - AdminApiService
      description: |
        Perform a case-insensitive prefix search for groups based on group name.
      operationId: adminSearchGroups
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Admin.SearchGroupsRequest"
            example:
              pageSize: 100
              pageToken: v1.QnVpbGQgdGhlIEZ1dHVyZTogaHR0cHM6Ly93d3cucGFsYW50aXIuY29tL2NhcmVlcnMvP2xldmVyLXNvdXJjZSU1YiU1ZD1BUElEb2NzI29wZW4tcG9zaXRpb25z
              where:
                type: queryString
                value: jsmith
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.SearchGroupsResponse"
              example:
                data:
                - attributes:
                    department:
                    - Finance
                    jobTitle:
                    - Accountant
                    multipass:email:primary:
                    - jsmith@example.com
                    multipass:familyName:
                    - Smith
                    multipass:givenName:
                    - John
                    multipass:organization-rid:
                    - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
                    multipass:realm:
                    - eab0a251-ca1a-4a84-a482-200edfb8026f
                  description: Create and modify data sources in the platform
                  id: 0d1fe74e-2b70-4a93-9b1a-80070637788b
                  name: Data Source Admins
                  organizations:
                  - ri.multipass..organization.c30ee6ad-b5e4-4afe-a74f-fe4a289f2faa
                  realm: palantir-internal-realm
                nextPageToken: v1.QnVpbGQgdGhlIEZ1dHVyZTogaHR0cHM6Ly93d3cucGFsYW50aXIuY29tL2NhcmVlcnMvP2xldmVyLXNvdXJjZSU1YiU1ZD1BUElEb2NzI29wZW4tcG9zaXRpb25z
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Core.InvalidPageSize"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.SearchGroupsPermissionDenied"
      security:
      - BearerAuth: []
      x-releaseStage: STABLE
  /v2/admin/groups/{groupId}:
    get:
      tags:
      - AdminApiService
      description: Get the Group with the specified id.
      operationId: adminGetGroup
      parameters:
      - name: groupId
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Core.GroupId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin.Group"
              example:
                attributes:
                  department:
                  - Finance
                  jobTitle:
                  - Accountant
                  multipass:email:primary:
                  - jsmith@example.com
                  multipass:familyName:
                  - Smith
                  multipass:givenName:
                  - John
                  multipass:organization-rid:

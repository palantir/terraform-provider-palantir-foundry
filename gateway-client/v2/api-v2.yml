        visibility:
          $ref: "#/components/schemas/Ontologies.PropertyTypeVisibility"
      description: Details about some property of an object.
    Ontologies.PropertyValue:
      description: "Represents the value of a property in the following format.\n\n\
        | Type                                                                   \
        \                                                   | JSON encoding      \
        \                                         | Example                      \
        \                                                                      |\n\
        |---------------------------------------------------------------------------------------------------------------------------|-------------------------------------------------------------|----------------------------------------------------------------------------------------------------|\n\
        | Array                                                                  \
        \                                                   | array              \
        \                                         | `[\"alpha\", \"bravo\", \"charlie\"\
        ]`                                                                    |\n\
        | [Attachment](/docs/foundry/api/v2/ontologies-v2-resources/attachment-properties/attachment-property-basics/)\
        \              | JSON encoded `AttachmentProperty` object                \
        \    | `{\"rid\":\"ri.blobster.main.attachment.2f944bae-5851-4204-8615-920c969a9f2e\"\
        }`                       |\n| Boolean                                    \
        \                                                                        \
        \       | boolean                                                     | `true`\
        \                                                                        \
        \                     |\n| Byte                                          \
        \                                                                        \
        \    | number                                                      | `31`\
        \                                                                        \
        \                       |\n| CipherText                                  \
        \                                                                        \
        \      | string                                                      | `\"\
        CIPHER::ri.bellaso.main.cipher-channel.e414ab9e-b606-499a-a0e1-844fa296ba7e::unzjs3VifsTxuIpf1fH1CJ7OaPBr2bzMMdozPaZJtCii8vVG60yXIEmzoOJaEl9mfFFe::CIPHER\"\
        `                                                                        \
        \                                                                        \
        \                                        |        \n| Date               \
        \                                                                        \
        \                               | ISO 8601 extended local date string    \
        \                     | `\"2021-05-01\"`                                 \
        \                                                    |\n| Decimal        \
        \                                                                        \
        \                                   | string                             \
        \                         | `\"2.718281828\"`                            \
        \                                                        |\n| Double     \
        \                                                                        \
        \                                       | number                         \
        \                             | `3.14159265`                             \
        \                                                          |\n| Float    \
        \                                                                        \
        \                                         | number                       \
        \                               | `3.14159265`                           \
        \                                                            |\n| GeoPoint\
        \                                                                        \
        \                                          | geojson                     \
        \                                | `{\"type\":\"Point\",\"coordinates\":[102.0,0.5]}`\
        \                                                       |\n| GeoShape    \
        \                                                                        \
        \                                      | geojson                         \
        \                            | `{\"type\":\"LineString\",\"coordinates\":[[102.0,0.0],[103.0,1.0],[104.0,0.0],[105.0,1.0]]}`\
        \            |\n| Integer                                                \
        \                                                                   | number\
        \                                                      | `238940`        \
        \                                                                        \
        \           |\n| Long                                                    \
        \                                                                  | string\
        \                                                      | `\"58319870951433\"\
        `                                                                        \
        \         |\n| [MediaReference](/docs/foundry/api/v2/ontologies-v2-resources/media-reference-properties/media-reference-property-basics/)|\
        \ JSON encoded `MediaReference` object                        | `{\"mimeType\"\
        :\"application/pdf\",\"reference\":{\"type\":\"mediaSetViewItem\",\"mediaSetViewItem\"\
        :{\"mediaSetRid\":\"ri.mio.main.media-set.4153d42f-ca4b-4e42-8ca5-8e6aa7edb642\"\
        ,\"mediaSetViewRid\":\"ri.mio.main.view.82a798ad-d637-4595-acc6-987bcf16629b\"\
        ,\"mediaItemRid\":\"ri.mio.main.media-item.001ec98b-1620-4814-9e17-8e9c4e536225\"\
        }}}`                       |\n| Short                                    \
        \                                                                        \
        \         | number                                                      |\
        \ `8739`                                                                 \
        \                            |\n| String                                 \
        \                                                                        \
        \           | string                                                     \
        \ | `\"Call me Ishmael\"`                                                \
        \                                |\n| Struct                             \
        \                                                                        \
        \               | JSON object of struct field API name -> value          \
        \     | {\"firstName\": \"Alex\", \"lastName\": \"Karp\"}                \
        \                                          |\n| Timestamp                \
        \                                                                        \
        \                         | ISO 8601 extended offset date-time string in UTC\
        \ zone       | `\"2021-01-04T05:00:00Z\"`                                \
        \                                           |\n| [Timeseries](/docs/foundry/api/v2/ontologies-v2-resources/time-series-properties/time-series-property-basics/)\
        \            | JSON encoded `TimeseriesProperty` object or seriesId string\
        \ | `{\"seriesId\": \"wellPressureSeriesId\", \"syncRid\": ri.time-series-catalog.main.sync.04f5ac1f-91bf-44f9-a51f-4f34e06e42df\"\
        }` or `{\"templateRid\": \"ri.codex-emu.main.template.367cac64-e53b-4653-b111-f61856a63df9\"\
        , \"templateVersion\": \"0.0.0\"}` or `\"wellPressureSeriesId\"`|        \
        \                                                                   |\n| Vector\
        \                                                                        \
        \                                            | array                     \
        \                                  | `[0.1, 0.3, 0.02, 0.05 , 0.8, 0.4]` \
        \                                                               |\n\nNote\
        \ that for backwards compatibility, the Boolean, Byte, Double, Float, Integer,\
        \ and Short types can also be encoded as JSON strings.\n"
    Ontologies.PropertyValueEscapedString:
      type: string
      description: Represents the value of a property in string format. This is used
        in URL parameters.
    Ontologies.PropertyValueFormattingRule:
      description: "This feature is experimental and may change in a future release.\n\
        Comprehensive formatting configuration for displaying property values in user\
        \ interfaces. \nSupports different value types including numbers, dates, timestamps,\
        \ booleans, and known Foundry types.\n\nEach formatter type provides specific\
        \ options tailored to that data type:\n- Numbers: Support for percentages,\
        \ currencies, units, scaling, and custom formatting\n- Dates/Timestamps: Localized\
        \ and custom formatting patterns\n- Booleans: Custom true/false display text\n\
        - Known types: Special formatting for Foundry-specific identifiers\n"
      discriminator:
        propertyName: type
        mapping:
          boolean: "#/components/schemas/Ontologies.PropertyBooleanFormattingRule"
          date: "#/components/schemas/Ontologies.PropertyDateFormattingRule"
          knownType: "#/components/schemas/Ontologies.PropertyKnownTypeFormattingRule"
          number: "#/components/schemas/Ontologies.PropertyNumberFormattingRule"
          timestamp: "#/components/schemas/Ontologies.PropertyTimestampFormattingRule"
      oneOf:
      - $ref: "#/components/schemas/Ontologies.PropertyDateFormattingRule"
      - $ref: "#/components/schemas/Ontologies.PropertyNumberFormattingRule"
      - $ref: "#/components/schemas/Ontologies.PropertyBooleanFormattingRule"
      - $ref: "#/components/schemas/Ontologies.PropertyKnownTypeFormattingRule"
      - $ref: "#/components/schemas/Ontologies.PropertyTimestampFormattingRule"
    Ontologies.QosError:
      required:
      - type
      type: object
      properties:
        type:
          type: string
      description: |
        An error indicating that the subscribe request should be attempted on a different node.
    Ontologies.QualifiedTimeseriesProperty:
      required:
